          </div>
          <div style="flex:1;min-width:120px">
            <label style="font-size:10px;color:var(--textMuted);display:block;margin-bottom:3px">To</label>
            <input type="date" class="input" id="empDetailTo" value="${todayStr}" style="padding:6px 10px;font-size:12px"/>
          </div>
          <button class="btn btn-green btn-sm" id="empDetailFilter">Filter</button>
        </div>
        <div id="empDetailBody"><div style="padding:20px;text-align:center;color:var(--textMuted)">Loading…</div></div>
      </div>`;
      document.body.appendChild(modal);
      modal.onclick = e => { if (e.target === modal) modal.remove(); };
      document.getElementById('closeEmpDetail').onclick = () => modal.remove();
      document.getElementById('empDetailFilter').onclick = () => loadEmpDetail(emp);

      async function loadEmpDetail(emp) {
        const from = new Date(document.getElementById('empDetailFrom').value);
        const to   = new Date(document.getElementById('empDetailTo').value); to.setHours(23,59,59,999);
        const body = document.getElementById('empDetailBody');
        body.innerHTML = '<div style="padding:20px;text-align:center;color:var(--textMuted)">Loading…</div>';

        const [shifts, payments, activeShift, allTimeShifts] = await Promise.all([
          fetchShifts(from, to, emp._id),
          fetchSalaryPayments(emp._id),
          getActiveShift().catch(()=>null),
          fetchShifts(null, null, emp._id),
        ]);
        const myActiveShift = activeShift && activeShift.employeeId === emp._id ? activeShift : null;
        const liveMs = myActiveShift?.startTime?.toDate ? Date.now() - myActiveShift.startTime.toDate().getTime() : 0;
        const liveBonusMs = myActiveShift ? liveMs : 0;
        const totalMs  = shifts.reduce((s, sh) => s + (sh.durationMs||0), 0) + liveBonusMs;
        const earnings = calcEarnings(emp, totalMs);
        const slLabel  = {hourly:'Hourly',daily:'Daily',weekly:'Weekly',biweekly:'Bi-Weekly',monthly:'Monthly'}[emp.salaryType]||emp.salaryType;

        // All-time unpaid balance (includes carry-over from previous periods)
        const allTimeMs      = allTimeShifts.reduce((s, sh) => s + (sh.durationMs||0), 0);
        const allTimeEarned  = calcEarnings(emp, allTimeMs);
        const allTimePaid    = payments.filter(p => p.paidByOwner).reduce((s, p) => s + (p.amount||0), 0);
        const totalUnpaidBal = Math.max(0, allTimeEarned - allTimePaid);

        body.innerHTML = `
          ${myActiveShift ? `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.25);border-radius:10px;margin-bottom:12px">
            <span class="live-dot"></span>
            <div style="flex:1">
              <div style="font-size:11px;color:#34d399;font-weight:700">Currently On Shift</div>
              <div style="font-size:10px;color:var(--textMuted)">Live earnings included in totals</div>
            </div>
            <div style="text-align:right">
              <div class="shift-timer" style="font-size:15px" id="detailLiveTimer">${formatHHMM(liveMs)}</div>
              <div style="font-size:10px;color:#fbbf24">$<span id="detailLiveEarn">${calcEarnings(emp,liveMs).toFixed(2)}</span></div>
            </div>
          </div>` : ''}
          <div class="emp-stat-grid" style="margin-bottom:14px">
            <div class="emp-stat"><div class="es-label">Hours</div><div class="es-value">${hoursFromMs(totalMs).toFixed(1)}h</div></div>
            <div class="emp-stat"><div class="es-label">Earnings (Period)</div><div class="es-value" style="color:#fbbf24" id="detailTotalEarn">$${earnings.toFixed(2)}</div></div>
            <div class="emp-stat"><div class="es-label">Shifts</div><div class="es-value">${shifts.length}</div></div>
          </div>
          ${totalUnpaidBal > 0 ? `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.22);border-radius:10px;margin-bottom:14px">
            <div>
              <div style="font-size:11px;color:#f87171;font-weight:700;text-transform:uppercase;letter-spacing:0.5px">Total Unpaid Balance</div>
              <div style="font-size:10px;color:var(--textMuted);margin-top:2px">All-time earned $${allTimeEarned.toFixed(2)} &minus; paid $${allTimePaid.toFixed(2)}</div>
            </div>
            <div style="font-family:Orbitron,monospace;font-size:16px;font-weight:800;color:#f87171">$${totalUnpaidBal.toFixed(2)}</div>
          </div>` : `<div style="padding:8px 14px;background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.22);border-radius:10px;margin-bottom:14px;font-size:11px;color:#34d399;font-weight:700;text-align:center">✓ Fully Paid — No outstanding balance</div>`}
          <div class="emp-section-title" style="margin-top:0">SALARY PERIODS</div>
          <div class="card" style="padding:0;overflow:hidden;margin-bottom:14px">
            ${(function(){
              const periods = buildSalaryPeriods(emp, shifts, payments, from, to);
              if (!periods.length) return '<div style="padding:14px;text-align:center;color:var(--textMuted);font-size:12px">No shifts in this period</div>';
              return periods.map(function(p){
                const sc = p.unpaid > 0 ? 'unpaid' : 'paid';
                const markBtn = p.unpaid > 0 ? '<button class="btn btn-ghost btn-sm markPeriodPaid" data-key="'+esc(p.key)+'" data-amount="'+p.earned+'" style="font-size:10px;padding:2px 8px;margin-top:3px;color:#34d399">Mark Paid</button>' : '';
                return '<div class="salary-row">'
                  +'<div>'
                  +'<div style="font-weight:600;font-size:12px">'+esc(p.label)+'</div>'
                  +'<div style="font-size:10px;color:var(--textMuted)">'+formatHHMM(p.totalMs)+' · '+p.shifts.length+' shifts</div>'
                  +'</div>'
                  +'<div style="display:flex;align-items:center;gap:7px;flex-shrink:0">'
                  +'<div style="font-weight:800;color:#fbbf24;font-family:Orbitron,monospace;font-size:12px;white-space:nowrap">$'+p.earned.toFixed(2)+'</div>'
                  +'<span class="pay-pill '+sc+'" style="white-space:nowrap">'+(p.unpaid > 0 ? 'To Receive: $'+p.unpaid.toFixed(2) : 'Paid')+'</span>'
                  +markBtn
                  +'</div>'
                  +'</div>';
              }).join('');
            })()}
          </div>
          <div class="emp-section-title" style="margin-top:0">SHIFT HISTORY</div>
          <div class="card" style="padding:0;overflow:hidden;max-height:260px;overflow-y:auto">
            ${shifts.length
              ? shifts.sort((a,b)=>(b.startTime?.seconds||0)-(a.startTime?.seconds||0)).map(sh => {
                  const d = sh.startTime?.toDate ? sh.startTime.toDate() : new Date();
                  return `<div class="salary-row">
                    <div><div style="font-weight:600;font-size:12px">${d.toLocaleDateString()} ${d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true})}</div></div>
                    <div style="text-align:right">
                      <div style="font-weight:700;color:#22d3ee;font-family:'Orbitron',monospace;font-size:11px">${formatDuration(sh.durationMs||0)}</div>
                      <div style="font-size:10px;color:#fbbf24">$${calcEarnings(emp, sh.durationMs||0).toFixed(2)}</div>
                    </div>
                  </div>`;
                }).join('')
              : '<div style="padding:18px;text-align:center;color:var(--textMuted);font-size:12px">No shifts in this period</div>'}
          </div>
          <div class="emp-section-title">SALARY PAYMENTS</div>
          <div class="card" style="padding:0;overflow:hidden">
            ${payments.length
              ? payments.sort((a,b)=>(b.periodEnd?.seconds||0)-(a.periodEnd?.seconds||0)).map(pay => {
                  const pf = pay.periodStart?.toDate ? pay.periodStart.toDate().toLocaleDateString() : '-';
                  const pt = pay.periodEnd?.toDate   ? pay.periodEnd.toDate().toLocaleDateString()   : '-';
                  const sc = pay.receivedByEmployee ? 'received' : pay.paidByOwner ? 'paid' : 'unpaid';
                  const sl = pay.receivedByEmployee ? 'Received by Cashier' : pay.paidByOwner ? 'Paid' : 'Pending';
                  return `<div class="salary-row">
                    <div><div style="font-weight:600;font-size:12px">${pf} – ${pt}</div></div>
                    <div style="text-align:right">
                      <div style="font-weight:700;color:#fbbf24;font-family:'Orbitron',monospace;font-size:12px">$${(pay.amount||0).toFixed(2)}</div>
                      <span class="pay-pill ${sc}" style="display:inline-block;margin-top:2px">${sl}</span>
                    </div>
                  </div>`;
                }).join('')
              : '<div style="padding:18px;text-align:center;color:var(--textMuted);font-size:12px">No payments yet</div>'}
          </div>
        `;

        // Live timer for currently active shift in detail modal
        if (myActiveShift) {
          const detailStartMs = myActiveShift.startTime?.toDate ? myActiveShift.startTime.toDate().getTime() : 0;
          clearInterval(_shiftTimerInterval);
          _shiftTimerInterval = setInterval(() => {
            const timerEl = document.getElementById('detailLiveTimer');
            const earnEl  = document.getElementById('detailLiveEarn');
            const totalEl = document.getElementById('detailTotalEarn');
            if (!timerEl) { clearInterval(_shiftTimerInterval); return; }
            const curLiveMs = Date.now() - detailStartMs;
            timerEl.textContent = formatHHMMSS(curLiveMs);
            if (earnEl) earnEl.textContent = calcEarnings(emp, curLiveMs).toFixed(2);
            if (totalEl) {
              const completedMs = shifts.reduce((s, sh) => s + (sh.durationMs||0), 0);
              totalEl.textContent = '$' + calcEarnings(emp, completedMs + curLiveMs).toFixed(2);
            }
          }, 1000);
        }

        // Bind per-period Mark Paid buttons
        body.querySelectorAll('.markPeriodPaid').forEach(btn => {
          btn.onclick = async () => {
            const amount = parseFloat(btn.dataset.amount) || 0;
            const periodKey = btn.dataset.key;
            if (!confirm(`Mark $${amount.toFixed(2)} as paid to ${emp.name} for period: ${periodKey}?`)) return;
            btn.disabled = true; btn.textContent = 'Saving…';
            // Find shifts in this period to get the period dates
            const periods2 = buildSalaryPeriods(emp, shifts, payments, from, to);
            const thisPeriod = periods2.find(p => p.key === periodKey);
            const pShifts = thisPeriod ? thisPeriod.shifts : [];
            const pMs = thisPeriod ? thisPeriod.totalMs : 0;
            const pStart = pShifts.length ? (pShifts[pShifts.length-1].startTime?.toDate ? pShifts[pShifts.length-1].startTime.toDate() : new Date()) : from;
            const pEnd   = pShifts.length ? (pShifts[0].startTime?.toDate ? pShifts[0].startTime.toDate() : new Date()) : to;
            await db.collection(payPath()).add({
              employeeId:         emp._id,
              employeeName:       emp.name || '',
              employeeEmail:      emp.email || '',
              periodKey:          periodKey,
              periodStart:        firebase.firestore.Timestamp.fromDate(pStart),
              periodEnd:          firebase.firestore.Timestamp.fromDate(pEnd),
              salaryType:         emp.salaryType,
              totalDurationMs:    pMs,
              amount:             amount,
              paidByOwner:        true,
              receivedByEmployee: false,
              paidAt:             firebase.firestore.FieldValue.serverTimestamp(),
            });
            await loadEmpDetail(emp);
          };
        });
      }

      await loadEmpDetail(emp);
    }

    function showAddEmployeeModal(existing) {
      const isEdit = !!existing;
      let modal = document.getElementById('addEmpModal');
      if (modal) modal.remove();
      modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.id = 'addEmpModal';
      modal.innerHTML = `<div class="modal" style="max-width:440px;width:94vw">
        <div class="modal-title">${isEdit ? 'Edit Cashier' : 'Add Cashier'}</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <div>
            <label style="font-size:11px;color:var(--textMuted);display:block;margin-bottom:4px">Full Name *</label>
            <input class="input" id="empName" placeholder="e.g. John Doe" value="${esc(existing?.name||'')}" />
          </div>
          <div>
            <label style="font-size:11px;color:var(--textMuted);display:block;margin-bottom:4px">Google Email *</label>
            <input class="input" type="email" id="empEmail" placeholder="cashier@gmail.com" value="${esc(existing?.email||'')}" ${isEdit?'readonly style="opacity:0.6"':''} />
          </div>
          <div>
            <label style="font-size:11px;color:var(--textMuted);display:block;margin-bottom:4px">Role / Position</label>
            <input class="input" id="empRole" placeholder="e.g. Cashier, Manager" value="${esc(existing?.role||'')}" />
          </div>
          <div>
            <label style="font-size:11px;color:var(--textMuted);display:block;margin-bottom:4px">Contact (Phone)</label>
            <input class="input" id="empContact" placeholder="e.g. +1 234 567 8900" value="${esc(existing?.contact||'')}" />
          </div>
          <div style="display:flex;gap:10px">
            <div style="flex:1">
              <label style="font-size:11px;color:var(--textMuted);display:block;margin-bottom:4px">Salary Type *</label>
              <select class="input styled-select" id="empSalaryType">
                ${['hourly','daily','weekly','biweekly','monthly'].map(t =>
                  `<option value="${t}" ${(existing?.salaryType||'hourly')===t?'selected':''}>${{hourly:'Hourly',daily:'Daily',weekly:'Weekly',biweekly:'Bi-Weekly',monthly:'Monthly'}[t]}</option>`
                ).join('')}
              </select>
            </div>
            <div style="flex:1">
              <label style="font-size:11px;color:var(--textMuted);display:block;margin-bottom:4px">Rate ($) *</label>
              <input class="input" type="number" id="empSalaryRate" min="0" step="0.01" placeholder="0.00" value="${existing?.salaryRate||''}" />
            </div>
          </div>
        </div>
        <div style="display:flex;gap:10px;margin-top:18px">
          <button class="btn btn-ghost btn-full" id="cancelAddEmp">Cancel</button>
          <button class="btn btn-green btn-full" id="saveAddEmp">${isEdit?'Save Changes':'Add Cashier'}</button>
        </div>
        ${isEdit ? `
          <button class="btn btn-full" id="toggleEmpActive" style="margin-top:8px;background:${existing.active===false?'rgba(52,211,153,0.1)':'rgba(239,68,68,0.1)'};color:${existing.active===false?'#34d399':'#f87171'};border:1px solid ${existing.active===false?'rgba(52,211,153,0.3)':'rgba(239,68,68,0.3)'}">${existing.active===false?'Re-activate Cashier':'Deactivate Cashier'}</button>
          <button class="btn btn-full" id="btnDeleteEmp" style="margin-top:8px;background:rgba(185,28,28,0.12);color:#fca5a5;border:1px solid rgba(185,28,28,0.3)">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            Delete Cashier Permanently
          </button>` : ''}
      </div>`;
      document.body.appendChild(modal);
      modal.onclick = e => { if (e.target === modal) modal.remove(); };
      document.getElementById('cancelAddEmp').onclick = () => modal.remove();

      document.getElementById('saveAddEmp').onclick = async () => {
        const name  = document.getElementById('empName').value.trim();
        const email = document.getElementById('empEmail').value.trim().toLowerCase();
        const role  = document.getElementById('empRole').value.trim();
        const contact    = document.getElementById('empContact').value.trim();
        const salaryType = document.getElementById('empSalaryType').value;
        const salaryRate = parseFloat(document.getElementById('empSalaryRate').value) || 0;
        if (!name || !email) { alert('Name and email are required.'); return; }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { alert('Invalid email address.'); return; }
        await ensureOrgDoc();
        const data = { name, email, role, contact, salaryType, salaryRate, active: true };
        let empId;
        if (isEdit) {
          await db.collection(empPath()).doc(existing._id).update(data);
          empId = existing._id;
        } else {
          data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
          const ref = await db.collection(empPath()).add(data);
          empId = ref.id;
        }
        // Write/update employeeLinks so the cashier can log in without collectionGroup query
        await writeEmployeeLink({ email, active: true }, empId);
        modal.remove();
        await refreshEmployeeList();
      };

      if (isEdit) {
        document.getElementById('toggleEmpActive').onclick = async () => {
          const newActive = existing.active === false;
          if (!confirm(newActive ? 'Re-activate this employee?' : 'Deactivate this employee?')) return;
          await db.collection(empPath()).doc(existing._id).update({ active: newActive });
          await writeEmployeeLink({ email: existing.email, active: newActive }, existing._id);
          // Also update employeeUids active flag (best-effort)
          try {
            const euSnap = await db.collection('employeeUids')
              .where('employeeId','==',existing._id).limit(1).get();
            if (!euSnap.empty) await euSnap.docs[0].ref.update({ active: newActive });
          } catch(e) {}
          modal.remove();
          await refreshEmployeeList();
        };
        document.getElementById('btnDeleteEmp').onclick = async () => {
          if (!confirm(`Permanently delete ${existing.name}? This cannot be undone. All their shifts and salary records will remain but the cashier account will be removed.`)) return;
          try {
            // Delete the cashier doc
            await db.collection(empPath()).doc(existing._id).delete();
            // Delete the employeeLinks doc so they can't log in
            const linkKey = emailToKey(existing.email);
            try { await db.collection('employeeLinks').doc(linkKey).delete(); } catch(e) {}
            modal.remove();
            await refreshEmployeeList();
          } catch(e) {
            alert('Delete failed: ' + e.message);
          }
        };
      }
    }

    // ────────────────────────────────────────────────────────────
    // OPERATING EXPENSES: fetch salary data for global analytics
    // ────────────────────────────────────────────────────────────
    async function fetchOperatingExpenses(fromDate, toDate) {
      if (state.empRole === 'employee') return { total: 0, paid: 0, unpaid: 0, employees: [] };
      if (!state.empOrgId) return { total: 0, paid: 0, unpaid: 0, employees: [] };
      try {
        const [cashiers, allShifts, allPayments] = await Promise.all([
          fetchEmployees(),
          fetchShifts(fromDate, toDate, null),
          db.collection(payPath()).get().then(s => s.docs.map(d => ({_id:d.id,...d.data()}))).catch(()=>[]),
        ]);
        let total = 0, paid = 0, unpaid = 0;
        const empDetails = cashiers.map(emp => {
          const empShifts = allShifts.filter(s => s.employeeId === emp._id);
          const ms = empShifts.reduce((s,sh) => s + (sh.durationMs||0), 0);
          const earned = calcEarnings(emp, ms);
          const empPayments = allPayments.filter(p => p.employeeId === emp._id);
          const periods = buildSalaryPeriods(emp, empShifts, empPayments, fromDate, toDate);
          const periodPaid   = periods.reduce((s,p) => s + p.paid, 0);
          const periodUnpaid = periods.reduce((s,p) => s + p.unpaid, 0);
          total  += earned;
          paid   += periodPaid;
          unpaid += periodUnpaid;
          return { emp, ms, earned, periodPaid, periodUnpaid, periods };
        }).filter(e => e.ms > 0 || e.earned > 0);
        return { total, paid, unpaid, employees: empDetails };
      } catch(e) {
        console.warn('[opEx] fetch failed:', e.message);
        return { total: 0, paid: 0, unpaid: 0, employees: [] };
      }
    }

    // ============================================================
    // PWA Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/Game/sw.js', { scope: '/Game/' })
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(e => console.log('SW:', e.message));
    }
    // Initial render
    render();
  </script>
