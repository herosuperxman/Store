<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>GameOps — Store Manager</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="GameOps"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <!-- Firebase v9 compat -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    /* ===== THEME: SweepAdmin-inspired dark purple/cyan ===== */
    :root {
      --bg: #07071a;
      --bgCard: rgba(18,16,32,0.78);
      --bgInput: rgba(22,18,38,0.85);
      --bgHover: rgba(30,27,48,0.85);
      --purple: #7c3aed;
      --purpleLight: #a78bfa;
      --purpleDark: #1a0a3e;
      --cyan: #06b6d4;
      --green: #10b981;
      --red: #ef4444;
      --orange: #f59e0b;
      --pink: #ec4899;
      --blue: #3b82f6;
      --textPrimary: #f7f5fc;
      --textSecondary: #d8d0f2;
      --textMuted: #aaa2cc;
      --border: rgba(70,58,120,0.55);
      --glass: rgba(20,16,40,0.55);
      --glassBorder: rgba(120,100,200,0.22);
      --glassHover: rgba(30,24,55,0.72);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #07071a;
      color: var(--textPrimary);
      font-family: 'Rajdhani','Exo 2',sans-serif;
      font-weight: 500;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background — mesh gradients + grid */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 15% 50%, rgba(147,51,234,0.22) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 15%, rgba(0,229,255,0.14) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 85%, rgba(255,62,181,0.12) 0%, transparent 40%),
        radial-gradient(ellipse at 60% 40%, rgba(16,185,129,0.07) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(147,51,234,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(147,51,234,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }

    #app { position: relative; z-index: 1; min-height: 100vh; }

    h1,h2,h3,h4,.heading { font-family:'Orbitron',monospace; letter-spacing:1px; }
    input,select,textarea,button { font-family:'Rajdhani',sans-serif; font-weight:500; }

    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover { background:var(--purple); }

    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { animation: fadeIn 0.3s ease-out; }

    /* ===== HEADER ===== */
    .header {
      position: sticky; top: 0; z-index: 100;
      height: 56px; display: flex; align-items: center;
      justify-content: space-between; padding: 0 16px;
      background: var(--glass); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--glassBorder);
    }
    .header-logo { display:flex; align-items:center; gap:10px; cursor:pointer; }
    .header-logo-text { font-family:'Orbitron',monospace; font-size:14px; font-weight:900; color:var(--purpleLight); letter-spacing:2px; }
    .header-actions { display:flex; align-items:center; gap:8px; }

    /* ===== UTILITY BAR ===== */
    .utility-bar {
      display:flex; align-items:center; justify-content:space-between;
      padding:6px 16px; background:rgba(10,8,24,0.6);
      border-bottom:1px solid rgba(70,58,120,0.25);
      font-size:11px; color:var(--textMuted);
      font-family:'Rajdhani',sans-serif; font-weight:600; letter-spacing:0.5px;
    }

    /* ===== PAGE ===== */
    .page { padding:18px 16px; max-width:900px; margin:0 auto; }

    /* ===== CARDS ===== */
    .card {
      background: var(--bgCard);
      border: 1px solid var(--glassBorder);
      border-radius: 14px; padding: 16px;
      backdrop-filter: blur(8px);
    }
    .card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .card-title { font-family:'Orbitron',monospace; font-size:12px; color:var(--purpleLight); letter-spacing:1px; text-transform:uppercase; }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 9px 18px; border-radius: 9px; border: none; cursor: pointer;
      font-family:'Rajdhani',sans-serif; font-weight:700; font-size:14px;
      transition: all 0.18s; white-space: nowrap; text-decoration: none;
    }
    .btn:disabled { opacity:0.5; cursor:not-allowed; }
    .btn-primary { background:var(--purple); color:#fff; }
    .btn-primary:hover:not(:disabled) { background:#6d28d9; transform:translateY(-1px); box-shadow:0 4px 16px rgba(124,58,237,0.4); }
    .btn-secondary { background:var(--bgInput); color:var(--textSecondary); border:1px solid var(--border); }
    .btn-secondary:hover:not(:disabled) { border-color:var(--purple); color:var(--textPrimary); }
    .btn-green { background:rgba(16,185,129,0.15); color:var(--green); border:1px solid rgba(16,185,129,0.35); }
    .btn-green:hover:not(:disabled) { background:rgba(16,185,129,0.25); }
    .btn-amber { background:rgba(245,158,11,0.15); color:var(--orange); border:1px solid rgba(245,158,11,0.35); }
    .btn-amber:hover:not(:disabled) { background:rgba(245,158,11,0.25); }
    .btn-red { background:rgba(239,68,68,0.12); color:var(--red); border:1px solid rgba(239,68,68,0.3); }
    .btn-red:hover:not(:disabled) { background:rgba(239,68,68,0.22); }
    .btn-ghost { background:transparent; color:var(--textMuted); }
    .btn-ghost:hover:not(:disabled) { color:var(--textPrimary); background:var(--bgHover); }
    .btn-full { width:100%; }
    .btn-sm { padding:6px 12px; font-size:12px; border-radius:7px; }

    /* ===== INPUTS ===== */
    .input {
      width: 100%; padding: 10px 12px; border-radius: 9px;
      background: var(--bgInput); border: 1px solid var(--border);
      color: var(--textPrimary); font-size: 14px; font-family:'Rajdhani',sans-serif;
      font-weight:500; outline: none; transition: border-color 0.18s;
    }
    .input:focus { border-color: var(--purple); }
    .input::placeholder { color: var(--textMuted); }
    select.input option { background: #120e26; color: var(--textPrimary); }
    .label { display:block; font-size:11px; color:var(--textMuted); text-transform:uppercase; letter-spacing:0.7px; margin-bottom:4px; font-family:'Rajdhani',sans-serif; font-weight:600; }
    .input-group { display:flex; flex-direction:column; gap:4px; }

    /* ===== BADGES ===== */
    .badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:700; font-family:'Rajdhani',sans-serif; text-transform:uppercase; letter-spacing:0.5px; }
    .badge-green { background:rgba(16,185,129,0.15); color:var(--green); border:1px solid rgba(16,185,129,0.3); }
    .badge-amber { background:rgba(245,158,11,0.15); color:var(--orange); border:1px solid rgba(245,158,11,0.3); }
    .badge-red { background:rgba(239,68,68,0.12); color:var(--red); border:1px solid rgba(239,68,68,0.25); }
    .badge-purple { background:rgba(124,58,237,0.15); color:var(--purpleLight); border:1px solid rgba(124,58,237,0.3); }
    .badge-cyan { background:rgba(6,182,212,0.12); color:var(--cyan); border:1px solid rgba(6,182,212,0.28); }
    .badge-gray { background:rgba(120,100,160,0.15); color:var(--textMuted); border:1px solid var(--border); }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.72); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center; padding: 12px;
    }
    .modal {
      background: linear-gradient(145deg, rgba(18,14,38,0.98), rgba(12,10,28,0.98));
      border: 1px solid var(--glassBorder); border-radius: 18px;
      padding: 20px; width: 100%; max-height: 90vh; overflow-y: auto;
    }
    .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .modal-title { font-family:'Orbitron',monospace; font-size:14px; color:var(--purpleLight); letter-spacing:1px; }

    /* ===== TABS ===== */
    .tabs { display:flex; gap:4px; border-bottom:1px solid var(--border); margin-bottom:16px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .tab { padding:10px 16px; font-size:13px; font-weight:700; font-family:'Rajdhani',sans-serif; color:var(--textMuted); border:none; background:transparent; cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; transition:all 0.18s; }
    .tab.active { color:var(--purpleLight); border-bottom-color:var(--purpleLight); }
    .tab:hover:not(.active) { color:var(--textPrimary); }

    /* ===== STAT CARDS ===== */
    .stat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; margin-bottom:16px; }
    .stat-card { background:var(--bgCard); border:1px solid var(--glassBorder); border-radius:12px; padding:12px; }
    .stat-label { font-size:10px; color:var(--textMuted); text-transform:uppercase; letter-spacing:0.7px; font-family:'Rajdhani',sans-serif; font-weight:600; margin-bottom:4px; }
    .stat-value { font-size:20px; font-weight:700; font-family:'Orbitron',monospace; }
    .stat-cyan { color:var(--cyan); }
    .stat-green { color:var(--green); }
    .stat-amber { color:var(--orange); }
    .stat-purple { color:var(--purpleLight); }
    .stat-red { color:var(--red); }

    /* ===== TABLES ===== */
    .table-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th { padding:8px 10px; text-align:left; font-size:10px; text-transform:uppercase; letter-spacing:0.7px; color:var(--textMuted); font-family:'Rajdhani',sans-serif; font-weight:600; border-bottom:1px solid var(--border); }
    td { padding:9px 10px; border-bottom:1px solid rgba(70,58,120,0.2); vertical-align:middle; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:var(--bgHover); }

    /* ===== DIVIDER ===== */
    .divider { height:1px; background:var(--border); margin:12px 0; }

    /* ===== AVATAR ===== */
    .avatar { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,var(--purple),var(--cyan)); display:inline-flex; align-items:center; justify-content:center; font-weight:800; color:#fff; font-size:14px; flex-shrink:0; font-family:'Orbitron',monospace; }

    /* ===== CLOCK-IN CARD ===== */
    .clock-card {
      background: linear-gradient(135deg,rgba(6,182,212,0.1),rgba(16,185,129,0.07));
      border: 1px solid rgba(6,182,212,0.28); border-radius: 12px; padding: 12px;
      display:flex; flex-direction:column; gap:8px;
    }
    .clock-card.clocked { background:linear-gradient(135deg,rgba(16,185,129,0.15),rgba(6,182,212,0.07)); border-color:rgba(16,185,129,0.35); }
    .clock-name { font-weight:700; font-size:14px; color:var(--textPrimary); }
    .clock-role { font-size:11px; color:var(--textMuted); }
    .clock-status { font-size:11px; }
    .clocked .clock-status { color:var(--green); }

    /* ===== QUICK ACTIONS ===== */
    .quick-action-bar { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
    .quick-btn-cashin {
      padding:16px 10px; font-size:14px; font-weight:800;
      background:linear-gradient(135deg,rgba(16,185,129,0.2),rgba(16,185,129,0.07));
      border:2px solid rgba(16,185,129,0.45); color:#34d399;
      border-radius:12px; font-family:'Orbitron',monospace; letter-spacing:0.5px;
      display:flex; align-items:center; justify-content:center; gap:8px;
      cursor:pointer; transition:all 0.18s;
    }
    .quick-btn-cashin:hover { background:linear-gradient(135deg,rgba(16,185,129,0.32),rgba(16,185,129,0.14)); box-shadow:0 0 18px rgba(16,185,129,0.25); }
    .quick-btn-cashout {
      padding:16px 10px; font-size:14px; font-weight:800;
      background:linear-gradient(135deg,rgba(245,158,11,0.2),rgba(245,158,11,0.07));
      border:2px solid rgba(245,158,11,0.45); color:#fbbf24;
      border-radius:12px; font-family:'Orbitron',monospace; letter-spacing:0.5px;
      display:flex; align-items:center; justify-content:center; gap:8px;
      cursor:pointer; transition:all 0.18s;
    }
    .quick-btn-cashout:hover { background:linear-gradient(135deg,rgba(245,158,11,0.32),rgba(245,158,11,0.14)); box-shadow:0 0 18px rgba(245,158,11,0.25); }

    /* ===== TRANSACTION ROW ===== */
    .tx-row { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid rgba(70,58,120,0.18); }
    .tx-row:last-child { border-bottom:none; }
    .tx-type { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
    .tx-type.in { background:var(--green); box-shadow:0 0 6px rgba(16,185,129,0.5); }
    .tx-type.out { background:var(--orange); box-shadow:0 0 6px rgba(245,158,11,0.5); }

    /* ===== AUTH SCREEN ===== */
    .auth-screen {
      min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
    }
    .auth-card {
      background:linear-gradient(145deg,rgba(18,14,38,0.98),rgba(12,10,28,0.95));
      border:1px solid var(--glassBorder); border-radius:22px; padding:32px 28px;
      width:100%; max-width:360px; text-align:center;
    }
    .auth-logo { font-family:'Orbitron',monospace; font-size:26px; font-weight:900; color:var(--purpleLight); letter-spacing:3px; margin-bottom:4px; }
    .auth-sub { font-size:12px; color:var(--textMuted); margin-bottom:28px; letter-spacing:1px; }

    /* ===== SEARCH ===== */
    .search-wrap { position:relative; }
    .search-wrap .search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--textMuted); pointer-events:none; }
    .search-wrap .input { padding-left:38px; }

    /* ===== TOAST ===== */
    #toastContainer { position:fixed; bottom:20px; right:16px; z-index:9999; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
    .toast { padding:10px 16px; border-radius:10px; font-size:13px; font-weight:600; font-family:'Rajdhani',sans-serif; animation:slideDown 0.25s ease-out; backdrop-filter:blur(12px); min-width:200px; max-width:300px; }
    .toast-success { background:rgba(16,185,129,0.9); color:#fff; }
    .toast-error { background:rgba(239,68,68,0.9); color:#fff; }
    .toast-info { background:rgba(124,58,237,0.9); color:#fff; }

    /* ===== NAV PANEL ===== */
    .nav-panel {
      position:fixed; top:0; right:0; bottom:0; width:260px; z-index:300;
      background:linear-gradient(180deg,rgba(14,10,32,0.98),rgba(10,8,24,0.98));
      border-left:1px solid var(--glassBorder); backdrop-filter:blur(16px);
      transform:translateX(100%); transition:transform 0.25s ease-out;
      display:flex; flex-direction:column; padding:16px;
      overflow-y:auto;
    }
    .nav-panel.open { transform:translateX(0); }
    .nav-item {
      display:flex; align-items:center; gap:10px; padding:11px 12px; border-radius:10px;
      font-size:14px; font-weight:600; color:var(--textSecondary); cursor:pointer;
      transition:all 0.15s; margin-bottom:2px;
    }
    .nav-item:hover { background:var(--bgHover); color:var(--textPrimary); }
    .nav-item.active { background:rgba(124,58,237,0.18); color:var(--purpleLight); border:1px solid rgba(124,58,237,0.25); }
    .nav-divider { height:1px; background:var(--border); margin:8px 0; }
    .nav-overlay { position:fixed; inset:0; z-index:299; background:rgba(0,0,0,0.5); display:none; }
    .nav-overlay.open { display:block; }

    /* ===== PLAYER AVATAR ===== */
    .player-avatar { width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,var(--purple),var(--pink)); display:flex; align-items:center; justify-content:center; font-weight:800; color:#fff; font-size:15px; flex-shrink:0; }

    /* ===== MOBILE ===== */
    @media (max-width:600px) {
      .page { padding:14px 12px; }
      .stat-grid { grid-template-columns:1fr 1fr; }
      .modal { padding:16px 14px; }
      .modal-overlay { padding:8px; }
      .header { padding:0 12px; }
      .nav-panel { width:100%; max-width:280px; }
      .quick-action-bar { grid-template-columns:1fr 1fr; }
      .quick-btn-cashin, .quick-btn-cashout { font-size:12px; padding:14px 8px; letter-spacing:0; }
    }
    @media (max-width:400px) {
      .stat-grid { grid-template-columns:1fr 1fr; }
      .quick-action-bar { grid-template-columns:1fr 1fr; }
    }
  </style>
</head>
<body>
<div id="app"></div>
<div id="toastContainer"></div>
<div class="nav-overlay" id="navOverlay" onclick="closeNav()"></div>
<div class="nav-panel" id="navPanel">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <span style="font-family:'Orbitron',monospace;font-size:13px;color:var(--purpleLight);font-weight:900;letter-spacing:2px">GAMEOPS</span>
    <button class="btn btn-ghost btn-sm" onclick="closeNav()">✕</button>
  </div>
  <div class="nav-item" data-view="dashboard" onclick="navTo('dashboard')">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Dashboard
  </div>
  <div class="nav-item" data-view="cashin" onclick="navTo('cashin')">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
    <span style="color:var(--green)">Cash In</span>
  </div>
  <div class="nav-item" data-view="cashout" onclick="navTo('cashout')">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--orange)" stroke-width="2"><path d="M12 19V5M5 12l7 7 7-7"/></svg>
    <span style="color:var(--orange)">Cash Out</span>
  </div>
  <div class="nav-divider"></div>
  <div class="nav-item" data-view="players" onclick="navTo('players')">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="5"/><path d="M3 21v-2a7 7 0 0114 0v2"/></svg>
    Players
  </div>
  <div class="nav-item" data-view="staff" onclick="navTo('staff')">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
    <span style="color:var(--cyan)">Staff</span>
  </div>
  <div class="nav-item" data-view="games" onclick="navTo('games')">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--purpleLight)" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><circle cx="16" cy="11" r="1" fill="var(--purpleLight)"/><circle cx="18" cy="13" r="1" fill="var(--purpleLight)"/></svg>
    <span style="color:var(--purpleLight)">Games</span>
  </div>
  <div class="nav-divider"></div>
  <div class="nav-item" data-view="reports" onclick="navTo('reports')">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--orange)" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    <span style="color:var(--orange)">Reports</span>
  </div>
  <div style="flex:1"></div>
  <div class="nav-divider"></div>
  <div class="nav-item" id="navUser" style="opacity:0.7;cursor:default;font-size:12px"></div>
  <div class="nav-item" style="color:var(--red)" onclick="doSignOut()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    Sign Out
  </div>

// Points ↔ Dollars: rate is %, so 5000pts @ 5% = $250
function ptsToDollars(pts, ratePercent) {
  return (pts * (parseFloat(ratePercent)||0)) / 100;
}
function dollarsToPts(dollars, ratePercent) {
  const r = parseFloat(ratePercent)||0;
  if (!r) return 0;
  return (dollars / r) * 100;
}

function bindAuth() {
  let isRegister = false;
  $('toggleRegister').onclick = e => {
    e.preventDefault();
    isRegister = !isRegister;
    $('loginBtn').textContent = isRegister ? 'Create Account' : 'Sign In';
    $('toggleRegister').textContent = isRegister ? 'Already have an account? Sign in' : 'Need an account? Register';
  };
  const doAuth = async () => {
    const email = $('authEmail').value.trim();
    const pass = $('authPass').value;
    const btn = $('loginBtn');
    if (!email||!pass) { $('authErr').textContent='Email and password required'; return; }
    btn.disabled=true; btn.textContent = isRegister ? 'Creating...' : 'Signing in...';
    $('authErr').textContent='';
    try {
      if (isRegister) await auth.createUserWithEmailAndPassword(email, pass);
      else await auth.signInWithEmailAndPassword(email, pass);
    } catch(e) {
      $('authErr').textContent = e.message.replace('Firebase: ','').replace(/\(auth.*\)/,'').trim();
      btn.disabled=false; btn.textContent = isRegister ? 'Create Account' : 'Sign In';
    }
  };
  $('loginBtn').onclick = doAuth;
  $('authPass').onkeydown = e => { if(e.key==='Enter') doAuth(); };

  const googleBtnEl = $('googleBtn');
  const googleBtnHTML = googleBtnEl.innerHTML;
  googleBtnEl.onclick = async () => {
    googleBtnEl.disabled = true;
    googleBtnEl.textContent = 'Signing in...';
    $('authErr').textContent = '';
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      await auth.signInWithPopup(provider);
    } catch(e) {
      $('authErr').textContent = e.message.replace('Firebase: ','').replace(/\(auth.*\)/,'').trim();
      googleBtnEl.disabled = false;
      googleBtnEl.innerHTML = googleBtnHTML;
    }
  };
}

async function bindDashboard() {
  bindHeader();
  const dd = $('dashDate');
  if (dd) dd.textContent = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

  // Load today's transactions
  const today = new Date(); today.setHours(0,0,0,0);
  try {
    const snap = await db.collection(uPath()+'/transactions')
      .where('date','>=',firebase.firestore.Timestamp.fromDate(today))
      .orderBy('date','desc').limit(50).get();
    const txs = snap.docs.map(d=>({_id:d.id,...d.data()}));
    const ins = txs.filter(t=>t.type==='cashin');
    const outs = txs.filter(t=>t.type==='cashout');
    const totalIn = ins.reduce((a,t)=>a+(t.amount||0),0);
    const totalOut = outs.reduce((a,t)=>a+(t.amount||0),0);
    const net = totalIn - totalOut;
    if ($('statTodayIn'))    $('statTodayIn').textContent    = '$'+fmt$(totalIn);
    if ($('statTodayOut'))   $('statTodayOut').textContent   = '$'+fmt$(totalOut);
    if ($('statTodayCount')) $('statTodayCount').textContent = txs.length;
    if ($('statNet'))        { $('statNet').textContent = '$'+fmt$(Math.abs(net)); $('statNet').style.color = net>=0?'var(--green)':'var(--red)'; }
    const listEl = $('recentTxList');
    if (listEl) {
      if (!txs.length) { listEl.innerHTML = '<div style="color:var(--textMuted);font-size:13px;padding:8px 0">No transactions today</div>'; }
      else listEl.innerHTML = txs.slice(0,10).map(t=>{
        const d = t.date?t.date.toDate():new Date();
        return `<div class="tx-row">
          <div class="tx-type ${t.type==='cashin'?'in':'out'}"></div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;color:var(--textPrimary)">@${esc(t.username||'?')} · ${esc(t.gameName||'')}</div>
            <div style="font-size:11px;color:var(--textMuted)">${d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true})} · ${esc(t.staffName||'')}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:13px;font-weight:700;color:${t.type==='cashin'?'var(--green)':'var(--orange)'}">$${fmt$(t.amount)}</div>
            <div style="font-size:10px;color:var(--textMuted)">${fmtPts(t.points)} pts</div>
          </div>
        </div>`;
      }).join('');
    }
  } catch(e) { console.warn('Dashboard stats error:', e.message); }

  // Active clock-ins
  try {
    const today2 = new Date(); today2.setHours(0,0,0,0);
    const shiftsSnap = await db.collection(uPath()+'/shifts')
      .where('date','>=',firebase.firestore.Timestamp.fromDate(today2))
      .where('clockOut','==',null).get();
    const activeShifts = shiftsSnap.docs.map(d=>({_id:d.id,...d.data()}));
    const el = $('activeClockIns');
    if (el) {
      if (!activeShifts.length) { el.innerHTML = '<div style="color:var(--textMuted);font-size:13px;padding:8px 0">No staff currently clocked in</div>'; }
      else el.innerHTML = `<div style="display:flex;flex-wrap:wrap;gap:8px">${activeShifts.map(s=>`
        <div style="background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:9px;padding:8px 12px;display:flex;align-items:center;gap:8px">
          <span style="width:7px;height:7px;background:var(--green);border-radius:50%;box-shadow:0 0 6px rgba(16,185,129,0.6)"></span>
          <span style="font-size:13px;font-weight:600;color:var(--textPrimary)">${esc(s.staffName||'?')}</span>
          <span style="font-size:11px;color:var(--green)">${getElapsed(s.clockIn?.toDate())}</span>
        </div>`).join('')}</div>`;
    }
  } catch(e) {}
}

let txMode = 'points';
let txGames = [];
let txCurrentGame = null;

window.setTxMode = function(m) {
  txMode = m;
  const pBtn = $('modePoints'), dBtn = $('modeDollars');
  if (pBtn) { pBtn.style.background = m==='points'?'var(--purple)':'var(--bgInput)'; pBtn.style.color = m==='points'?'#fff':'var(--textMuted)'; }
  if (dBtn) { dBtn.style.background = m==='dollars'?'var(--purple)':'var(--bgInput)'; dBtn.style.color = m==='dollars'?'#fff':'var(--textMuted)'; }
  if ($('txInputLabel'))  $('txInputLabel').textContent  = m==='points'?'Points':'Amount ($)';
  if ($('txOutputLabel')) $('txOutputLabel').textContent = m==='points'?'Amount ($)':'Points';
  if ($('txInput'))  $('txInput').value = '';
  if ($('txOutput')) $('txOutput').value = '';
};

window.calcTx = function() {
  const g = txCurrentGame;
  const rate = g ? (parseFloat(g.costRate)||0) : 0;
  const rateEl = $('txRateDisplay');
  if (rateEl) {
    if (rate && g) {
      rateEl.style.display = 'block';
      rateEl.innerHTML = `<span style="color:var(--purpleLight)">${esc(g.name)}</span> · Rate: <span style="color:var(--cyan);font-weight:700">${rate}%</span> &nbsp; <span style="color:var(--textMuted);font-size:10px">(${fmtPts(1000)} pts → $${fmt$(ptsToDollars(1000,rate))})</span>`;
    } else rateEl.style.display = 'none';
  }
  if (!rate) return;
  const inp = parseFloat($('txInput')?.value)||0;
  const out = parseFloat($('txOutput')?.value)||0;
  if (txMode==='points') {
    if (inp && $('txOutput') && document.activeElement !== $('txOutput'))
      $('txOutput').value = fmt$(ptsToDollars(inp, rate));
  } else {
    if (out && $('txInput') && document.activeElement !== $('txInput'))
      $('txInput').value = Math.round(dollarsToPts(out, rate));
  }
};

async function bindTransactionPage(type) {

window.selectPlayer = function(pJson) {

async function loadTodayTxns(type) {
  const el = $('txTodayList'); if (!el) return;
  const today = new Date(); today.setHours(0,0,0,0);
  try {
    const snap = await db.collection(uPath()+'/transactions')
      .where('type','==',type)
      .where('date','>=',firebase.firestore.Timestamp.fromDate(today))
      .orderBy('date','desc').limit(20).get();
    const txs = snap.docs.map(d=>({_id:d.id,...d.data()}));
    if (!txs.length) { el.innerHTML='<div style="color:var(--textMuted);font-size:13px;padding:8px 0">None yet today</div>'; return; }
    const total = txs.reduce((a,t)=>a+(t.amount||0),0);
    el.innerHTML = `<div style="font-size:12px;color:var(--textMuted);margin-bottom:8px">Total: <span style="font-weight:700;color:${type==='cashin'?'var(--green)':'var(--orange)'};font-family:'Orbitron',monospace">$${fmt$(total)}</span> · ${txs.length} txn${txs.length!==1?'s':''}</div>` +
      txs.map(t=>{
        const d = t.date?t.date.toDate():new Date();
        return `<div class="tx-row">
          <div class="tx-type ${type==='cashin'?'in':'out'}"></div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600">@${esc(t.username||'?')} · <span style="color:var(--textMuted)">${esc(t.gameName||'')}</span></div>
            <div style="font-size:11px;color:var(--textMuted)">${d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true})}${t.staffName?' · '+esc(t.staffName):''}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-weight:700;color:${type==='cashin'?'var(--green)':'var(--orange)'}">$${fmt$(t.amount)}</div>
            <div style="font-size:10px;color:var(--textMuted)">${fmtPts(t.points)} pts</div>
          </div>
        </div>`;
      }).join('');
  } catch(e) { el.innerHTML = `<div style="color:var(--red);font-size:12px">Error: ${e.message}</div>`; }
}

async function submitTransaction(type) {
  const username = $('txUsername')?.value?.trim()?.toLowerCase();
  const gameId = $('txGame')?.value;
  const inputVal = parseFloat($('txInput')?.value)||0;
  const outputVal = parseFloat($('txOutput')?.value)||0;
  const notes = $('txNotes')?.value?.trim();
  const staffId = $('txStaff')?.value;
  const staffName = $('txStaff')?.options[$('txStaff')?.selectedIndex]?.text?.replace('— Select Staff —','').trim();

  if (!username) { toast('Player username required','error'); return; }
  if (!gameId) { toast('Select a game','error'); return; }
  if (!inputVal && !outputVal) { toast('Enter amount or points','error'); return; }

  const game = txCurrentGame || txGames.find(g=>g._id===gameId);
  const rate = game ? (parseFloat(game.costRate)||0) : 0;
  let points = txMode==='points' ? inputVal : Math.round(dollarsToPts(outputVal, rate));
  let amount = txMode==='points' ? ptsToDollars(inputVal, rate) : outputVal;

  const btn = $('txSubmitBtn');
  btn.disabled=true; btn.textContent='Processing...';
  try {
    await db.collection(uPath()+'/transactions').add({
      type, username, gameId, gameName: game?.name||'', points, amount,
      rate, notes: notes||'', staffId: staffId||'', staffName: staffName||'',
      date: firebase.firestore.Timestamp.now()
    });
    toast(`${type==='cashin'?'Cash In':'Cashout'} recorded — $${fmt$(amount)} · ${fmtPts(points)} pts`, 'success', 3500);
    $('txInput').value = ''; $('txOutput').value = '';
    $('txUsername').value = ''; $('playerInfo').innerHTML='';
    $('playerSuggestions').innerHTML='';
    loadTodayTxns(type);
  } catch(e) { toast('Error: '+e.message,'error'); }
  finally { btn.disabled=false; btn.textContent = type==='cashin'?'PROCESS CASH IN':'PROCESS CASHOUT'; }
}

const SALARY_TYPES = [{v:'hourly',l:'Hourly'},{v:'daily',l:'Daily'},{v:'weekly',l:'Weekly'},{v:'biweekly',l:'Bi-Weekly'},{v:'monthly',l:'Monthly'}];

function renderStaffPage() {

function getElapsed(start) {
  if (!start) return '';
  const ms = Date.now() - start.getTime();
  const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000);
  return h>0 ? `${h}h ${m}m` : `${m}m`;
}

async function loadClockPanel() {
  const el = $('clockPanel'); if (!el) return;
  try {
    const sSnap = await db.collection(uPath()+'/staff').where('active','==',true).orderBy('name').get();
    if (sSnap.empty) { el.innerHTML = '<div style="color:var(--textMuted);font-size:13px">No active staff. Add staff below.</div>'; return; }
    const staffList = sSnap.docs.map(d=>({_id:d.id,...d.data()}));
    const today = new Date(); today.setHours(0,0,0,0);
    const shiftsSnap = await db.collection(uPath()+'/shifts')
      .where('date','>=',firebase.firestore.Timestamp.fromDate(today)).get();
    const openShifts = {};
    shiftsSnap.docs.forEach(d=>{ const s=d.data(); if(!s.clockOut) openShifts[s.staffId]={_id:d.id,...s}; });
    el.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px">
      ${staffList.map(s=>{
        const open = openShifts[s._id];
        const clocked = !!open;
        return `<div class="clock-card ${clocked?'clocked':''}">
          <div class="clock-name">${esc(s.name)}</div>
          <div class="clock-role">${esc(s.role||'Staff')}</div>
          <div class="clock-status">${clocked?`🟢 ${getElapsed(open.clockIn?.toDate())}`:'⚫ Off duty'}</div>
          <button class="btn ${clocked?'btn-red':'btn-green'} btn-sm" style="font-size:12px" onclick="${clocked?`doClockOut('${s._id}','${open._id}')`:`doClockIn('${s._id}','${esc(s.name)}')`}">${clocked?'Clock Out':'Clock In'}</button>
        </div>`;
      }).join('')}
    </div>`;
  } catch(e) { el.innerHTML = `<div style="color:var(--red);font-size:12px">Error: ${e.message}</div>`; }
}

window.doClockIn = async function(staffId, staffName) {
  try {
    await db.collection(uPath()+'/shifts').add({
      staffId, staffName, clockIn: firebase.firestore.Timestamp.now(),
      clockOut: null, date: firebase.firestore.Timestamp.now(), hours: null
    });
    toast(`${staffName} clocked in!`, 'success');
    loadClockPanel(); loadStaffList();
  } catch(e) { toast('Error: '+e.message,'error'); }
};

window.doClockOut = async function(staffId, shiftId) {
  try {
    const clockOut = firebase.firestore.Timestamp.now();
    const sd = await db.collection(uPath()+'/shifts').doc(shiftId).get();
    const hours = (clockOut.toDate() - sd.data().clockIn.toDate()) / 3600000;
    await db.collection(uPath()+'/shifts').doc(shiftId).update({ clockOut, hours: parseFloat(hours.toFixed(2)) });
    toast(`Clocked out! ${hours.toFixed(2)}h worked`, 'success');
    loadClockPanel(); loadStaffList();
  } catch(e) { toast('Error: '+e.message,'error'); }
};

async function loadStaffList() {
  const el = $('staffList'); if (!el) return;
  try {
    const snap = await db.collection(uPath()+'/staff').orderBy('name').get();
    if (snap.empty) { el.innerHTML = '<div style="text-align:center;padding:24px;color:var(--textMuted)">No staff yet. Click "+ Add Staff"</div>'; return; }

      ${snap.docs.map(d=>{
        const s={_id:d.id,...d.data()};
        const owed=unpaidMap[s._id]||0;
        const st = SALARY_TYPES.find(x=>x.v===s.salaryType)||{l:'mo'};
        const rateStr = `$${fmt$(s.salaryRate||0)}/${st.l.toLowerCase()}`;
        return `<div class="card" style="padding:12px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
            <div>
              <div style="font-weight:700;font-size:15px">${esc(s.name)}</div>
              <div style="font-size:11px;color:var(--textMuted)">${esc(s.role||'Staff')} · <span style="color:var(--cyan)">${rateStr}</span></div>
            </div>
            <span class="badge ${s.active!==false?'badge-green':'badge-gray'}">${s.active!==false?'Active':'Off'}</span>
          </div>
          ${owed>0?`<div style="font-size:12px;color:var(--orange);margin-bottom:8px">💰 Unpaid: $${fmt$(owed)}</div>`:''}
          <div style="display:flex;gap:5px;flex-wrap:wrap">
            <button class="btn btn-secondary btn-sm" onclick="showStaffDetail('${s._id}')">Detail</button>
            <button class="btn btn-secondary btn-sm" onclick="showAddPaymentModal('${s._id}')">Payment</button>
            <button class="btn btn-secondary btn-sm" onclick="showStaffShifts('${s._id}','${esc(s.name)}',${s.salaryRate||0},'${s.salaryType||'hourly'}')">Shifts</button>
          </div>
        </div>`;
      }).join('')}

      <div style="background:rgba(245,158,11,0.1);border-radius:10px;padding:10px;text-align:center"><div class="stat-label">Unpaid</div><div class="stat-value stat-amber" style="font-size:16px">$${fmt$(totalOwed)}</div></div>

window.showStaffShifts = async function(staffId, staffName, salaryRate, salaryType) {

  const ov = document.createElement('div'); ov.className='modal-overlay';

    <div class="modal-header"><h3 class="modal-title">${esc(staffName)} — Shifts</h3>

      <div style="background:rgba(6,182,212,0.1);border-radius:10px;padding:10px;text-align:center"><div class="stat-label">Hours (30 shifts)</div><div class="stat-value stat-cyan" style="font-size:18px">${totalHours.toFixed(2)}h</div></div>
      ${estPay>0?`<div style="background:rgba(16,185,129,0.1);border-radius:10px;padding:10px;text-align:center"><div class="stat-label">Est. Pay</div><div class="stat-value stat-green" style="font-size:18px">$${fmt$(estPay)}</div></div>`:'<div></div>'}

        return `<div class="tx-row">
          <div style="flex:1;min-width:0">

            <div style="font-size:11px;color:var(--textMuted)">${ci?ci.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true}):'?'} → ${co?co.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true}):'Still clocked in'}</div>

          <div style="text-align:right;flex-shrink:0">

  bindHeader();

async function loadGamesList() {
  const el = $('gamesList'); if (!el) return;
  try {
    const snap = await db.collection(uPath()+'/games').orderBy('name').get();
    if (snap.empty) { el.innerHTML='<div style="text-align:center;padding:24px;color:var(--textMuted)">No games yet. Add games to use them in transactions.</div>'; return; }
    el.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px">
      ${snap.docs.map(d=>{
        const g={_id:d.id,...d.data()};
        return `<div class="card" style="padding:12px;border-color:${g.active!==false?'rgba(124,58,237,0.25)':'var(--glassBorder)'}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
            <div style="font-weight:700;font-size:14px">${esc(g.name)}</div>
            <span class="badge ${g.active!==false?'badge-green':'badge-gray'}">${g.active!==false?'Active':'Off'}</span>
          </div>
          <div style="font-size:12px;color:var(--textMuted);margin-bottom:2px">Rate: <span style="color:var(--cyan);font-weight:700">${g.costRate||0}%</span></div>
          <div style="font-size:11px;color:var(--textMuted)">1000 pts → <span style="color:var(--green)">$${fmt$(ptsToDollars(1000,g.costRate||0))}</span></div>
          ${g.notes?`<div style="font-size:11px;color:var(--textMuted);margin-top:4px;font-style:italic">${esc(g.notes)}</div>`:''}
          <div style="display:flex;gap:5px;margin-top:8px">
            <button class="btn btn-secondary btn-sm" onclick="showEditGameModal('${g._id}',${JSON.stringify(JSON.stringify(g))})">Edit</button>
            <button class="btn btn-ghost btn-sm" style="color:${g.active!==false?'var(--orange)':'var(--green)'};font-size:11px" onclick="toggleGame('${g._id}',${g.active!==false})">${g.active!==false?'Disable':'Enable'}</button>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  } catch(e) { el.innerHTML=`<div style="color:var(--red);font-size:12px">Error: ${e.message}</div>`; }
}

function showAddGameModal(gameId, existing) {
  const isEdit = !!gameId;
  const g = existing ? JSON.parse(existing) : {};
  const ov = document.createElement('div'); ov.className='modal-overlay';
  ov.innerHTML = `<div class="modal fade-in" style="max-width:380px">
    <div class="modal-header"><h3 class="modal-title">${isEdit?'Edit':'Add'} Game</h3>
      <button class="btn btn-ghost btn-sm" onclick="this.closest('.modal-overlay').remove()">✕</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div class="input-group"><label class="label">Game Name *</label><input class="input" id="gName" value="${esc(g.name||'')}" placeholder="Fire Kirin, Orion Stars..."/></div>
      <div class="input-group">
        <label class="label">Cost Rate (%)</label>
        <input class="input" id="gRate" type="number" value="${g.costRate||''}" placeholder="5" min="0" max="100" step="0.1"/>
        <div style="font-size:11px;color:var(--textMuted);margin-top:3px" id="ratePreview">e.g. 5000 pts at <strong>—</strong>% = <strong>—</strong></div>
      </div>
      <div class="input-group"><label class="label">Notes</label><input class="input" id="gNotes" value="${esc(g.notes||'')}" placeholder="Platform, category..."/></div>
      <button class="btn btn-primary btn-full" id="saveGameBtn">${isEdit?'Update':'Add'} Game</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  ov.onclick = e => { if(e.target===ov) ov.remove(); };
  $('gRate').oninput = function() {
    const r = parseFloat(this.value)||0;
    $('ratePreview').innerHTML = `e.g. 5000 pts at <strong style="color:var(--cyan)">${r}%</strong> = <strong style="color:var(--green)">$${fmt$(ptsToDollars(5000,r))}</strong>`;
  };
  if (g.costRate) $('gRate').dispatchEvent(new Event('input'));
  $('saveGameBtn').onclick = async function() {
    const name = $('gName').value.trim();
    if (!name) { toast('Name required','error'); return; }
    this.disabled=true; this.textContent='Saving...';
    const data = { name, costRate:parseFloat($('gRate').value)||0, notes:$('gNotes').value.trim(), active:true };
    try {
      if (isEdit) await db.collection(uPath()+'/games').doc(gameId).update(data);
      else { data.createdAt=firebase.firestore.Timestamp.now(); await db.collection(uPath()+'/games').add(data); }
      ov.remove(); toast('Game saved!','success'); loadGamesList();
    } catch(e) { toast('Error: '+e.message,'error'); this.disabled=false; this.textContent=isEdit?'Update':'Add'; }
  };
}
window.showEditGameModal = function(id, json) { showAddGameModal(id, json); };
window.toggleGame = async function(id, isActive) {
  await db.collection(uPath()+'/games').doc(id).update({active:!isActive});
  loadGamesList();
};

function renderReportsPage() {
  const now = new Date();
  const f1 = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
  const tod = now.toISOString().split('T')[0];
  return `<div class="page fade-in">
    <h2 style="font-family:'Orbitron',monospace;font-size:17px;color:var(--orange);margin-bottom:14px">📋 Reports</h2>
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
        <div class="input-group" style="flex:1;min-width:120px"><label class="label">From</label><input class="input" type="date" id="repFrom" value="${f1}"/></div>
        <div class="input-group" style="flex:1;min-width:120px"><label class="label">To</label><input class="input" type="date" id="repTo" value="${tod}"/></div>
        <button class="btn btn-primary" id="genRepBtn" style="align-self:flex-end">Generate</button>
      </div>
    </div>
    <div id="repTabs" style="display:none">
      <div class="tabs">
        <button class="tab active" data-rtab="overview" onclick="showRepTab('overview')">Overview</button>
        <button class="tab" data-rtab="players" onclick="showRepTab('players')">Players</button>
        <button class="tab" data-rtab="staff" onclick="showRepTab('staff')">Staff</button>
        <button class="tab" data-rtab="games" onclick="showRepTab('games')">Games</button>
      </div>
      <div id="repContent"></div>
    </div>
  </div>`;
}

let repData = null;

window.showRepTab = function(tab) {
  document.querySelectorAll('[data-rtab]').forEach(t=>t.classList.toggle('active',t.dataset.rtab===tab));
  if (!repData) return;
  const el = $('repContent'); if (!el) return;
  if (tab==='overview') el.innerHTML = renderRepOverview();
  else if (tab==='players') el.innerHTML = renderRepPlayers();
  else if (tab==='staff') el.innerHTML = renderRepStaff();
  else el.innerHTML = renderRepGames();
};

function renderRepOverview() {
  const d = repData;
  return `<div class="stat-grid">
    <div class="stat-card"><div class="stat-label">Total Deposits</div><div class="stat-value stat-green">$${fmt$(d.totalIn)}</div></div>
    <div class="stat-card"><div class="stat-label">Total Cashouts</div><div class="stat-value stat-amber">$${fmt$(d.totalOut)}</div></div>
    <div class="stat-card"><div class="stat-label">Net</div><div class="stat-value" style="color:${d.totalIn-d.totalOut>=0?'var(--green)':'var(--red)'}">$${fmt$(Math.abs(d.totalIn-d.totalOut))}</div></div>
    <div class="stat-card"><div class="stat-label">Total Txns</div><div class="stat-value stat-cyan">${d.txs.length}</div></div>
    <div class="stat-card"><div class="stat-label">Active Players</div><div class="stat-value stat-purple">${d.playerMap.size}</div></div>
    <div class="stat-card"><div class="stat-label">Staff Hours</div><div class="stat-value stat-cyan">${d.totalHours.toFixed(1)}h</div></div>
    <div class="stat-card"><div class="stat-label">Staff Paid</div><div class="stat-value stat-green">$${fmt$(d.totalPaid)}</div></div>
    <div class="stat-card"><div class="stat-label">Staff Unpaid</div><div class="stat-value stat-amber">$${fmt$(d.totalUnpaid)}</div></div>
  </div>`;
}

function renderRepPlayers() {
  const rows = [...repData.playerMap.entries()].sort((a,b)=>(b[1].in+b[1].out)-(a[1].in+a[1].out));
  if (!rows.length) return '<div style="color:var(--textMuted);padding:16px">No player data in this period</div>';
  return `<div class="table-wrap"><table>
    <thead><tr><th>Username</th><th>Deposits</th><th>Deposit $</th><th>Cashouts</th><th>Cashout $</th><th>Net</th></tr></thead>
    <tbody>
      ${rows.map(([un,v])=>`<tr>
        <td style="font-weight:700;color:var(--purpleLight)">@${esc(un)}</td>
        <td>${v.inCount}</td><td style="color:var(--green)">$${fmt$(v.in)}</td>
        <td>${v.outCount}</td><td style="color:var(--orange)">$${fmt$(v.out)}</td>
        <td style="color:${v.in-v.out>=0?'var(--green)':'var(--red)'};font-weight:700">$${fmt$(Math.abs(v.in-v.out))}</td>
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}

function renderRepStaff() {
  const rows = Object.values(repData.staffRep).sort((a,b)=>a.name.localeCompare(b.name));
  if (!rows.length) return '<div style="color:var(--textMuted);padding:16px">No staff data in this period</div>';
  return `<div class="table-wrap"><table>
    <thead><tr><th>Name</th><th>Role</th><th>Salary</th><th>Shifts</th><th>Hours</th><th>Est. Pay</th><th>Paid</th><th>Unpaid</th></tr></thead>
    <tbody>
      ${rows.map(s=>{
        const st=SALARY_TYPES.find(x=>x.v===s.salaryType)||{l:'mo'};
        const est = s.salaryType==='hourly' ? s.hours*(s.salaryRate||0) : 0;
        return `<tr>
          <td style="font-weight:600">${esc(s.name)}</td>
          <td style="color:var(--textMuted)">${esc(s.role||'')}</td>
          <td style="color:var(--cyan)">$${fmt$(s.salaryRate||0)}/${st.l.toLowerCase()}</td>
          <td>${s.shiftCount}</td>
          <td style="color:var(--purpleLight)">${s.hours.toFixed(2)}h</td>
          <td style="color:var(--textMuted)">${est>0?'$'+fmt$(est):'—'}</td>
          <td style="color:var(--green)">$${fmt$(s.paid)}</td>
          <td style="color:${s.unpaid>0?'var(--orange)':'var(--textMuted)'}">$${fmt$(s.unpaid)}</td>
        </tr>`;
      }).join('')}
    </tbody>
  </table></div>`;
}

function renderRepGames() {
  const rows = [...repData.gameMap.entries()].sort((a,b)=>(b[1].in+b[1].out)-(a[1].in+a[1].out));
  if (!rows.length) return '<div style="color:var(--textMuted);padding:16px">No game data in this period</div>';
  return `<div class="table-wrap"><table>
    <thead><tr><th>Game</th><th>Deposits</th><th>Deposit $</th><th>Cashouts</th><th>Cashout $</th></tr></thead>
    <tbody>
      ${rows.map(([g,v])=>`<tr>
        <td style="font-weight:700;color:var(--purpleLight)">${esc(g)}</td>
        <td>${v.inCount}</td><td style="color:var(--green)">$${fmt$(v.in)}</td>
        <td>${v.outCount}</td><td style="color:var(--orange)">$${fmt$(v.out)}</td>
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}

async function bindReportsPage() {
  bindHeader();
  $('genRepBtn').onclick = generateReport;
}

async function generateReport() {
  const btn = $('genRepBtn'); btn.disabled=true; btn.textContent='Loading...';
  const from = new Date($('repFrom').value+'T00:00:00');
  const to   = new Date($('repTo').value+'T23:59:59');
  const fromTs = firebase.firestore.Timestamp.fromDate(from);
  const toTs   = firebase.firestore.Timestamp.fromDate(to);
  try {
    // Transactions
    const txSnap = await db.collection(uPath()+'/transactions').where('date','>=',fromTs).where('date','<=',toTs).get();
    const txs = txSnap.docs.map(d=>({_id:d.id,...d.data()}));
    const totalIn = txs.filter(t=>t.type==='cashin').reduce((a,t)=>a+(t.amount||0),0);
    const totalOut = txs.filter(t=>t.type==='cashout').reduce((a,t)=>a+(t.amount||0),0);
    const playerMap = new Map();
    const gameMap = new Map();
    txs.forEach(t=>{
      const un=(t.username||'?').toLowerCase();
      if (!playerMap.has(un)) playerMap.set(un,{in:0,out:0,inCount:0,outCount:0});
      const pm=playerMap.get(un);
      if (t.type==='cashin') { pm.in+=(t.amount||0); pm.inCount++; }
      else { pm.out+=(t.amount||0); pm.outCount++; }
      const gn=t.gameName||'?';
      if (!gameMap.has(gn)) gameMap.set(gn,{in:0,out:0,inCount:0,outCount:0});
      const gm=gameMap.get(gn);
      if (t.type==='cashin') { gm.in+=(t.amount||0); gm.inCount++; }
      else { gm.out+=(t.amount||0); gm.outCount++; }
    });
    // Staff shifts & payments
    const staffSnap = await db.collection(uPath()+'/staff').get();
    const staffMap = {};
    staffSnap.docs.forEach(d=>{ staffMap[d.id]={_id:d.id,...d.data(),hours:0,shiftCount:0,paid:0,unpaid:0}; });
    const shiftsSnap = await db.collection(uPath()+'/shifts').where('date','>=',fromTs).where('date','<=',toTs).get();
    shiftsSnap.docs.forEach(d=>{ const s=d.data(); if(staffMap[s.staffId]){staffMap[s.staffId].hours+=(s.hours||0);staffMap[s.staffId].shiftCount++;} });
    const paysSnap = await db.collection(uPath()+'/payments').where('date','>=',fromTs).where('date','<=',toTs).get();
    paysSnap.docs.forEach(d=>{ const p=d.data(); if(staffMap[p.staffId]){if(p.paid)staffMap[p.staffId].paid+=(p.amount||0);else staffMap[p.staffId].unpaid+=(p.amount||0);} });
    const totalHours = Object.values(staffMap).reduce((a,s)=>a+s.hours,0);
    const totalPaid = Object.values(staffMap).reduce((a,s)=>a+s.paid,0);
    const totalUnpaid = Object.values(staffMap).reduce((a,s)=>a+s.unpaid,0);
    repData = { txs, totalIn, totalOut, playerMap, gameMap, staffRep:staffMap, totalHours, totalPaid, totalUnpaid };
    $('repTabs').style.display = '';
    showRepTab('overview');
    toast('Report generated!','success');
  } catch(e) { toast('Error: '+e.message,'error'); }
  finally { btn.disabled=false; btn.textContent='Generate'; }
}

// ============================================================
// INIT
// ============================================================
render();
</script>
