    function doProfitLossReport(scope, companyId, fromDate, toDate) {
      let csv = 'Company,Game,Cost Rate(%),Selling Rate(%),Points,Cost Price($),Sell Price($),Profit/Loss($),Date\n';
      const companies = Object.values(state.companies);
      const bills = state.bills.filter(b => { const d=billToDate(b.date); return d>=fromDate && d<=toDate; });
      let grandTotalPL = 0;

      for (const comp of companies) {
        if (scope !== 'all' && comp._id !== companyId) continue;
        const cb = bills.filter(b => b.companyId === comp._id);
        for (const bill of cb) {
          for (const item of (bill.items||[])) {
            const sellRate = getGameRate(comp, item.gameName) || 0;
            const costRate = getCostRate(item.gameName);
            const pts = item.points || 0;
            const costPrice = pts * (costRate / 100);
            const sellPrice = pts * (sellRate / 100);
            const pl = sellPrice - costPrice;
            grandTotalPL += pl;
            csv += `"${comp.name}","${item.gameName||''}",${costRate},${sellRate},${pts.toFixed(2)},$${costPrice.toFixed(2)},$${sellPrice.toFixed(2)},$${pl.toFixed(2)},"${billToDate(bill.date).toLocaleString()}"\n`;
          }
        }
      }
      csv += '\n\nTOTAL PROFIT/LOSS\n';
      csv += `\nTOTAL,,,,,,$${grandTotalPL.toFixed(2)},\n`;

      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      const prefix = scope==='all' ? 'all_companies' : (state.companies[companyId]?.name||'company');
      a.download = `${prefix}_profit_loss_${fromDate.toISOString().slice(0,10)}_to_${toDate.toISOString().slice(0,10)}.csv`;
      a.click(); URL.revokeObjectURL(a.href);
    }

    function doGameWiseReport(scope, companyId, fromDate, toDate) {
      const companies = Object.values(state.companies);
      const bills = state.bills.filter(b => { const d=billToDate(b.date); return d>=fromDate && d<=toDate; });
      const gameData = {};

      for (const comp of companies) {
        if (scope !== 'all' && comp._id !== companyId) continue;
        const cb = bills.filter(b => b.companyId === comp._id);
        for (const bill of cb) {
          for (const item of (bill.items||[])) {
            const game = item.gameName || 'Unknown';
            if (!gameData[game]) gameData[game] = [];
            const pts = item.points || 0;
            gameData[game].push({
              company: comp.name,
              username: item.username || '',
              type: pts >= 0 ? 'Load' : 'Redeem',
              points: pts,
              amount: item.dollars || 0,
              date: billToDate(bill.date).toLocaleString(),
              paymentStatus: bill.paymentStatus || '',
            });
          }
        }
      }

      let csv = '';
      const gameNames = Object.keys(gameData).sort();
      for (const game of gameNames) {
        csv += `\n--- ${game} ---\n`;
        csv += 'Company,Username,Type,Points,Amount($),Date,Payment Status\n';
        let gameLoad = 0, gameRedeem = 0, gameAmt = 0;
        for (const row of gameData[game]) {
          csv += `"${row.company}","${row.username}","${row.type}",${row.points.toFixed(2)},${row.amount.toFixed(2)},"${row.date}","${row.paymentStatus}"\n`;
          if (row.points >= 0) gameLoad += row.points; else gameRedeem += Math.abs(row.points);
          gameAmt += row.amount;
        }
        csv += `\n${game} SUMMARY,Loaded: ${gameLoad.toFixed(2)},Redeemed: ${gameRedeem.toFixed(2)},Total Amount: $${gameAmt.toFixed(2)},Transactions: ${gameData[game].length},,\n`;
      }

      csv += '\n\nTOTAL POINTS SUMMARY ACROSS ALL GAMES\n';
      csv += 'Game,Total Loaded,Total Redeemed,Net Points,Total Amount($),Transactions\n';
      let grandLoad = 0, grandRedeem = 0, grandAmt = 0;
      for (const game of gameNames) {
        let load = 0, redeem = 0, amt = 0;
        for (const r of gameData[game]) { if (r.points >= 0) load += r.points; else redeem += Math.abs(r.points); amt += r.amount; }
        csv += `"${game}",${load.toFixed(2)},${redeem.toFixed(2)},${(load-redeem).toFixed(2)},${amt.toFixed(2)},${gameData[game].length}\n`;
        grandLoad += load; grandRedeem += redeem; grandAmt += amt;
      }
      csv += `\nGRAND TOTAL,${grandLoad.toFixed(2)},${grandRedeem.toFixed(2)},${(grandLoad-grandRedeem).toFixed(2)},${grandAmt.toFixed(2)},\n`;

      const prefix = scope==='all' ? 'all_companies' : (state.companies[companyId]?.name||'company');
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = `${prefix}_gamewise_report_${fromDate.toISOString().slice(0,10)}_to_${toDate.toISOString().slice(0,10)}.csv`;
      a.click(); URL.revokeObjectURL(a.href);
    }

    function doTotalReport(scope, companyId, fromDate, toDate) {
      const companies = Object.values(state.companies);
      const bills = state.bills.filter(b => { const bd = billToDate(b.date); return bd>=fromDate && bd<=toDate; });
      const prefix = scope==='all' ? 'all_companies' : (state.companies[companyId]?.name||'company');
      const dateRange = fromDate.toISOString().slice(0,10) + '_to_' + toDate.toISOString().slice(0,10);
      let csv = '';

      // SHEET 1: Transaction Data
      csv += 'TRANSACTION REPORT\n';
      csv += 'Company,Status,Game,Rate(%),Username,Level,Date,Points,Amount($),Type,Payment Status,Cash Received,Balance Due,Extra Fee\n';
      for (const comp of companies) {
        if (scope !== 'all' && comp._id !== companyId) continue;
        const cb = bills.filter(b => b.companyId === comp._id);
        for (const bill of cb) {
          // Fix §6: bill-level amounts on first item row only
          var _bCredit = bill.creditApplied || 0;
          var _bCash   = Math.max(0, (bill.partialAmount||0) - _bCredit);
          for (const [_ii, item] of (bill.items||[]).entries()) {
            const type = (item.points||0) < 0 ? 'Redeem' : 'Load';
            const _first = _ii === 0;
            csv += `"${comp.name}","${comp.active!==false?'Active':'Inactive'}","${item.gameName||''}","${getGameRate(comp,item.gameName)}","${item.username||''}","${getUserLevel(comp,item.username,item.gameName)}","${billToDate(bill.date).toLocaleString()}",${(item.points||0).toFixed(2)},${(item.dollars||0).toFixed(2)},"${type}","${bill.paymentStatus}",${_first?_bCash.toFixed(2):'0.00'},${_first?(bill.balanceDue||0).toFixed(2):'0.00'},${_first?(bill.extraFeeAmount||0).toFixed(2):'0.00'}\n`;
          }
        }
      }

      // SHEET 2: Profit/Loss Data
      // Add Operating Expenses to report (owner only)
      if (state.empRole !== 'employee' && state.empOrgId) {
        try {
          const opExData = window._gaOpEx || state.globalOpEx || null;
          if (opExData && opExData.empData && opExData.empData.length) {
            csv += '\n\nOPERATING EXPENSES (SALARY)\n';
            csv += 'Cashier,Role,Salary Type,Rate,Hours,Earned,Paid,To Pay\n';
            opExData.empData.forEach(e => {
              const sl = {hourly:'Hourly',daily:'Daily',weekly:'Weekly',biweekly:'Bi-Weekly',monthly:'Monthly'}[e.salaryType]||e.salaryType;
              csv += [e.name,e.role,sl,'$'+e.salaryRate.toFixed(2),(e.totalMs/3600000).toFixed(2),'$'+e.earned.toFixed(2),'$'+e.paid.toFixed(2),'$'+e.unpaid.toFixed(2)].join(',')+'\n';
            });
            csv += 'TOTAL,,,,'+(opExData.empData.reduce((s,e)=>s+e.totalMs/3600000,0).toFixed(2))+',$'+opExData.total.toFixed(2)+',$'+opExData.paid.toFixed(2)+',$'+opExData.unpaid.toFixed(2)+'\n';
          }
        } catch(e) {}
      }
      csv += '\n\nPROFIT / LOSS REPORT\n';
      if (state.empRole !== 'employee') {
        const _opExT = (window._gaOpEx||state.globalOpEx||{}).total || 0;
        csv += '(See Operating Expenses section above for salary costs)\n';
        csv += 'Gross Profit = Total Profit - Operating Expenses\n\n';
      }
      csv += 'Company,Game,Cost Rate(%),Selling Rate(%),Points,Cost Price($),Sell Price($),Profit/Loss($),Date\n';
      let grandPL = 0;
      for (const comp of companies) {
        if (scope !== 'all' && comp._id !== companyId) continue;
        const cb = bills.filter(b => b.companyId === comp._id);
        for (const bill of cb) {
          for (const item of (bill.items||[])) {
            const sellRate = getGameRate(comp,item.gameName)||0;
            const costRate = getCostRate(item.gameName);
            const pts = item.points||0;
            const cp = pts*(costRate/100), sp = pts*(sellRate/100), pl = sp-cp;
            grandPL += pl;
            csv += `"${comp.name}","${item.gameName||''}",${costRate},${sellRate},${pts.toFixed(2)},$${cp.toFixed(2)},$${sp.toFixed(2)},$${pl.toFixed(2)},"${billToDate(bill.date).toLocaleString()}"\n`;
          }
        }
      }
      csv += `\nTOTAL P/L,,,,,,$${grandPL.toFixed(2)},\n`;

      // SHEET 3: Game-wise Data
      csv += '\n\nGAME-WISE REPORT\n';
      csv += 'Game,Company,Username,Type,Points,Amount($),Date\n';
      const gameMap = {};
      for (const comp of companies) {
        if (scope !== 'all' && comp._id !== companyId) continue;
        const cb = bills.filter(b => b.companyId === comp._id);
        for (const bill of cb) {
          for (const item of (bill.items||[])) {
            const game = item.gameName||'Unknown';
            if (!gameMap[game]) gameMap[game] = { load:0, redeem:0 };
            const pts = item.points||0;
            if (pts >= 0) gameMap[game].load += pts; else gameMap[game].redeem += Math.abs(pts);
            csv += `"${game}","${comp.name}","${item.username||''}","${pts>=0?'Load':'Redeem'}",${pts.toFixed(2)},${(item.dollars||0).toFixed(2)},"${billToDate(bill.date).toLocaleString()}"\n`;
          }
        }
      }
      csv += '\n\nGAME TOTALS SUMMARY\n';
      csv += 'Game,Total Loaded,Total Redeemed,Net Points\n';
      for (const [game, d] of Object.entries(gameMap)) {
        csv += `"${game}",${d.load.toFixed(2)},${d.redeem.toFixed(2)},${(d.load-d.redeem).toFixed(2)}\n`;
      }

      // SHEET 4: Company Summary
      csv += '\n\nCOMPANY SUMMARY\n';
      csv += 'Company,Total Points Loaded,Total Points Redeemed,Total Amount($),Total Received($),Total Balance Due($)\n';
      for (const comp of companies) {
        if (scope !== 'all' && comp._id !== companyId) continue;
        const cb = bills.filter(b => b.companyId === comp._id);
        let loaded=0,redeemed=0,totalAmt=0,totalRec=0,totalDue=0;
        for (const bill of cb) { for (const item of (bill.items||[])) { if((item.points||0)>=0) loaded+=(item.points||0); else redeemed+=Math.abs(item.points||0); } totalAmt+=(bill.totalDollars||0); totalRec+=(bill.partialAmount||0); totalDue+=(bill.balanceDue||0); }
        if (cb.length>0) csv += `"${comp.name}",${loaded.toFixed(2)},${redeemed.toFixed(2)},${totalAmt.toFixed(2)},${totalRec.toFixed(2)},${totalDue.toFixed(2)}\n`;
      }

      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = `${prefix}_total_report_${dateRange}.csv`;
      a.click(); URL.revokeObjectURL(a.href);
    }

    function getGameRate(company, gameName) {
      const ag = (company.assignedGames || []).find(g => g.gameName === gameName);
      return ag ? (ag.rate || 0) : '';
    }

    function getCostRate(gameName) {
      const mg = state.masterGames.find(g => g.name === gameName);
      return mg ? (mg.costRate || 0) : 0;
    }

    function getUserLevel(company, username, gameName) {
      const un = (company.usernames || []).find(u => u.username === username && u.gameName === gameName);
      return un ? (un.level || '') : '';
    }

          });

          // Just set up subcollection listeners and re-render
          setupCompanySubListeners(docRef.id);

            }

                ${b.creditApplied > 0 ? '<div style="display:flex;justify-content:space-between;padding:4px 0;border-top:1px solid rgba(16,185,129,0.2);color:#34d399;font-weight:600"><span>Credit Applied</span><span>-$'+(b.creditApplied).toFixed(2)+'</span></div>' : ''}

              </div>

    }

    function renderBillItem(item, idx, assignedGames, usernames) {
      const calc = calcLine(item);
      const gameOptions = assignedGames.map(g => `<option value="${g._id}" ${item.gameId===g._id?'selected':''}>${esc(g.gameName)}</option>`).join('');
      const gameUsernames = item.gameId ? usernames.filter(u => {

      // Sort: recent first

        if (ai >= 0) return -1;
        if (bi >= 0) return 1;
        return 0;
      });
      const unOptions = sorted.map(u =>
        `<option value="${esc(u.username)}" ${item.username===u.username?'selected':''}>${esc(u.username)}${u.level?' ['+esc(u.level)+']':''}${state.recentUsernames.includes(u.username)?' ★':''}</option>`
      ).join('');

              <div class="bill-game-dropdown hidden" data-idx="${idx}" style="position:absolute;top:calc(100% + 2px);left:0;right:0;background:rgba(16,13,30,0.97);border:1px solid var(--glassBorder);border-radius:10px;z-index:9999;max-height:200px;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,0.6)">
                ${assignedGames.map(g => `<div class="dropdown-item bill-game-option" data-gameid="${g._id}" data-gamename="${esc(g.gameName)}" data-rate="${g.rate||0}" data-idx="${idx}">${esc(g.gameName)} <span style="font-size:11px;color:var(--textMuted)">${g.rate||0}%</span></div>`).join('')}

                  <div class="dropdown-item" data-user="" style="color:var(--textMuted);font-style:italic">No Username</div>
                  ${sorted.map(u => `<div class="dropdown-item bill-user-option" data-user="${esc(u.username)}" data-idx="${idx}">${esc(u.username)}${u.level?' <span style=\\"font-size:11px;color:var(--textMuted)\\">['+esc(u.level)+']</span>':''}${state.recentUsernames.includes(u.username)?' <span style=\\"color:var(--orange)\\">★</span>':''}</div>`).join('')}

              <div class="bill-mode-switch" data-idx="${idx}" style="display:inline-flex;cursor:pointer;font-size:10px;font-family:'Orbitron',monospace;font-weight:700;border-radius:4px;overflow:hidden;border:1px solid var(--glassBorder)">
                <span style="padding:2px 6px;background:${(item.mode||state.convMode)==='pts2dollar'?'var(--cyan)':'transparent'};color:${(item.mode||state.convMode)==='pts2dollar'?'#000':'var(--textMuted)'};transition:all 0.2s">P</span>
                <span style="padding:2px 6px;background:${(item.mode||state.convMode)==='dollar2pts'?'var(--green)':'transparent'};color:${(item.mode||state.convMode)==='dollar2pts'?'#000':'var(--textMuted)'};transition:all 0.2s">$</span>

    function calcLine(item) {
      const val = parseFloat(item.value) || 0;
      const rate = item.rate || 0;
      const rateDecimal = rate / 100;
      const mode = item.mode || state.convMode;
      if (mode === 'pts2dollar') {
        return { points: val, dollars: rateDecimal ? val * rateDecimal : 0, inputAmount: 0, feeEmbedded: false };
      } else {
        // $→PTS: if extra fee enabled, input includes fee. Deduct fee to get game value.
        var co = state.companies[state.selectedCompanyId];
        var gameVal = val;
        if (co && co.extraFeeEnabled && co.extraFeePercent > 0) {
          gameVal = val - (val * co.extraFeePercent / 100);
        }
        return { dollars: gameVal, points: rateDecimal ? Math.trunc(gameVal / rateDecimal) : 0, inputAmount: val, feeEmbedded: (co && co.extraFeeEnabled && co.extraFeePercent > 0) };
      }
    }

    function fmtPts(v) { return Number.isInteger(v) ? v.toString() : v.toFixed(2); }
    // Normalize tiny floats to zero before formatting to prevent "-0.00" or "-$0.00"
    function fmtDol(v) { var n = (Math.abs(v) < 0.001) ? 0 : v; return n.toFixed(2); }

    // ── Unified bill settlement calculator (single source of truth) ──────────
    // Used by Live Bill, generateBillText, buildBillObject, generateInvoice,
    // analytics, and CSV reports.  Never call the arithmetic directly.
    //
    //  billTotal   – totalDollars + extraFeeAmount  (grand total before credit)
    //  payReceived – cash received this transaction (0 if not_received)
    //  creditAvail – available credit balance at time of calculation
    //  applyCredit – true unless payment status is 'received'
    //
    // Returns: { creditUsed, cashReceived, totalUsable, amountDue, extraPayment, remainingCredit }
    function calcSettlement(billTotal, payReceived, creditAvail, applyCredit) {
      var creditUsed   = applyCredit ? Math.min(creditAvail, billTotal) : 0;
      var totalUsable  = creditUsed + payReceived;
      var amountDue    = Math.max(0, billTotal - totalUsable);
      // Extra payment: cash+credit exceeds the bill
      var extraPayment = (totalUsable > billTotal + 0.001) ? +(totalUsable - billTotal).toFixed(2) : 0;
      var remainingCredit = Math.max(0, creditAvail - creditUsed);
      return { creditUsed: creditUsed, cashReceived: payReceived, totalUsable: totalUsable,
               amountDue: amountDue, extraPayment: extraPayment, remainingCredit: remainingCredit };
    }

    // Convert a saved bill date (Firestore Timestamp | ISO string) to a JS Date
    function billToDate(d) {
      if (!d) return new Date();
      if (d && d.seconds) return new Date(d.seconds * 1000);
      if (d && d.toDate) return d.toDate();
      return new Date(d);
    }

    // Reusable helper: accepts any date value (Firestore Timestamp or ISO string)
    // and returns a valid JS Date object in local time.
    function toLocalDate(dateValue) {
      if (!dateValue) return new Date();
      if (dateValue && dateValue.seconds) return new Date(dateValue.seconds * 1000);
      return new Date(dateValue);
    }

    // Local date string "YYYY-MM-DD" from any bill date value
    function billToLocalDateKey(d) {
      var dt = billToDate(d);
      return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
    }

    // ── Shared live-bill panel DOM updater (single source of truth for UI) ────
    // Called by bill-value-input oninput.  Uses calcSettlement so the live panel,
    // generateBillText, buildBillObject, and generateInvoice all see identical numbers.
    function _updateLiveBillPanel(c, td) {
      var _anyEmb=false, _tInp=0;
      state.billItems.forEach(function(it){
        var cl=calcLine(it);
        if(cl.feeEmbedded)_anyEmb=true;
        if(cl.inputAmount>0)_tInp+=cl.inputAmount;
      });
      var ef=0;
      if(c.extraFeeEnabled&&c.extraFeePercent>0){
        if(_anyEmb&&_tInp>0){ef=_tInp-td;}else{ef=td*(c.extraFeePercent/100);}
      }
      var gt=td+ef;
      var cr=getCompanyCreditBalance(c);
      var applyCredit=(state.paymentStatus!=='received');
      var cash=state.paymentStatus==='received'?gt:state.paymentStatus==='partial'?(parseFloat(state.partialAmount)||0):0;
      var s=calcSettlement(gt,cash,cr,applyCredit);
      // Calculate net available credit (after unpaid bills)
      var compBills = state.bills.filter(function(b){return b.companyId === c._id});
      var totalUnpaid = 0;
      compBills.forEach(function(b){
        var exPay = (b.extraPayments||[]).reduce(function(s,p){return s+(p.amount||0)},0);
        var due = (b.balanceDue||0) - exPay;
        if(due > 0) totalUnpaid += due;
      });
      var netCredit = Math.max(0, cr - totalUnpaid);
      
      // Update liveAmountDue text node if present
      var adEl=document.getElementById('liveAmountDue');
      if(adEl)adEl.textContent='$'+fmtDol(s.amountDue);
      // Rebuild liveFeeCredit section
      var fcEl=document.getElementById('liveFeeCredit');
      if(!fcEl)return;
      var h='';
      if(ef>0)h+='<div style="display:flex;justify-content:space-between;padding:6px 10px;border-radius:8px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.15);margin-bottom:6px;font-size:12px"><span style="color:#fbbf24;font-weight:700">Extra Fee ('+c.extraFeePercent+'%)</span><span style="color:#fbbf24;font-weight:700">$'+fmtDol(ef)+'</span></div>';
      if(ef>0||cr>0)h+='<div style="display:flex;justify-content:space-between;padding:6px 10px;font-size:13px;font-weight:700;color:var(--purpleLight);margin-bottom:6px"><span>GRAND TOTAL</span><span>$'+fmtDol(gt)+'</span></div>';
      if(cr>0&&td===0){
        h+='<div style="display:flex;justify-content:space-between;padding:6px 10px;border-radius:8px;background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.2);margin-bottom:6px;font-size:12px"><span style="color:#34d399;font-weight:600">Available Credit</span><span style="color:#34d399;font-weight:700">$'+fmtDol(netCredit)+'</span></div>';
        if(totalUnpaid > 0 && cr > netCredit){
          h+='<div style="display:flex;justify-content:space-between;padding:2px 10px;font-size:10px;color:var(--textMuted);margin-bottom:4px"><span>Total credit: $'+fmtDol(cr)+'</span><span>Unpaid bills: $'+fmtDol(totalUnpaid)+'</span></div>';
        }
      }
      if(applyCredit&&s.creditUsed>0&&td>0){
        h+='<div style="display:flex;justify-content:space-between;padding:6px 10px;border-radius:8px;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.15);margin-bottom:6px;font-size:12px"><span style="color:#34d399;font-weight:700">Credit Applied</span><span style="color:#34d399;font-weight:700">-$'+fmtDol(s.creditUsed)+'</span></div>';
        if(s.remainingCredit>0&&s.extraPayment===0)h+='<div style="display:flex;justify-content:space-between;padding:4px 10px;font-size:11px;margin-bottom:4px"><span style="color:var(--textMuted)">Remaining Credit</span><span style="color:#34d399">$'+fmtDol(s.remainingCredit)+'</span></div>';
      }
      if(s.extraPayment>0)h+='<div style="display:flex;justify-content:space-between;padding:6px 10px;border-radius:8px;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.15);margin-bottom:6px;font-size:12px"><span style="color:#34d399;font-weight:700">Extra Payment → Credit</span><span style="color:#34d399;font-weight:700">+$'+fmtDol(s.extraPayment)+'</span></div>';
      var _dynPending = getCompanyOutstandingBalance(c);
      var _dynTotalBal = s.amountDue + _dynPending;
      h+='<div style="display:flex;justify-content:space-between;padding:8px 12px;font-size:14px;font-weight:800;color:#fff;border-radius:10px;background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.25);margin-bottom:'+(td>0&&_dynPending>0.001?'4':'10')+'px"><span style="font-family:Orbitron,monospace;font-size:12px;letter-spacing:1px">AMOUNT DUE</span><span id="liveAmountDue" style="font-family:Orbitron,monospace">$'+fmtDol(s.amountDue)+'</span></div>';
      if(td>0&&_dynPending>0.001){
        h+='<div style="display:flex;justify-content:space-between;padding:3px 12px;font-size:11px;color:var(--textMuted);margin-bottom:3px"><span>+ Pending Due (prior bills)</span><span>$'+fmtDol(_dynPending)+'</span></div>';
        h+='<div style="display:flex;justify-content:space-between;padding:7px 12px;font-size:13px;font-weight:800;color:#f87171;border-radius:9px;background:rgba(220,38,38,0.07);border:1px solid rgba(220,38,38,0.18);margin-bottom:10px"><span style="font-family:Orbitron,monospace;font-size:11px;letter-spacing:1px">TOTAL BALANCE DUE</span><span id="liveTotalBalDue" style="font-family:Orbitron,monospace">$'+fmtDol(_dynTotalBal)+'</span></div>';
      }
      fcEl.innerHTML=h;
    }

    function bindBilling() {
      const c = state.companies[state.selectedCompanyId];
      if (!c) return;

      $('#convToggle').onclick = () => {
        state.convMode = state.convMode === 'pts2dollar' ? 'dollar2pts' : 'pts2dollar';

      // FAB handled in bindCompanyScreen

        render();

      $$('.bill-remove').forEach(btn => {

        dropdown.querySelectorAll('.dropdown-item').forEach(opt => {
          opt.onclick = () => {

            state.billItems[idx].gameName = opt.dataset.gamename;
            state.billItems[idx].rate = parseFloat(opt.dataset.rate) || 0;
            state.billItems[idx].username = '';

            const billCard2 = inp.closest('.bill-item');
            if (billCard2) billCard2.classList.remove('dropdown-open');

          };

      document.addEventListener('click', (e) => {
        if (!e.target.closest('.bill-game-wrap')) {
          $$('.bill-game-dropdown').forEach(d => d.classList.add('hidden'));
          if (!e.target.closest('.bill-user-wrap')) {
            document.querySelectorAll('.bill-item').forEach(el => el.classList.remove('dropdown-open'));
          }
        }
      });

      // Searchable username dropdowns in billing
      $$('.bill-user-search').forEach(inp => {
        const idx = parseInt(inp.dataset.idx);
        const dropdown = $(`.bill-user-dropdown[data-idx="${idx}"]`);
        if (!dropdown) return;

        inp.onfocus = () => {
          dropdown.classList.remove('hidden');
          document.querySelectorAll('.bill-item').forEach(el => el.classList.remove('dropdown-open'));
          const billCard = inp.closest('.bill-item');
          if (billCard) billCard.classList.add('dropdown-open');
        };
        inp.oninput = () => {
          dropdown.classList.remove('hidden');
          const q = inp.value.toLowerCase();
          dropdown.querySelectorAll('.dropdown-item').forEach(opt => {
            const user = opt.dataset.user || '';
            const text = opt.textContent.toLowerCase();
            // Always show "No Username" option
            opt.style.display = (user === '' || text.includes(q)) ? '' : 'none';
          });
        };

        dropdown.querySelectorAll('.dropdown-item').forEach(opt => {
          opt.onclick = () => {
            const un = opt.dataset.user;
            state.billItems[idx].username = un;
            inp.value = un;
            dropdown.classList.add('hidden');
            const billCard3 = inp.closest('.bill-item');
            if (billCard3) billCard3.classList.remove('dropdown-open');
            if (un) {
              state.recentUsernames = [un, ...state.recentUsernames.filter(u => u !== un)].slice(0, 10);
            }
          };
        });
      });

      // Close all username dropdowns when clicking outside
      document.addEventListener('click', (e) => {
        if (!e.target.closest('.bill-user-wrap')) {
          $$('.bill-user-dropdown').forEach(d => d.classList.add('hidden'));
        }
      });

      // Quick add username from billing
      $$('.bill-quick-add-user').forEach(btn => {
        btn.onclick = async () => {
          const idx = parseInt(btn.dataset.idx);
          const item = state.billItems[idx];
          const ag = (c.assignedGames||[]).find(g => g._id === item.gameId);
          const gameName = ag ? ag.gameName : '';
          if (!gameName) { alert('Select a game first'); return; }
          // Styled username + level modal
          const levels = ['Agent','Master','Distributor','Sub-Distributor','Store','Player'];
          const result = await new Promise(resolve => {
            const ov = document.createElement('div');
            ov.className = 'modal-overlay';
            ov.innerHTML = `<div class="modal fade-in" style="max-width:320px;padding:22px;overflow:visible">
              <div style="font-family:'Orbitron',monospace;font-size:13px;color:var(--purpleLight);margin-bottom:16px;text-align:center">ADD USERNAME</div>
              <div style="margin-bottom:12px">
                <span class="label">Username</span>
                <input class="input" id="_qaName" placeholder="Enter username" autofocus />
              </div>
              <div style="margin-bottom:16px;position:relative" id="_qaLevelWrap">
                <span class="label">Level</span>
                <div class="input" id="_qaLevelTrigger" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between">
                  <span id="_qaLevelText" style="color:var(--textMuted)">Select level</span>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--textMuted)" stroke-width="2.5"><polyline points="6,9 12,15 18,9"/></svg>
                </div>
                <input type="hidden" id="_qaLevel" value="" />
                <div id="_qaLevelDrop" class="hidden" style="position:absolute;top:calc(100% + 4px);left:0;right:0;background:rgba(16,13,30,0.97);border:1px solid var(--glassBorder);border-radius:10px;z-index:999;max-height:220px;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,0.6)">
                  <div class="dropdown-item _qa-lv-opt" data-val="" style="color:var(--textMuted);font-style:italic">None</div>
                  ${levels.map(l => '<div class="dropdown-item _qa-lv-opt" data-val="'+l+'">'+l+'</div>').join('')}
                </div>
              </div>
              <div style="display:flex;gap:8px">
                <button class="btn btn-green" id="_qaConfirm" style="flex:1;justify-content:center">Add</button>
                <button class="btn btn-ghost" id="_qaCancel" style="flex:1;justify-content:center">Cancel</button>
              </div>
            </div>`;
            document.body.appendChild(ov);
            // Bind custom level dropdown in modal
            ov.querySelector('#_qaLevelTrigger').onclick = (e) => {
              e.stopPropagation();
              ov.querySelector('#_qaLevelDrop').classList.toggle('hidden');
            };
            ov.querySelectorAll('._qa-lv-opt').forEach(opt => {
              opt.onclick = () => {
                const v = opt.dataset.val;
                ov.querySelector('#_qaLevel').value = v;
                ov.querySelector('#_qaLevelText').textContent = v || 'Select level';
                ov.querySelector('#_qaLevelText').style.color = v ? 'var(--textPrimary)' : 'var(--textMuted)';
                ov.querySelector('#_qaLevelDrop').classList.add('hidden');
              };
            });
            ov.querySelector('#_qaConfirm').onclick = () => {
              const name = ov.querySelector('#_qaName').value.trim();
              const level = ov.querySelector('#_qaLevel').value;
              if (!name) { ov.querySelector('#_qaName').focus(); return; }
              ov.remove();
              resolve({ name, level });
            };
            ov.querySelector('#_qaCancel').onclick = () => { ov.remove(); resolve(null); };
            ov.querySelector('#_qaName').onkeydown = (e) => { if (e.key==='Enter') ov.querySelector('#_qaConfirm').click(); };
            ov.onclick = (e) => { if(e.target===ov){ov.remove();resolve(null);} };
            setTimeout(() => ov.querySelector('#_qaName')?.focus(), 100);
          });
          if (!result) return;
          await trackedWrite(() => db.collection(`${userPath()}/companies/${c._id}/usernames`).add({ gameName, username: result.name, level: result.level||'' }));
          state.billItems[idx].username = result.name;
          render();
        };
      });

      $$('.bill-value-input').forEach(inp => {
        inp.oninput = () => {
          const idx = parseInt(inp.dataset.idx);
          state.billItems[idx].value = inp.value;
          const item = state.billItems[idx];
          const calc = calcLine(item);
          const card = inp.closest('.bill-item');
          let result = card.querySelector('.bill-result');
          if (inp.value) {
            const html = `<span class="pts"><strong>Pts:</strong> ${fmtPts(calc.points)}</span>
              <span class="amt"><strong>$:</strong> ${fmtDol(calc.dollars)}</span>
              <span class="rate">Rate: ${item.rate}%</span>`;
            if (!result) {
              result = document.createElement('div');
              result.className = 'bill-result';
              card.querySelector('.bill-grid').insertAdjacentElement('afterend', result);
            }
            result.innerHTML = html;
          } else if (result) {
            result.remove();
          }
          // Live update totals in DOM
          let tp=0,td=0; state.billItems.forEach(it=>{const cl=calcLine(it);tp+=cl.points;td+=cl.dollars;});
          const totalPtsEl = document.getElementById('liveTotalPts');
          const totalDolEl = document.getElementById('liveTotalDol');
          const balEl = document.getElementById('liveBalanceDue');
          if (totalPtsEl) totalPtsEl.textContent = fmtPts(tp);
          if (totalDolEl) totalDolEl.textContent = '$' + fmtDol(td);
          // Use shared live panel updater — single source of truth for all DOM updates
          _updateLiveBillPanel(c, td);
        };
      });

      $$('[data-pay]').forEach(btn => {
        btn.onclick = () => { state.paymentStatus = btn.dataset.pay; state._paymentStatusChosen = true; render(); };
      });

      if ($('#partialAmountInput')) {
        $('#partialAmountInput').oninput = (e) => {
          state.partialAmount = e.target.value;
          let td = 0;
          state.billItems.forEach(it => { td += calcLine(it).dollars; });
          var adEl = document.getElementById('liveAmountDue');
          if (adEl) {
            var _efP=(c.extraFeeEnabled&&c.extraFeePercent>0)?td*(c.extraFeePercent/100):0;
            var _gtP=td+_efP;
            var _crP=getCompanyCreditBalance(c);
            var _cashP=parseFloat(state.partialAmount)||0;
            var _sP=calcSettlement(_gtP,_cashP,_crP,true);
            adEl.textContent='$'+fmtDol(_sP.amountDue);
          }
        };
      }

      if ($('#copyBill')) {
        $('#copyBill').onclick = () => {
          
          const text = generateBillText(c);
          navigator.clipboard.writeText(text).then(() => alert('Bill copied to clipboard!'));
        };
      }

      if ($('#saveBill')) {
        var _saveBillInProgress = false;
        $('#saveBill').onclick = async () => {
          if (_saveBillInProgress) return;
          const saveBtn = $('#saveBill');
          const origHTML = saveBtn.innerHTML;
          const availCredit = getCompanyCreditBalance(c);
          // Require explicit payment status selection when credit is available
          if (availCredit > 0 && state.billItems.length > 0) {
            if (!state.paymentStatus || state.paymentStatus === 'received' && availCredit > 0) {
              // Only block if user hasn't explicitly chosen — we allow received if they chose it
              // But we require they pick something: default 'received' was set on company open, so only block if totalDollars>0 and paymentStatus wasn't explicitly set
              // The real guard: if credit available, block only if paymentStatus is still the default AND no manual selection was made
              // We track this with state._paymentStatusChosen
              if (!state._paymentStatusChosen) {
                alert('This company has a credit balance of $' + availCredit.toFixed(2) + '.\nPlease select a payment status (Received Full / Partial / Not Received) before saving.');
                saveBtn.disabled = false;
                saveBtn.innerHTML = origHTML;
                return;
              }
            }
          }
          _saveBillInProgress = true;
          saveBtn.disabled = true;
          saveBtn.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px;margin:0"></span> Saving...';
          try {
            const bill = await buildBillObject(c);
            if (!bill || !bill.items || bill.items.length === 0) {
              alert('Add at least one game to the bill');
              saveBtn.disabled = false;
              saveBtn.innerHTML = origHTML;
              _saveBillInProgress = false;
              return;
            }
            // Deduct from master games
            for (const item of state.billItems) {
              if (item.gameId) {
                const calc = calcLine(item);
                const mg = state.masterGames.find(g => g.name === item.gameName);
                if (mg) {
                  const newPts = (mg.remainingPoints || 0) - calc.points;
                  await db.doc(userPath()+'/masterGames/'+mg._id).update({ remainingPoints: newPts });
                  mg.remainingPoints = newPts;
                }
              }
            }
            // Save bill to Firestore and immediately add to state.bills so UI updates
            // without waiting for the onSnapshot listener (which may be slow or miss past-dated bills)
            const _newBillRef = await db.collection(userPath()+'/bills').add(bill);
            const _newBillWithId = Object.assign({ _id: _newBillRef.id }, bill);
            state.bills = state.bills.filter(function(b){ return b._id !== _newBillRef.id; });
            state.bills.push(_newBillWithId);
            _gbCache.set('data', {mg:state.masterGames, bills:state.bills, companies:state.companies});
            // If credit was applied, reduce company creditBalance
            if(bill.creditApplied > 0){
              var prevCrBal = typeof c.creditBalance==='number' ? c.creditBalance : getCompanyCreditBalance(c);
              var newCrBal = parseFloat(Math.max(0, prevCrBal - bill.creditApplied).toFixed(2));
              await db.doc(userPath()+'/companies/'+c._id).update({creditBalance:newCrBal});
              if(state.companies[c._id]) state.companies[c._id].creditBalance = newCrBal;
            }
            // If there is an overpayment (extra payment), apply it to legacy due bills first.
            // We also correct the new bill's partialAmount and extraPayments so analytics
            // counts correctly without double-counting:
            //   new bill partialAmount = its own grandTotal (not the full cash input)
            //   legacy bill partialAmount = what it actually received (already set by applyExtraPaymentToLegacyBills)
            //   isCredit:true entry on new bill = the true leftover after all dues are cleared
            if(bill.extraPayments && bill.extraPayments.length > 0) {
              var _epTotal = bill.extraPayments.reduce(function(s,p){return s+(p.amount||0)},0);
              if(_epTotal > 0.001) {
                var _epDate = bill.extraPayments[0].date || localDateStr();
                // Clear legacy bills; returns true credit leftover after all dues settled
                var _trueCreditLeftover = await applyExtraPaymentToLegacyBills(c, _epTotal, _epDate);
                // Correct the new bill:
                //  - partialAmount = grandTotal only (so bPaid counts exactly what this bill received)
                //  - extraPayments = [{isCredit:true, amount: leftover}] only if leftover > 0
                var _correctedEps = _trueCreditLeftover > 0.001
                  ? [{ amount: parseFloat(_trueCreditLeftover.toFixed(2)), date: _epDate, isCredit: true }]
                  : [];
                var _correctedPartial = parseFloat((bill.totalDollars + (bill.extraFeeAmount||0)).toFixed(2));
                await trackedWrite(function(){
                  return _newBillRef.update({ extraPayments: _correctedEps, partialAmount: _correctedPartial });
                });
                // Add only the true leftover credit to company balance
                var _curCr = typeof c.creditBalance==='number' ? c.creditBalance : 0;
                var _newCr = parseFloat((_curCr + _trueCreditLeftover).toFixed(2));
                await db.doc(userPath()+'/companies/'+c._id).update({creditBalance:_newCr});
                if(state.companies[c._id]) state.companies[c._id].creditBalance = _newCr;
              }
            }
            touchCompany(c._id);
            _lastSyncedTime = new Date();
            updateSyncIndicator();
            // Clear bill form
            state.billItems = [];
            state.paymentStatus = 'received';
            state._paymentStatusChosen = false;
            state.partialAmount = '';
            // Clear custom date override after save — next bill defaults to current time
            state.billDateOverride = null;
            saveBtn.disabled = false;
            saveBtn.innerHTML = origHTML;
            _saveBillInProgress = false;
            if($('#billSavedMsg')) $('#billSavedMsg').classList.remove('hidden');
            setTimeout(() => { try { $('#billSavedMsg')?.classList.add('hidden'); } catch(e){} }, 2000);
            // Refresh billing panel and invalidate analytics cache so all views update
            invalidateAnalyticsCache();
            refreshBillingPanel();
          } catch(e) {
            console.error('Save bill error:', e);
            alert('Save failed: ' + e.message);
            saveBtn.disabled = false;
            saveBtn.innerHTML = origHTML;
            _saveBillInProgress = false;
          }
        };
      }

      if ($('#clearBill')) {
        $('#clearBill').onclick = () => {
          if (state.billItems.length === 0) return;
          if (!confirm('Clear all bill items?')) return;
          state.billItems = [];
          state.paymentStatus = 'received';
          state._paymentStatusChosen = false;
          state.partialAmount = '';
          render();
        };
      }

      // Bill history bindings (now in billing tab)
      if ($('#billHistSearch')) {
        const filterHist = () => {
          const q = ($('#billHistSearch')?.value||'').toLowerCase().trim();
          const from = $('#billHistFrom')?.value;
          const to = $('#billHistTo')?.value;
          // Parse filter bounds: datetime-local strings are local time, so new Date() treats them as local — correct
          const fromD = from ? new Date(from) : null;
          const toD = to ? (to.length<=10 ? localEndOfDay(to) : new Date(to)) : null;
          $$('.bill-hist-wrap').forEach(el => {
            // data-date is a UTC ISO string (ends in Z) — parse it as UTC, then compare
            // fromD/toD are already in local-time milliseconds via new Date(localString)
            // Both are ms-since-epoch so the comparison is correct regardless of zone
            const d = new Date(el.dataset.date); // ISO Z string → UTC ms — correct for comparison
            const matchDate = (!fromD || d>=fromD) && (!toD || d<=toD);
            // Support searching by reference number (exact or partial match)
            const refNum = (el.dataset.ref || '').toLowerCase();
            const searchText = (el.dataset.search || '').toLowerCase();
            const matchSearch = !q || searchText.includes(q) || refNum.includes(q);
            el.style.display = (matchDate && matchSearch) ? '' : 'none';
          });
        };
        $('#billHistSearch').oninput = filterHist;
        if ($('#billHistFilter')) $('#billHistFilter').onclick = filterHist;
        if ($('#billHistReset')) {
          $('#billHistReset').onclick = () => {
            const _td = localDateStr();
            const _fm = _td.slice(0,8)+'01';
            $('#billHistFrom').value=_fm+'T00:00'; $('#billHistTo').value=_td+'T23:59'; $('#billHistSearch').value='';
            $$('.bill-hist-wrap').forEach(el => el.style.display='');
          };
        }
      }
      if ($('#clearBillHistory')) {
        $('#clearBillHistory').onclick = async () => {
          var fromEl = document.getElementById('billHistFrom');
          var toEl = document.getElementById('billHistTo');
          var fromV = fromEl ? fromEl.value : '';
          var toV = toEl ? toEl.value : '';
          // datetime-local gives "YYYY-MM-DDThh:mm", date gives "YYYY-MM-DD"
          var fromD = fromV ? new Date(fromV) : null;
          var toD = toV ? (toV.length<=10 ? localEndOfDay(toV) : new Date(toV)) : null;
          var compBills = state.bills.filter(function(b) {
            if (b.companyId !== c._id) return false;
            var bd = toLocalDate(b.date);
            if (fromD && bd < fromD) return false;
            if (toD && bd > toD) return false;
            return true;
          });
          if (compBills.length === 0) { alert('No bills found in selected date range'); return; }
          if (!confirm('Delete ' + compBills.length + ' bills from ' + (fromV||'start') + ' to ' + (toV||'now') + '?')) return;
          var rdBtn=this;var rdOrig=rdBtn.innerHTML;rdBtn.disabled=true;rdBtn.innerHTML='<span class="spinner" style="width:10px;height:10px;border-width:2px;margin:0"></span> Deleting...';
          var errors = 0;
          for (var di = 0; di < compBills.length; di++) {
            var bill = compBills[di];
            try {
              if (bill._id) {
                await db.doc(userPath() + '/bills/' + bill._id).delete();
              }
            } catch(e) { errors++; console.error('Delete failed:', bill._id, e); }
          }
          var delIds = compBills.map(function(b) { return b._id; });
          state.bills = state.bills.filter(function(b) { return delIds.indexOf(b._id) < 0; });
          // Recompute company creditBalance from remaining bills.
          // Formula mirrors computeAnalyticsData / getCompanyCreditBalance:
          //   credit pool additions = isCredit:true extras (leftover remainder stored on a bill)
          //                         + isGeneral extras on zero-item holder bills (no-bill payment records)
          //   credit pool consumed  = creditApplied on any remaining bill
          // isGeneral entries on real bills are already reflected in partialAmount — do NOT add them.
          try {
            var remainingCompBills = state.bills.filter(function(b){ return b.companyId === c._id; });
            var newCreditBal = 0;
            remainingCompBills.forEach(function(b){
              var _isHolder = (b.totalDollars||0) === 0 && (b.totalPoints||0) === 0;
              (b.extraPayments||[]).forEach(function(ep){
                if(ep.isCredit) newCreditBal += (ep.amount||0);
                else if(ep.isGeneral && _isHolder) newCreditBal += (ep.amount||0);
              });
              newCreditBal -= (b.creditApplied||0);
            });
            newCreditBal = Math.max(0, parseFloat(newCreditBal.toFixed(2)));
            await db.doc(userPath()+'/companies/'+c._id).update({creditBalance: newCreditBal});
            if(state.companies[c._id]) state.companies[c._id].creditBalance = newCreditBal;
          } catch(e2){ console.error('Credit recalc failed:', e2); }
          invalidateAnalyticsCache();
          _gbCache.set('data', {mg:state.masterGames, bills:state.bills, companies:state.companies});
          rdBtn.disabled=false;rdBtn.innerHTML=rdOrig;
          if (errors > 0) alert(errors + ' bills could not be deleted');
          refreshBillingPanel();
        };
      }

      // Live Bill print buttons
      // Live Bill print button (desktop only)
      const _livePrintFn = () => {
        const c2 = state.companies[state.selectedCompanyId]; if (!c2) return;
        generateInvoice(c2, null, null, null, null, true);
      };
      if ($('#liveBillPrintMobile')) $('#liveBillPrintMobile').onclick = _livePrintFn;
      if ($('#liveBillPrintDesktop')) $('#liveBillPrintDesktop').onclick = _livePrintFn;

      // BILL HISTORY print invoice button — uses current filter dates
      if ($('#histPrintInvoice')) {
        $('#histPrintInvoice').onclick = () => {
          const c2 = state.companies[state.selectedCompanyId]; if (!c2) return;
          const fromEl = document.getElementById('billHistFrom');
          const toEl   = document.getElementById('billHistTo');
          const fromV  = fromEl ? fromEl.value : '';
          const toV    = toEl   ? toEl.value   : '';
          const fromD  = fromV ? new Date(fromV) : null;
          const toD    = toV   ? (toV.length<=10 ? localEndOfDay(toV) : new Date(toV)) : null;
          generateInvoice(c2, null, fromD, toD, null, false);
        };
      }

      // Bill status + menu handlers are bound via bindBillHistoryEvents
      bindBillHistoryEvents();

      $$('.placeholder-never-match-del-old').forEach(btn => {
        btn.onclick = async (e) => {
          e.stopPropagation();
          if (!confirm('Delete this bill?')) return;
          const bid = btn.dataset.billid;
          btn.disabled = true; btn.innerHTML = '<span class="spinner" style="width:10px;height:10px;border-width:2px;margin:0"></span>';
          try {
            await trackedWrite(() => db.doc(userPath()+'/bills/'+bid).delete());
            invalidateAnalyticsCache();
            btn.closest('.bill-hist-wrap')?.remove();
            // Listener will update state.bills
          } catch(e) { alert('Delete failed'); btn.disabled=false; btn.innerHTML='&times;'; }
        };
      });
    }

      if (state._invoiceSettings) return state._invoiceSettings;
      try { return JSON.parse(localStorage.getItem('gb_invoice_settings') || '{}'); } catch(e){ return {}; }

    async function saveInvoiceSettings(s) {
      state._invoiceSettings = s;
      try { localStorage.setItem('gb_invoice_settings', JSON.stringify(s)); } catch(e){}
      // Sync to Firestore under user doc
      try {
        await db.doc(userPath()).set({ invoiceSettings: s }, { merge: true });
      } catch(e){ console.warn('Invoice settings cloud sync failed:', e); }
    }

        const doc = await db.doc(userPath()).get();

          state._invoiceSettings = s;
          try { localStorage.setItem('gb_invoice_settings', JSON.stringify(s)); } catch(e){}
        }
      } catch(e){ console.warn('Invoice settings load failed:', e); }
    }

    // ============================================================
    // GENERATE INVOICE
    // ============================================================
    function getCompanyInvoiceNumber(companyId) {
      const key = 'gb_inv_num_' + dataOwnerUid() + '_' + companyId;
      let n = 1;
      try { n = parseInt(localStorage.getItem(key)||'0', 10) + 1; } catch(e){}
      try { localStorage.setItem(key, String(n)); } catch(e){}
      return String(n).padStart(4, '0');
    }

    function generateInvoice(comp, billsOverride, fromD, toD, singleBill, isLiveBill) {
      const s = getInvoiceSettings();
      const u = state.user || {};
      const brandName  = s.brandName || state.gbUsername || u.displayName || 'SweepAdmin';
      const contactInfo = s.contactInfo || '';
      const usePhoto   = s.usePhoto && u.photoURL;
      const footerNote = s.footerNote || '';

      // Reference number: shown for single bills and live bill; grouped invoices use per-row Ref. column
      let refNum = '';
      if (singleBill && singleBill.referenceNumber) {
        refNum = singleBill.referenceNumber;
      } else if (!isLiveBill && billsOverride && billsOverride.length === 1 && billsOverride[0].referenceNumber) {
        refNum = billsOverride[0].referenceNumber;
      } else if (isLiveBill) {
        // For live bill, show "DRAFT" since it hasn't been saved yet
        refNum = 'DRAFT';
      }
      // Grouped date-range invoices: no single refNum — per-row Ref. column handles traceability

      const now = new Date();
      const dateStr = now.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

      // ── Build list of line rows ──
      let allRows = []; // { date, gameName, username, points, dollars, rate, payStatus, billId }

      // Live bill: compute credit from available balance + current payment state
      let liveCreditAvailable = 0, liveCreditApplied = 0, liveRemainingCredit = 0;
      let liveExtraFee = 0, liveGrandTotal = 0;

      if (isLiveBill) {
        const items = state.billItems || [];
        if (!items.length) { alert('No items in live bill to print.'); return; }

        // Compute totals mirroring the Live Bill panel exactly
        let liveTotalDollars = 0;
        let anyEmbed = false, totalInput = 0;
        items.forEach(it => {
          const calc = calcLine(it);
          liveTotalDollars += calc.dollars;
          if (calc.feeEmbedded) anyEmbed = true;
          if (calc.inputAmount > 0) totalInput += calc.inputAmount;
        });
        liveExtraFee = (comp.extraFeeEnabled && comp.extraFeePercent > 0)
          ? (anyEmbed && totalInput > 0 ? totalInput - liveTotalDollars : liveTotalDollars * (comp.extraFeePercent / 100))
          : 0;
        liveGrandTotal = liveTotalDollars + liveExtraFee;

        liveCreditAvailable = getCompanyCreditBalance(comp);
        const applyCredit = state.paymentStatus !== 'received';
        const invLiveCash = state.paymentStatus === 'received' ? liveGrandTotal
          : state.paymentStatus === 'partial' ? (parseFloat(state.partialAmount) || 0) : 0;
        // Use calcSettlement for unified calculation
        const _invLS = calcSettlement(liveGrandTotal, invLiveCash, liveCreditAvailable, applyCredit);
        liveCreditApplied = _invLS.creditUsed;
        liveRemainingCredit = _invLS.remainingCredit;
        const invLiveBalDue = _invLS.amountDue;

        // Determine effective status for display
        let effectiveStatus = state.paymentStatus;
        if (invLiveBalDue <= 0.001) effectiveStatus = 'received';
        else if (liveCreditApplied > 0 || invLiveCash > 0) effectiveStatus = 'partial';

        items.forEach(it => {
          const calc = calcLine(it);
          const rate = getGameRate(comp, it.gameName) || it.rate || 0;
          allRows.push({ date: now, gameName: it.gameName||'-', username: it.username||'-',
            points: calc.points, dollars: Math.abs(calc.dollars), rate: rate,
            payStatus: effectiveStatus, billId: null,
            creditApplied: liveCreditApplied });
        });
      } else {
        let bills = [];
        if (singleBill)      bills = [singleBill];
        else if (billsOverride) bills = billsOverride;
        else {
          bills = state.bills.filter(b => {
            if (b.companyId !== comp._id) return false;
            const bd = toLocalDate(b.date);
            if (fromD && bd < fromD) return false;
            if (toD   && bd > toD)   return false;
            return true;
          }).sort((a,b) => toLocalDate(a.date) - toLocalDate(b.date));
        }
        if (!bills.length) { alert('No bills found for the selected range.'); return; }

        bills.forEach(b => {
          const bd = billToDate(b.date);
          (b.items||[]).forEach(it => {
            const pts = it.points || 0;
            const dol = Math.abs(it.dollars || 0);
            const rate = getGameRate(comp, it.gameName) || 0;
            allRows.push({ date: bd, gameName: it.gameName||'-', username: it.username||'-',
              points: pts, dollars: dol, rate: rate, payStatus: b.paymentStatus, billId: b._id,
              referenceNumber: b.referenceNumber || '',
              extraFeeAmount: b.extraFeeAmount||0, creditApplied: b.creditApplied||0,
              partialAmount: b.partialAmount, extraPayments: b.extraPayments||[],
              totalDollars: b.totalDollars||0, _bill: b });
          });
        });
      }

      if (!allRows.length) { alert('No line items found.'); return; }

      // ── Summary totals ──
      const processedBills = new Set();
      let grandTotal = 0, totalReceived = 0, totalBalance = 0;
      let summaryTotalCredit = 0, summaryRemainingCredit = 0, summaryExtraFee = 0;

      if (isLiveBill) {
        grandTotal = liveGrandTotal;
        summaryExtraFee = liveExtraFee;
        summaryTotalCredit = liveCreditApplied;
        const ps = state.paymentStatus;
        const cashReceived = ps === 'received' ? liveGrandTotal
          : ps === 'partial' ? (parseFloat(state.partialAmount) || 0) : 0;
        // Use calcSettlement for unified calculation
        const _invLiveSummary = calcSettlement(liveGrandTotal, cashReceived, liveCreditAvailable, ps !== 'received');
        totalReceived = cashReceived;
        totalBalance = _invLiveSummary.amountDue;
        summaryRemainingCredit = _invLiveSummary.remainingCredit + _invLiveSummary.extraPayment;
      } else {
        const uniqueBills = [];
        allRows.forEach(r => { if (r._bill && !processedBills.has(r.billId)) { processedBills.add(r.billId); uniqueBills.push(r._bill); } });
        uniqueBills.forEach(b => {
          const ef = b.extraFeeAmount || 0;
          const cr = b.creditApplied || 0;
          const gt = (b.totalDollars||0) + ef;
          // ── Exact same formula as computeAnalyticsData (payment received summary card) ──
          // Cash paid = what was actually received in cash (partialAmount minus credit portion).
          // creditApplied is pre-paid credit, not new cash, so subtract it out.
          const bPaid = b.paymentStatus==='received'
            ? Math.max(0, gt - cr)
            : b.paymentStatus==='partial' ? Math.max(0, (b.partialAmount||0) - cr)
            : 0;
          // Extra cash: isCredit:true entries = standalone credit additions (real cash, stored on bill).
          // isGeneral:true on a holder bill (no items, totalDollars=0) = the only record of a payment.
          const _isHolder = (b.totalDollars||0) === 0 && (b.totalPoints||0) === 0;
          const exReal = (b.extraPayments||[]).reduce((s,p) => {
            if (p.isCredit) return s + (p.amount||0);
            if (p.isGeneral && _isHolder) return s + (p.amount||0);
            return s;
          }, 0);
          grandTotal         += gt;
          summaryExtraFee    += ef;
          summaryTotalCredit += cr;
          totalReceived      += bPaid + exReal;
          totalBalance       += Math.max(0, b.balanceDue||0);
        });
        // Remaining credit = current live balance (what's still available after all bills)
        summaryRemainingCredit = getCompanyCreditBalance(comp);
      }

      // ── Period label ──
      let periodLabel = '';
      if (fromD && toD) {
        periodLabel = fromD.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
                    + ' – ' + toD.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
      } else if (allRows.length) {
        periodLabel = allRows[0].date.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
      }

      // ── Table rows ──
      let tableRowsHTML = '';
      let _snIdx = 0;
      allRows.forEach(r => {
        _snIdx++;
        // Date column: clean YYYY/MM/DD only (no time, no UTC suffix)
        const _d = r.date;
        const dateLabel = _d.getFullYear() + '/'
          + String(_d.getMonth()+1).padStart(2,'0') + '/'
          + String(_d.getDate()).padStart(2,'0');
        const pStr = r.points < 0 ? '-'+fmtPts(Math.abs(r.points)) : fmtPts(r.points);
        const dStr = r.points < 0 ? '-$'+fmtDol(r.dollars) : '$'+fmtDol(r.dollars);
        // Determine status color — credit-paid bills show blue
        const hasCreditApplied = (r.creditApplied || 0) > 0;
        const stColor = hasCreditApplied
          ? (r.payStatus === 'received' ? '#2563eb' : '#7c3aed')
          : r.payStatus==='received' ? '#059669' : r.payStatus==='partial' ? '#d97706' : '#dc2626';
        const stLabel = hasCreditApplied
          ? (r.payStatus === 'received' ? 'Paid (Credit)' : 'Partial (Credit)')
          : r.payStatus==='received' ? 'Paid' : r.payStatus==='partial' ? 'Partial' : 'Due';
        // Ref. column: last segment of referenceNumber (sequence part after final '-')
        const _fullRef = r.referenceNumber || '';
        const _refSeq = _fullRef ? _fullRef.split('-').pop() : '';
        tableRowsHTML += `<tr>
          <td style="padding:6px 8px;font-size:11px;text-align:center;color:#9ca3af;font-weight:600">${_snIdx}</td>
          <td style="padding:6px 8px;font-size:12px;color:#6b7280;white-space:nowrap">${dateLabel}</td>
          <td style="padding:6px 8px;font-size:11px;text-align:center;color:#7c3aed;font-family:monospace;font-weight:600;white-space:nowrap">${esc(_refSeq)}</td>
          <td style="padding:6px 8px;font-size:12px;color:#1f2937;font-weight:600">${esc(r.gameName)}</td>
          <td style="padding:6px 8px;font-size:12px;color:#374151">${esc(r.username)}</td>
          <td style="padding:6px 8px;font-size:12px;text-align:right;color:#6b7280">${r.rate}%</td>
          <td style="padding:6px 8px;font-size:12px;text-align:right;color:${r.points<0?'#dc2626':'#1f2937'};font-weight:600">${pStr}</td>
          <td style="padding:6px 8px;font-size:12px;text-align:right;color:#1f2937;font-weight:700">${dStr}</td>
          <td style="padding:6px 8px;font-size:11px;text-align:center"><span style="color:${stColor};font-weight:700;padding:2px 7px;border-radius:10px;background:${stColor}18;white-space:nowrap">${stLabel}</span></td>
        </tr>`;
      });

      // ── Build summary rows HTML ──
      // Subtotal (before extra fee)
      const subTotal = grandTotal - summaryExtraFee;
      let summaryRowsHTML = '';
      summaryRowsHTML += `<div style="display:flex;justify-content:space-between">
        <span style="font-size:13px;color:#374151">Subtotal</span>
        <span style="font-size:13px;font-weight:700;color:#111827">$${fmtDol(subTotal)}</span>
      </div>`;
      if (summaryExtraFee > 0) {
        summaryRowsHTML += `<div style="display:flex;justify-content:space-between">
          <span style="font-size:13px;color:#d97706">Extra Fee (${comp.extraFeePercent||0}%)</span>
          <span style="font-size:13px;font-weight:700;color:#d97706">+$${fmtDol(summaryExtraFee)}</span>
        </div>`;
        summaryRowsHTML += `<div style="display:flex;justify-content:space-between">
          <span style="font-size:13px;color:#374151">Total Billed</span>
          <span style="font-size:13px;font-weight:700;color:#111827">$${fmtDol(grandTotal)}</span>
        </div>`;
      } else {
        summaryRowsHTML += `<div style="display:flex;justify-content:space-between">
          <span style="font-size:13px;color:#374151">Total Billed</span>
          <span style="font-size:13px;font-weight:700;color:#111827">$${fmtDol(grandTotal)}</span>
        </div>`;
      }
      // Show cash received (this already includes any credit that was applied)
      if (totalReceived > 0) {
        summaryRowsHTML += `<div style="display:flex;justify-content:space-between">
          <span style="font-size:13px;color:#374151">Cash Received</span>
          <span style="font-size:13px;font-weight:700;color:#059669">$${fmtDol(totalReceived)}</span>
        </div>`;
      }
      summaryRowsHTML += `<div style="height:1px;background:#e5e7eb;margin-top:4px"></div>`;
      // For single-bill or live-bill invoices, show prior outstanding and total balance due
      const _invPendingDue = getCompanyOutstandingBalance(comp);
      const _isSingleOrLive = isLiveBill || (singleBill != null) || (billsOverride && billsOverride.length === 1);

    function updateTotals() {
      let totalPts = 0, totalDollars = 0;

      });
      // Quick DOM update if elements exist
      // Just re-render for simplicity with totals
    }

    // ============================================================
    // SINGLE SOURCE OF TRUTH: getCompanyFinancials(c)
    // Returns { totalPaid, totalDue, creditBalance } computed the
    // same way everywhere. Rule:
    //   totalDue     = sum of bill.balanceDue (already reflects all payments applied)
    //   totalPaid    = sum of payments[].amount (the payments sub-array on the company)
    //   creditBalance= totalPaid - sum(bill.grandTotal for settled bills via payments)
    //                = stored as c.creditBalance (updated atomically on every payment)
    // We keep it simple: creditBalance is stored directly on the company document.
    // ============================================================
    // Returns the total outstanding balance (sum of balanceDue) across ALL saved bills for a company.
    function getCompanyOutstandingBalance(c) {
      return state.bills
        .filter(function(b) { return b.companyId === c._id; })
        .reduce(function(sum, b) { return sum + Math.max(0, b.balanceDue || 0); }, 0);
    }

    // Apply an overpayment amount to legacy due bills (oldest-first).
    // Updates balanceDue + paymentStatus + partialAmount on each cleared bill.
    // IMPORTANT: does NOT push any extraPayments entry onto the cleared bill —
    // the partialAmount/paymentStatus update is the authoritative record for analytics.
    // Returns the leftover amount that becomes true credit after all dues are cleared.
    async function applyExtraPaymentToLegacyBills(c, extraAmt, payDate) {
      if (!extraAmt || extraAmt <= 0.001) return extraAmt;
      var unpaid = state.bills
        .filter(function(b) { return b.companyId === c._id && (b.balanceDue || 0) > 0.01; })
        .sort(function(a, b) { return toLocalDate(a.date) - toLocalDate(b.date); });
      var remaining = extraAmt;
      for (var i = 0; i < unpaid.length && remaining > 0.001; i++) {
        var ub = unpaid[i];
        var uref = db.doc(userPath() + '/bills/' + ub._id);
        var usn = await uref.get(); var ud = usn.data();
        var uDue = ud.balanceDue || 0;
        if (uDue <= 0.001) continue;
        var applyAmt = parseFloat(Math.min(remaining, uDue).toFixed(2));
        var newDue = parseFloat((uDue - applyAmt).toFixed(2));
        var gt = (ud.totalDollars || 0) + (ud.extraFeeAmount || 0);
        // Update the bill's status and amounts — no extraPayments entry added here.
        // The partialAmount update is what analytics uses to count received cash on this bill.
        var uup = {
          balanceDue: newDue,
          paymentStatus: newDue <= 0.001 ? 'received' : 'partial',
          partialAmount: parseFloat((gt - newDue).toFixed(2))
        };
        await trackedWrite(function() { return uref.update(uup); });
        var lb = state.bills.find(function(b) { return b._id === ub._id; });
        if (lb) Object.assign(lb, uup);
        remaining -= applyAmt;
        remaining = parseFloat(Math.max(0, remaining).toFixed(2));
      }
      return remaining; // leftover = true credit after all dues cleared
    }

    function getCompanyCreditBalance(c) {
      // Use stored credit balance if present (set by applyPaymentToCompany)
      if (typeof c.creditBalance === 'number') return Math.max(0, c.creditBalance);
      // Fallback: derive from bills (for legacy data)
      var totalExtra = 0, totalConsumed = 0;
      var compBills = state.bills.filter(function(b){ return b.companyId === c._id; });
      for (var i = 0; i < compBills.length; i++) {
        var bill = compBills[i];
        var eps = bill.extraPayments || [];
        for (var j = 0; j < eps.length; j++) {
          if (!eps[j].fromCredit) totalExtra += (eps[j].amount || 0);
        }
        totalConsumed += (bill.creditApplied || 0);
      }
      return Math.max(0, totalExtra - totalConsumed);
    }

    function generateBillText(c) {
      // ── Uses calcSettlement as single source of truth ──
      let totalPts = 0, totalDollars = 0;
      var anyEmbed = false, totalInput = 0;
      state.billItems.forEach(function(i) {
        var calc = calcLine(i);
        totalPts += calc.points; totalDollars += calc.dollars;
        if (calc.feeEmbedded) anyEmbed = true;
        if (calc.inputAmount > 0) totalInput += calc.inputAmount;
      });
      var efAmt = (c.extraFeeEnabled && c.extraFeePercent > 0)
        ? (anyEmbed && totalInput > 0 ? totalInput - totalDollars : totalDollars * (c.extraFeePercent / 100))
        : 0;
      var grandTotal = totalDollars + efAmt;

      var creditAvail = getCompanyCreditBalance(c);
      var applyCredit = (state.paymentStatus !== 'received');
      var cashReceived = state.paymentStatus === 'received' ? grandTotal
        : state.paymentStatus === 'partial' ? (parseFloat(state.partialAmount) || 0)

      var s = calcSettlement(grandTotal, cashReceived, creditAvail, applyCredit);

      const now = new Date();
      // Copied bill always displays UTC time (spec §9)
      const dateStr = now.getUTCFullYear() + '/' + String(now.getUTCMonth()+1).padStart(2,'0') + '/' + String(now.getUTCDate()).padStart(2,'0') + ' ' + String(now.getUTCHours()).padStart(2,'0') + ':' + String(now.getUTCMinutes()).padStart(2,'0') + ' UTC';
      const lines = [];
      lines.push(`${c.name} - Bill`);
      lines.push(dateStr);
      lines.push('');
      state.billItems.forEach(function(item) {
        var calc = calcLine(item);
        var _pts = calc.points < 0 ? '-' + fmtPts(Math.abs(calc.points)) : fmtPts(calc.points);
        var _dol = calc.points < 0 ? '-$' + fmtDol(Math.abs(calc.dollars)) : '$' + fmtDol(calc.dollars);
        lines.push(String(item.gameName||'-') + ' | ' + String(item.username||'-') + ' | ' + _pts + ' pts : ' + _dol);
      });
      lines.push('');
      lines.push('Subtotal ($): ' + fmtDol(totalDollars));
      if (efAmt > 0) {
        lines.push('Extra Fee (' + (c.extraFeePercent||0) + '%): $' + fmtDol(efAmt));
      }
      lines.push('Total ($): ' + fmtDol(grandTotal));
      if (s.creditUsed > 0) {
        lines.push('Credit Applied: -$' + fmtDol(s.creditUsed));
        if (s.remainingCredit > 0) lines.push('Remaining Credit: $' + fmtDol(s.remainingCredit));
      }
      if (s.cashReceived > 0) {
        lines.push('Payment Received: $' + fmtDol(s.cashReceived));
      }
      if (s.extraPayment > 0.001) {
        lines.push('Extra Payment (added to credit): $' + fmtDol(s.extraPayment));
      }
      lines.push('');
      lines.push('Amount Due: $' + fmtDol(s.amountDue));
      var _copyPendingDue = getCompanyOutstandingBalance(c);
      if (_copyPendingDue > 0.001) {
        lines.push('Prior Outstanding: $' + fmtDol(_copyPendingDue));
        lines.push('Total Balance Due: $' + fmtDol(s.amountDue + _copyPendingDue));
      }
      return lines.join('\n');
    }

    function safeNum(v) { var n = typeof v === 'number' ? v : parseFloat(v); return (isNaN(n) || !isFinite(n)) ? 0 : n; }
    async function buildBillObject(c) {
      let totalPts = 0, totalDollars = 0;
      const items = state.billItems.map(item => {
        const calc = calcLine(item);
        totalPts += safeNum(calc.points); totalDollars += safeNum(calc.dollars);
        const costRate = safeNum(getCostRate(item.gameName));
        const sellRate = safeNum(getGameRate(c, item.gameName) || 0);
        return {
          gameName: item.gameName || '',
          gameId: item.gameId || '',
          username: item.username || '',
          value: safeNum(parseFloat(item.value)),
          costRate: costRate,
          sellRate: sellRate,
          points: safeNum(calc.points),
          dollars: safeNum(calc.dollars),
          inputAmount: safeNum(calc.inputAmount),
          feeEmbedded: calc.feeEmbedded === true
        };
      });
      var anyEmbed = items.some(function(it){return it.feeEmbedded});
      var totalInput2 = items.reduce(function(s,it){return s+(it.inputAmount||0)},0);
      const efAmt = (c.extraFeeEnabled && c.extraFeePercent>0) ? (anyEmbed && totalInput2>0 ? totalInput2-totalDollars : totalDollars*(c.extraFeePercent/100)) : 0;
      const efCostRate = c.extraFeeCostRate || 0;
      const efProfit = efAmt - (efAmt * (efCostRate / (c.extraFeePercent || 1)));
      const grandTotal = totalDollars + efAmt;
      // ── Use calcSettlement as single source of truth ──
      const credit = getCompanyCreditBalance(c);
      const applyCredit = (state.paymentStatus !== 'received');
      var cashReceived = 0;
      if (state.paymentStatus === 'received') cashReceived = grandTotal;
      else if (state.paymentStatus === 'partial') cashReceived = parseFloat(state.partialAmount) || 0;
      var s = calcSettlement(grandTotal, cashReceived, credit, applyCredit);
      // Resolve bill date first — needed by extraPayments and reference number
      var _pickerEl = document.getElementById('billDatePicker');
      var _pickerVal = _pickerEl ? _pickerEl.value : '';
      var _pickerDate = _pickerVal ? new Date(_pickerVal) : null;
      const billDate = state.billDateOverride || (_pickerDate && !isNaN(_pickerDate) ? _pickerDate.toISOString() : new Date().toISOString());

      // Build extraPayments array for overpayment → credit
      var extraPaymentsArr = [];
      if (s.extraPayment > 0) {
        var epDate = new Date(billDate).toISOString().slice(0,10);
        extraPaymentsArr.push({ amount: s.extraPayment, date: epDate });
      }
      // Derive paymentStatus for the saved bill
      var savedPayStatus;
      if (state.paymentStatus === 'received') { savedPayStatus = 'received'; }
      else if (s.amountDue <= 0.001) { savedPayStatus = 'received'; } // credit/overpay covers all
      else if (s.creditUsed > 0 || cashReceived > 0) { savedPayStatus = 'partial'; }
      else { savedPayStatus = state.paymentStatus; }
      // partialAmount = total usable (credit + cash) recorded for analytics reference
      var savedPartialAmount;
      if (savedPayStatus === 'received') { savedPartialAmount = grandTotal; }
      else { savedPartialAmount = s.creditUsed + cashReceived; }
      
      // Generate reference number
      const companyCode = c.companyCode || await generateCompanyCode();
      const referenceNumber = await generateReferenceNumber(companyCode, billDate);
      
      return {
        companyId:c._id, companyName:c.name, date:billDate, convMode:state.convMode,
        extraFeePercent: c.extraFeePercent||0, extraFeeAmount: efAmt,
        extraFeeCostRate: efCostRate, extraFeeProfit: efProfit,
        creditApplied: s.creditUsed,
        extraPayments: extraPaymentsArr,
        items, totalDollars, totalPoints:totalPts,
        paymentStatus: savedPayStatus,
        partialAmount: savedPartialAmount,
        balanceDue: s.amountDue,
        referenceNumber: referenceNumber,
        companyCode: companyCode
      };
    }

    // ============================================================

    var _analyticsCache = {};
    var _analyticsMutVersion = 0;
    var _analyticsDateFrom = null;
    var _analyticsDateTo = null;
    var _chartInstances = {};
    function invalidateAnalyticsCache() { _analyticsCache = {}; _analyticsMutVersion++; }

    function computeAnalyticsData(c, fromDate, toDate) {
      var key = c._id + '_' + state.bills.length + '_' + _analyticsMutVersion + '_' + (fromDate||0) + '_' + (toDate||0);
      if (_analyticsCache[key]) return _analyticsCache[key];
      var compBills = state.bills.filter(function(b) {
        if (b.companyId !== c._id) return false;
        if (fromDate || toDate) {
          var bd = billToDate(b.date);
          if (isNaN(bd.getTime())) return true;
          if (fromDate && bd < fromDate) return false;
          if (toDate && bd > toDate) return false;
        }
        return true;
      }).sort(function(a,b){return billToDate(a.date)-billToDate(b.date)});
      var tLP=0,tLD=0,tRP=0,tRD=0,tRec=0,tBal=0,tPr=0,tCo=0;
      var dMap={},gMap={};

    function _lineChartClickHandler(evt, elems, chart, companyId, forceAgg) {
      if(!elems||!elems.length)return;
      var idx=elems[0].index;
      var label=chart.data.labels?chart.data.labels[idx]:null;
      if(!label)return;
      var ad;
      if(companyId){
        var c=state.companies[companyId];if(!c)return;
        ad=computeAnalyticsData(c);if(!ad)return;
      }
      var compBills = ad ? ad.compBills : state.bills;
      var agg = forceAgg || state.analyticsAgg || 'D';
      // Rebuild matching: iterate all bills, compute their agg key, format it the same way the chart does, compare to clicked label
      var matchDates = [];
      for(var bi=0;bi<compBills.length;bi++){
        var bill=compBills[bi];
        var _bd1=billToDate(bill.date);
        var dk=(!_bd1||isNaN(_bd1.getTime()))?'x':(_bd1.getFullYear()+'-'+String(_bd1.getMonth()+1).padStart(2,'0')+'-'+String(_bd1.getDate()).padStart(2,'0'));
        if(dk==='x') continue;
        var ak=dk;
        if(agg==='W'){var dd=new Date(dk+'T00:00:00');dd.setDate(dd.getDate()-dd.getDay());ak=dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0');}
        else if(agg==='M'){ak=dk.slice(0,7);}
        // Try all possible label formats that the different charts use
        var fmts=[];
        if(agg==='D'){
          var pp=ak.split('-');
          fmts.push(pp[1]+'/'+pp[2]);    // MM/DD (company & global modal charts)
          fmts.push(ak.slice(5));          // MM-DD (full-page chart)
        } else {
          fmts.push(ak.length>7?ak.slice(5):ak);  // full-page format
          fmts.push(ak);                            // raw key
        }
        if(fmts.indexOf(label)!==-1 && matchDates.indexOf(dk)===-1) matchDates.push(dk);
      }
      if(!matchDates.length)return;
      showDateDrillDown(matchDates, companyId, agg, label);
    }

    function showGlobalAnalytics() {

    function computeGlobalData(fromDate, toDate) {
      var companies = Object.values(state.companies), allBills = state.bills;
      var filtered = allBills;
      if (fromDate || toDate) {
        filtered = allBills.filter(function(b) {
          var bd = billToDate(b.date);
          if (isNaN(bd.getTime())) return true;
          if (fromDate && bd < fromDate) return false;
          if (toDate && bd > toDate) return false;
          return true;
        });
      }
      var gL=0,gR=0,gRv=0,gBal=0,gPr=0,gCost=0;
      var cM={},gM={},dM={},uM={};
      for (var i=0; i<filtered.length; i++) {
        var bill=filtered[i]; var comp=companies.find(function(cc){return cc._id===bill.companyId});
        if (!comp) continue;
        var cn=comp.name||'Unknown';
        if (!cM[cn]) cM[cn]={rev:0,pr:0,bills:0,pts:0,cost:0,cid:comp._id,due:0};
        cM[cn].bills++;
        var _bdGA2=billToDate(bill.date);var dk=(!_bdGA2||isNaN(_bdGA2.getTime()))?'x':billToLocalDateKey(bill.date);
        if (!dM[dk]) dM[dk]={rev:0,pr:0,ld:0,rd:0};
        var bd=bill.totalDollars||0;
        var _bFull=bd+(bill.extraFeeAmount||0);
        var bp=bill.paymentStatus==='received'?Math.max(0,_bFull-(bill.creditApplied||0)):(bill.paymentStatus==='partial'?Math.max(0,(bill.partialAmount||0)-(bill.creditApplied||0)):0);
        var ex=(bill.extraPayments||[]).reduce(function(s,p){return s+(p.amount||0)},0);
        gRv+=bp+ex; gBal+=(bill.balanceDue||0)-ex;
        cM[cn].due+=Math.max(0,(bill.balanceDue||0));
        cM[cn].rev+=bd;
        for (var j=0; j<(bill.items||[]).length; j++) {
          var it=bill.items[j], pts=it.points||0, dol=Math.abs(it.dollars||0), absPts=Math.abs(pts);
          if (pts>0) { gL+=absPts; dM[dk].ld+=absPts; }
          else if (pts<0) { gR+=absPts; dM[dk].rd+=absPts; }
          var sr=getGameRate(comp,it.gameName)||0, cr=getCostRate(it.gameName);
          var sp=absPts*(sr/100), cp=absPts*(cr/100), pr=sp-cp;
          gPr+=pr; gCost+=cp; cM[cn].pr+=pr; cM[cn].pts+=absPts; cM[cn].cost+=cp;
          dM[dk].rev+=dol; dM[dk].pr+=pr;
          var gn=it.gameName||'Unknown';
          if (!gM[gn]) gM[gn]={rev:0,pts:0,pr:0,cost:0};
          gM[gn].rev+=dol; gM[gn].pts+=absPts; gM[gn].pr+=pr; gM[gn].cost+=cp;
          var uk=(it.username||'-')+'@'+cn;
          if (!uM[uk]) uM[uk]={name:it.username||'-',company:cn,pts:0,rev:0,loads:0};
          uM[uk].pts+=absPts; uM[uk].rev+=dol; if(pts>0) uM[uk].loads++;
        }
      }
      // Aggregate by period
      var agg = state.analyticsAgg || 'D';
      var aggMap = {};
      Object.keys(dM).sort().forEach(function(dk) {
        var ak = dk;
        if (agg === 'W') { var d=new Date(dk+'T00:00:00'); d.setDate(d.getDate()-d.getDay()); ak=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
        else if (agg === 'M') { ak = dk.slice(0,7); }
        if (!aggMap[ak]) aggMap[ak]={rev:0,pr:0,ld:0,rd:0};
        aggMap[ak].rev+=dM[dk].rev; aggMap[ak].pr+=dM[dk].pr;

      });
      var dLab=Object.keys(aggMap).sort();
      var dRev=dLab.map(function(k){return +aggMap[k].rev.toFixed(2)});
      var dPr=dLab.map(function(k){return +aggMap[k].pr.toFixed(2)});
      var tC=Object.entries(cM).sort(function(a,b){return b[1].rev-a[1].rev});
