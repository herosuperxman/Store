  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #07071a;
      --bgCard: rgba(18,16,32,0.75);
      --bgInput: rgba(22,18,38,0.8);
      --bgHover: rgba(30,27,48,0.8);
      --purple: #7c3aed;
      --purpleLight: #a78bfa;
      --purpleDark: #1a0a3e;
      --cyan: #06b6d4;
      --green: #10b981;
      --red: #ef4444;
      --orange: #f59e0b;
      --pink: #ec4899;
      --blue: #3b82f6;
      --lime: #84cc16;
      --textPrimary: #f7f5fc;
      --textSecondary: #d8d0f2;
      --textMuted: #aaa2cc;
      --border: rgba(70,58,120,0.55);
      --borderLight: rgba(90,75,145,0.45);
      --glass: rgba(20,16,40,0.55);
      --glassBorder: rgba(120,100,200,0.2);
      --glassHover: rgba(30,24,55,0.7);
    }

    body {
      background: #07071a;
      color: var(--textPrimary);
      font-family: 'Rajdhani', 'Exo 2', sans-serif;
      font-weight: 500;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 50%, rgba(147,51,234,0.22) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 15%, rgba(0,229,255,0.14) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 85%, rgba(255,62,181,0.12) 0%, transparent 40%),
        radial-gradient(ellipse at 60% 40%, rgba(176,240,0,0.07) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(147,51,234,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(147,51,234,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    #app { position: relative; z-index: 1; }

    h1, h2, h3, h4, .heading { font-family: 'Orbitron', monospace; letter-spacing: 1px; }
    input, select, textarea, button { font-family: 'Rajdhani', sans-serif; font-weight: 500; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--purple); }

    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:0.5; } }
    @keyframes syncGlow { 0%,100%{ filter:drop-shadow(0 0 2px rgba(6,182,212,0.2)); } 50%{ filter:drop-shadow(0 0 8px rgba(6,182,212,0.8)) drop-shadow(0 0 16px rgba(6,182,212,0.3)); } }
    #lastSyncedIndicator.syncing svg { animation: syncGlow 1.4s ease-in-out infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn 0.3s ease-out; }

    /* ============================================================
       LIQUID GLASS POPUP MESSAGE SYSTEM
    ============================================================ */
    @keyframes popupSlideIn {
      from { opacity: 0; transform: translateY(-28px) scale(0.95); filter: blur(4px); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    filter: blur(0px); }
    }
    @keyframes popupSlideOut {
      from { opacity: 1; transform: translateY(0)    scale(1);    filter: blur(0px); }
      to   { opacity: 0; transform: translateY(-20px) scale(0.95); filter: blur(3px); }
    }
    @keyframes overlayFadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes overlayFadeOut { from { opacity: 1; } to { opacity: 0; } }
    @keyframes iconPulseRing {
      0%   { box-shadow: 0 0 0 0 var(--popup-ring-color, rgba(99,179,237,0.55)); }
      70%  { box-shadow: 0 0 0 14px transparent; }
      100% { box-shadow: 0 0 0 0 transparent; }
    }
    @keyframes shineSwipe {
      0%   { transform: translateX(-120%) rotate(25deg); }
      100% { transform: translateX(320%)  rotate(25deg); }
    }

    .popup-overlay {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      background: rgba(4, 4, 14, 0.55);
      animation: overlayFadeIn 0.25s ease forwards;
    }
    .popup-overlay.closing {
      animation: overlayFadeOut 0.18s ease-in forwards;
    }

    /* Same glass style for both mobile and desktop */
    .popup-glass {
      position: relative; overflow: hidden;
      width: min(400px, calc(100vw - 32px));
      border-radius: 28px;
      padding: 26px 24px 20px;
      background:
        linear-gradient(135deg,
          rgba(255,255,255,0.07) 0%,
          rgba(20,16,44,0.82) 40%,
          rgba(255,255,255,0.04) 100%);
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow:
        0 24px 64px rgba(0,0,0,0.7),
        0 2px 0 rgba(255,255,255,0.09) inset,
        0 -1px 0 rgba(0,0,0,0.3) inset,
        0 0 80px rgba(124,58,237,0.08);
      backdrop-filter: blur(48px) saturate(2) brightness(0.96);
      -webkit-backdrop-filter: blur(48px) saturate(2) brightness(0.96);
      animation: popupSlideIn 0.35s cubic-bezier(.22,.68,0,1.15) forwards;
    }
    .popup-glass.closing {
      animation: popupSlideOut 0.16s ease-in forwards;
    }
    /* Shine sweep on all screen sizes */
    .popup-glass::before {
      content: '';
      position: absolute; top: 0; left: 0; width: 60%; height: 100%;
      background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.07) 50%, transparent 70%);
      animation: shineSwipe 1.8s cubic-bezier(.4,0,.2,1) 0.5s 1 forwards;
      pointer-events: none; z-index: 0;
    }
    /* Specular top highlight */
    .popup-glass::after {
      content: '';
      position: absolute; top: 0; left: 12px; right: 12px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.38), transparent);
      border-radius: 50%;
      pointer-events: none; z-index: 0;
    }

    .popup-inner { position: relative; z-index: 1; }

    /* Icon + badge — icon on left, badge centered */
    .popup-header-row {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; margin-bottom: 14px; position: relative;
    }
    .popup-icon-wrap {
      width: 26px; height: 26px; border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      animation: iconPulseRing 2s ease-out 0.8s 2;
      position: absolute; left: 0;
    }
    .popup-icon-wrap svg { width: 14px; height: 14px; }
    .popup-icon-wrap.type-info    { background: linear-gradient(135deg,#1e40af,#3b82f6); --popup-ring-color: rgba(59,130,246,0.5); box-shadow: 0 3px 12px rgba(59,130,246,0.5); }
    .popup-icon-wrap.type-success { background: linear-gradient(135deg,#065f46,#10b981); --popup-ring-color: rgba(16,185,129,0.5); box-shadow: 0 3px 12px rgba(16,185,129,0.5); }
    .popup-icon-wrap.type-warning { background: linear-gradient(135deg,#92400e,#f59e0b); --popup-ring-color: rgba(245,158,11,0.5); box-shadow: 0 3px 12px rgba(245,158,11,0.5); }
    .popup-icon-wrap.type-error   { background: linear-gradient(135deg,#7f1d1d,#ef4444); --popup-ring-color: rgba(239,68,68,0.5);  box-shadow: 0 3px 12px rgba(239,68,68,0.5); }

    .popup-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 11px; border-radius: 20px; font-size: 11px;
      font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;
      font-family: 'Orbitron', monospace;
    }
    .popup-badge.type-info    { background: rgba(59,130,246,0.18);  color: #93c5fd; border: 1px solid rgba(59,130,246,0.3); }
    .popup-badge.type-success { background: rgba(16,185,129,0.18);  color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }
    .popup-badge.type-warning { background: rgba(245,158,11,0.18);  color: #fcd34d; border: 1px solid rgba(245,158,11,0.3); }
    .popup-badge.type-error   { background: rgba(239,68,68,0.18);   color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }

    .popup-title {
      font-family: 'Orbitron', monospace;
      font-size: 15px; font-weight: 700; letter-spacing: 0.5px;
      color: #f1f5f9; text-align: center; margin-bottom: 10px;
    }
    .popup-message {
      font-size: 14px; font-weight: 500; line-height: 1.65;
      color: rgba(226,232,240,0.9); text-align: center;
      margin-bottom: 20px;
    }

    .popup-actions {
      display: flex; gap: 10px; flex-direction: column;
    }
    .popup-btn {
      width: 100%; padding: 12px 20px;
      border: none; border-radius: 14px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px; font-weight: 700; letter-spacing: 0.3px;
      cursor: pointer; transition: all 0.15s ease;
      position: relative; overflow: hidden;
    }
    .popup-btn:hover { filter: brightness(1.1); }
    .popup-btn:active { transform: scale(0.97); transition: transform 0.08s; }

    .popup-btn-dismiss {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #9333ea 100%);
      color: #fff;
      box-shadow: 0 4px 20px rgba(124,58,237,0.55), 0 1px 0 rgba(255,255,255,0.18) inset;
    }
    .popup-btn-remind {
      background: rgba(255,255,255,0.06);
      color: rgba(203,213,225,0.88);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2), 0 1px 0 rgba(255,255,255,0.07) inset;
    }
    .popup-btn-remind:hover { background: rgba(255,255,255,0.11); color: #e2e8f0; }

    .popup-counter {
      text-align: center; font-size: 11.5px; color: rgba(148,163,184,0.5);
      margin-top: 10px; font-weight: 500; letter-spacing: 0.3px;
    }
    .popup-more-dot {
      display: inline-block; width: 5px; height: 5px; border-radius: 50%;
      background: rgba(148,163,184,0.4); margin: 0 2px; vertical-align: middle;
    }
    /* HEADER */
    .header {
      background: var(--glass); border-bottom: 1px solid rgba(120,100,200,0.12);
      padding: 0 16px; height: 56px; display: flex; align-items: center;
      justify-content: space-between; backdrop-filter: blur(20px) saturate(1.3);
      -webkit-backdrop-filter: blur(20px) saturate(1.3);
      position: sticky; top: 0; z-index: 100;
    }
    .header-logo { display:flex; align-items:center; gap:10px; cursor:pointer; }
    .header-logo-icon {
      width:34px; height:34px; border-radius:8px;
      background: linear-gradient(135deg, var(--purple), var(--cyan));
      display:flex; align-items:center; justify-content:center; color:#fff; font-size:17px;
    }
    .header-logo-text { font-family:'Orbitron',monospace; font-size:15px; font-weight:900; color:var(--purpleLight); letter-spacing:2px; }
    .header-actions { display:flex; align-items:center; gap:8px; }

    /* UTILITY BAR */
    .utility-bar {
      background: var(--glass); border-bottom: 1px solid var(--glassBorder);
      padding: 8px 16px; display: flex; align-items: center; justify-content: center;
      gap: 6px; position: sticky; top: 56px; z-index: 99;
      backdrop-filter: blur(16px) saturate(1.2);
      -webkit-backdrop-filter: blur(16px) saturate(1.2);
    }
    .util-btn {
      padding: 6px 14px; font-size: 12px; font-weight: 600; border: none;
      border-radius: 8px; cursor: pointer; display: inline-flex;
      align-items: center; gap: 6px; transition: all 0.2s;
      font-family: 'Rajdhani', sans-serif; text-transform: uppercase;
      letter-spacing: 0.5px; background: var(--bgInput);
      color: var(--textSecondary); border: 1px solid var(--border);
    }
    .util-btn:hover { border-color: var(--purple); background: var(--bgHover); color: var(--textPrimary); transform: translateY(-1px); }
    .util-btn:active { transform: translateY(0); }
    .util-btn svg { width:15px; height:15px; flex-shrink:0; }
    .util-btn.syncing { animation: pulse 1s infinite; }

    /* BUTTONS */
    .btn {
      padding: 7px 14px; font-size: 13px; font-weight: 600; border: none; border-radius: 10px;
      cursor: pointer; display: inline-flex; align-items: center; gap: 5px;
      transition: all 0.2s; letter-spacing: 0.5px; text-transform: uppercase;
      font-family: 'Rajdhani', sans-serif; white-space: nowrap;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
    .btn:active { transform: translateY(0); }
    .btn-purple { background: var(--purple); color: #fff; }
    .btn-cyan { background: var(--cyan); color: #fff; }
    .btn-green { background: var(--green); color: #fff; }
    .btn-yellow { background: #fbbf24; color: #000; font-weight: 700; }
    .btn-red { background: var(--red); color: #fff; }
    .btn-orange { background: #fbbf24; color: #000; }
    .btn-pink { background: var(--pink); color: #fff; }
    .btn-ghost { background: transparent; color: var(--textSecondary); }
    .btn-ghost:hover { background: var(--bgHover); }
    .btn-outline { background: rgba(80,70,120,0.15); border: 1px solid rgba(120,100,200,0.25); color: var(--textSecondary); }
    .btn-outline:hover { background: rgba(80,70,120,0.25); border-color: rgba(120,100,200,0.35); }
    .btn-outline-purple { background:transparent; border:1px solid var(--purple); color:var(--purpleLight); }
    .btn-outline-purple:hover { background: rgba(124,58,237,0.15); }
    .btn-outline-cyan { background:transparent; border:1px solid var(--cyan); color:var(--cyan); }
    .btn-outline-cyan:hover { background: rgba(6,182,212,0.15); }
    .btn-outline-green { background:transparent; border:1px solid var(--green); color:var(--green); }
    .btn-outline-red { background:transparent; border:1px solid var(--red); color:var(--red); }
    .btn-outline-orange { background:transparent; border:1px solid #fbbf24; color:#fbbf24; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-lg { padding: 10px 20px; font-size: 15px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-full { width: 100%; justify-content: center; }

    /* INPUTS */
    .input {
      width: 100%; padding: 10px 12px; background: rgba(15,12,28,0.6);
      border: 1px solid rgba(80,65,130,0.3); border-radius: 10px; color: var(--textPrimary);
      font-size: 14px; font-weight: 500; outline: none; transition: all 0.2s;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    }
    .input:focus { border-color: var(--purple); box-shadow: 0 0 0 2px rgba(124,58,237,0.15); }
    .input::placeholder { color: #9990b8; font-weight: 500; }
    .input-search { padding-left: 38px; }

    /* Date/time inputs - glass themed */
    .input[type="date"], .input[type="datetime-local"], .input[type="time"] {
      color-scheme: dark;
      -webkit-appearance: none;
      min-height: 40px;
    }
    .input[type="date"]::-webkit-calendar-picker-indicator,
    .input[type="datetime-local"]::-webkit-calendar-picker-indicator {
      filter: invert(0.7) sepia(1) hue-rotate(220deg) saturate(3);
      cursor: pointer;
      opacity: 0.85;
      padding: 4px;
      min-width: 20px;
      min-height: 20px;
    }
    .input[type="date"]::-webkit-calendar-picker-indicator:hover,
    .input[type="datetime-local"]::-webkit-calendar-picker-indicator:hover {
      opacity: 1;
      filter: invert(0.8) sepia(1) hue-rotate(220deg) saturate(4);
    }
    /* Mobile: ensure calendar icon doesn't get clipped */
    @media (max-width: 600px) {
      .input[type="datetime-local"] { font-size: 12px !important; padding-right: 4px; }
    }

    /* CARD */
    .card {
      background: rgba(18,16,32,0.82); border: 1px solid rgba(120,100,200,0.2);
      border-radius: 14px; padding: 20px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    /* BADGE */
    .badge {
      display:inline-flex; align-items:center; padding:2px 10px; border-radius:20px;
      font-size:11px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase;
    }
    .badge-purple { background:rgba(124,58,237,0.13); color:#a78bfa; border:1px solid rgba(124,58,237,0.25); }
    .badge-green { background:rgba(16,185,129,0.13); color:#6ee7b7; border:1px solid rgba(16,185,129,0.25); }
    .badge-red { background:rgba(239,68,68,0.13); color:#fca5a5; border:1px solid rgba(239,68,68,0.25); }
    .badge-orange { background:rgba(245,158,11,0.13); color:#fcd34d; border:1px solid rgba(245,158,11,0.25); }
    .badge-cyan { background:rgba(6,182,212,0.13); color:#67e8f9; border:1px solid rgba(6,182,212,0.25); }
    .badge-pink { background:rgba(236,72,153,0.13); color:#f9a8d4; border:1px solid rgba(236,72,153,0.25); }

    /* LABEL */
    .label {
      font-size: 11px; color: #22d3ee; text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 5px; display: block; font-weight: 700;
    }

    /* MODAL */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px);
      display:flex; align-items:center; justify-content:center; z-index:1000; padding:20px;
    }
    .modal {
      background:rgba(16,13,30,0.85); border:1px solid var(--glassBorder); border-radius:18px;
      padding:24px; width:100%; max-width:550px; max-height:80vh; overflow-y:auto;
      backdrop-filter: blur(24px) saturate(1.3);
      -webkit-backdrop-filter: blur(24px) saturate(1.3);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal-header {
      display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;
    }
    .modal-title { font-family:'Orbitron',monospace; font-size:17px; color:var(--purpleLight); }

    /* DROPDOWN */
    .dropdown { position: relative; }
    .dropdown-trigger {
      padding:9px 12px; background:var(--bgInput); border:1px solid var(--border);
      border-radius:8px; cursor:pointer; display:flex; justify-content:space-between;
      align-items:center; color:var(--textPrimary); font-size:14px; font-weight:500;
      transition: border-color 0.2s; min-height: 40px;
    }
    .dropdown-trigger:hover { border-color: var(--purple); }
    .dropdown-trigger.open { border-color: var(--purple); }
    .dropdown-trigger .placeholder { color: var(--textMuted); }
    .dropdown-menu {
      position:absolute; top:calc(100% + 4px); left:0; right:0;
      background:rgba(16,13,30,0.97); border:1px solid var(--glassBorder); border-radius:10px;
      z-index:200; max-height:220px; overflow-y:auto;
      box-shadow:0 12px 40px rgba(0,0,0,0.6);
    }
    .dropdown-item {
      padding:10px 12px; cursor:pointer; display:flex; align-items:center;
      justify-content:space-between; font-size:13px; transition:background 0.15s;
      color: var(--textPrimary);
    }
    .dropdown-item:hover { background: var(--bgHover); }
    .dropdown-item.selected { background: rgba(124,58,237,0.13); color: var(--purpleLight); }
    .dropdown-search { padding:8px; border-bottom:1px solid var(--border); }
    .dropdown-empty { padding:12px; color:var(--textMuted); font-size:13px; text-align:center; }

    /* TOGGLE */
    .toggle { display:flex; align-items:center; gap:10px; cursor:pointer; }
    .toggle-track {
      width:44px; height:24px; border-radius:12px; position:relative;
      transition: background 0.2s; border: 1px solid var(--border);
    }
    .toggle-track.on { background:var(--green); border-color:rgba(16,185,129,0.4); }
    .toggle-track.off { background:rgba(239,68,68,0.25); }
    .toggle-thumb {
      width:18px; height:18px; border-radius:50%; position:absolute; top:2px;
      transition: left 0.2s, background 0.2s;
    }
    .toggle-track.on .toggle-thumb { left:22px; background:#fff; }
    .toggle-track.off .toggle-thumb { left:2px; background:var(--textMuted); }
    .toggle-label { font-size:14px; font-weight:600; }

    /* SEARCH WRAPPER */
    .search-wrap { position: relative; }
    .search-icon {
      position:absolute; left:12px; top:50%; transform:translateY(-50%);
      color:var(--textMuted); font-size:14px; pointer-events:none;
      z-index:2; display:flex; align-items:center;
    }

    /* COMPANY LIST */
    .company-item {
      display:flex; align-items:center; padding:14px 18px; background:rgba(18,16,32,0.7);
      border:1px solid var(--glassBorder); border-radius:14px; margin-bottom:10px;
      cursor:pointer; transition: all 0.25s;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .company-item:hover {
      border-color: var(--purple); background: var(--bgHover);
      transform: translateX(4px);
    }
    .company-item.inactive { opacity: 0.6; }
    .company-item.inactive:hover { opacity: 1; }
    .company-icon { font-size:20px; margin-right:16px; }
    .company-name { flex:1; font-size:16px; font-weight:600; margin-left:4px; }

    /* TABS */
    .tabs {
      display:flex; gap:4px; margin-bottom:22px; background:rgba(15,12,28,0.5);
      border-radius:14px; padding:4px; border:1px solid var(--glassBorder);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }
    .tab {
      flex:1; padding:11px 14px; border-radius:10px; border:none;
      cursor:pointer; font-size:12px; font-weight:700; font-family:'Orbitron',monospace;
      display:flex; align-items:center; justify-content:center; gap:7px;
      transition:all 0.25s; text-transform:uppercase; letter-spacing:0.5px;
      background: transparent; color: var(--textSecondary);
    }
    .tab.active { color: #fff; }
    .tab.active.tab-green { background: var(--green); }
    .tab.active.tab-cyan { background: var(--cyan); }
    .tab.active.tab-purple { background: var(--purple); }

    /* SUBTABS */
    .subtabs {
      display:flex; gap:4px; margin-bottom:18px; background:var(--bgInput);
      border-radius:10px; padding:4px;
    }
    .subtab {
      flex:1; padding:9px 14px; border-radius:8px; border:none;
      cursor:pointer; font-size:13px; font-weight:600;
      font-family:'Rajdhani',sans-serif; text-transform:uppercase;
      transition:all 0.2s; background:transparent; color:var(--textSecondary);
      display:flex; align-items:center; justify-content:center; gap:6px;
    }
    .subtab.active { background:var(--purple); color:#fff; }

    /* BILL ITEM */
    .bill-item { margin-bottom: 8px; }
    .bill-item .card { padding: 14px; backdrop-filter: none; -webkit-backdrop-filter: none; overflow: visible; }
    .bill-item.dropdown-open { z-index: 50; position: relative; isolation: auto; }
    .bill-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
    .bill-result {
      margin-top:8px; padding:8px 12px; border-radius:8px;
      background:rgba(15,12,28,0.5); border:1px solid var(--glassBorder);
      display:flex; gap:16px; font-size:13px; font-weight:600;
    }
    .bill-result .pts { color: var(--cyan); }
    .bill-result .amt { color: var(--green); }
    .bill-result .rate { color: var(--textMuted); }

    /* TOTALS */
    .totals-card {
      background: linear-gradient(135deg, rgba(26,10,62,0.6), rgba(18,16,32,0.6));
      border: 1px solid rgba(124,58,237,0.2);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }

    /* GAME TAG */
    .game-tag {
      padding:5px 12px; border-radius:8px; border:1px solid var(--border);
      background:var(--bgInput); color:var(--textSecondary); cursor:pointer;
      font-size:13px; font-weight:600; transition:all 0.15s; display:inline-block;
      margin: 3px;
    }
    .game-tag.selected { border-color:var(--purple); background:rgba(124,58,237,0.2); color:var(--purpleLight); }
    .game-tag:hover { border-color:var(--purple); }

    /* ASSIGNED GAME ROW */
    .assigned-row {
      display:flex; align-items:center; padding:12px 14px; background:rgba(18,16,32,0.85);
      border:1px solid var(--glassBorder); border-radius:12px; margin-bottom:6px;
      transition: all 0.2s;
    }
    .assigned-row:hover { border-color: rgba(124,58,237,0.4); }

    /* USERNAME ROW */
    .username-row {
      display:flex; align-items:center; padding:10px 14px; background:rgba(18,16,32,0.85);
      border:1px solid var(--glassBorder); border-radius:10px; margin-bottom:6px;
    }

    /* BILL HISTORY ITEM */
    .bill-history-item {
      padding:10px 14px; border-bottom:1px solid rgba(60,50,100,0.3);
      display:flex; align-items:center; gap:12px;
    }

    /* CONVERSION TOGGLE */
    .conv-toggle {
      display:inline-flex; align-items:center; gap:10px; padding:10px 20px;
      border-radius:12px; cursor:pointer; user-select:none; transition:all 0.3s;
      box-shadow: 0 0 20px rgba(124,58,237,0.15);
    }
    .conv-toggle:hover { box-shadow: 0 0 30px rgba(124,58,237,0.3); transform: translateY(-1px); }
    .conv-toggle:active { transform: translateY(0); }
    .conv-toggle .conv-label {
      font-family:'Orbitron',monospace; font-size:15px; font-weight:800; letter-spacing:1px;
    }

    /* PAYMENT BUTTONS */
    .payment-btns { display: flex; gap: 8px; flex-wrap: wrap; }

    /* PAGE */
    .page { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

    /* LOGIN */
    .login-page {
      min-height:100vh; display:flex; align-items:center;
      justify-content:center; padding:20px;
    }
    .login-box { text-align:center; max-width:420px; width:100%; }
    .login-logo {
      width:135px; height:135px; margin:0 auto 22px; border-radius:33px;
      display:block; object-fit:cover;
      box-shadow: 0 0 40px rgba(124,58,237,0.4), 0 0 80px rgba(6,182,212,0.15), 0 8px 32px rgba(0,0,0,0.4);
    }
    .login-title {
      font-family:'Orbitron',monospace; font-size:40px; font-weight:900;
      background: linear-gradient(135deg, #a78bfa, #06b6d4, #10b981);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      margin-bottom:10px; letter-spacing:3px;
    }

    /* ============================================================
       CASHIER MANAGEMENT STYLES — iOS Liquid Glass + Color Variety
       ============================================================ */

    /* Card color palette — each cashier card gets a tinted glass color */
    .emp-card {
      border-radius:18px; padding:18px; margin-bottom:14px; cursor:pointer;
      background:rgba(20,14,40,0.55);
      border:1px solid rgba(140,120,220,0.2);
      backdrop-filter:blur(20px) saturate(1.4);
      -webkit-backdrop-filter:blur(20px) saturate(1.4);
      box-shadow:0 4px 24px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.06);
      transition:transform 0.18s, box-shadow 0.18s, border-color 0.18s;
      position:relative; overflow:hidden;

    .emp-card:active { transform:scale(0.98); }
    .emp-card.clr-0 { border-color:rgba(124,58,237,0.35); background:rgba(124,58,237,0.08); }
    .emp-card.clr-1 { border-color:rgba(6,182,212,0.35); background:rgba(6,182,212,0.07); }
    .emp-card.clr-2 { border-color:rgba(236,72,153,0.32); background:rgba(236,72,153,0.07); }
    .emp-card.clr-3 { border-color:rgba(245,158,11,0.32); background:rgba(245,158,11,0.07); }
    .emp-card.clr-4 { border-color:rgba(52,211,153,0.32); background:rgba(52,211,153,0.07); }
    .emp-card.clr-5 { border-color:rgba(99,102,241,0.35); background:rgba(99,102,241,0.08); }
    .emp-card.active-shift {
      border-color:rgba(52,211,153,0.5) !important;

      position:absolute; top:0; left:0; width:4px; height:100%; border-radius:18px 0 0 18px;
    }
    .clr-0 .emp-card-accent { background:linear-gradient(180deg,#7c3aed,#a78bfa); }
    .clr-1 .emp-card-accent { background:linear-gradient(180deg,#06b6d4,#67e8f9); }
    .clr-2 .emp-card-accent { background:linear-gradient(180deg,#ec4899,#f9a8d4); }
    .clr-3 .emp-card-accent { background:linear-gradient(180deg,#f59e0b,#fcd34d); }
    .clr-4 .emp-card-accent { background:linear-gradient(180deg,#34d399,#6ee7b7); }

<body>
  <div id="app"></div>

  <script>
    // ============================================================
    // FIREBASE INIT
    // ============================================================
    const firebaseConfig = {
      apiKey: "AIzaSyDjrOg8Q0sIXI6Jo5f4DT2x-kv9rkbaMx0",
      authDomain: "auth.sweepadmin.com",
      projectId: "sweepadministrator",
      storageBucket: "sweepadministrator.firebasestorage.app",
      messagingSenderId: "909535669253",
      appId: "1:909535669253:web:8389b6274f269178c3806c",
      measurementId: "G-0LMKKJRY4X"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    db.enablePersistence({ synchronizeTabs: true }).catch(() => {});
    // Handle redirect result for iOS Safari / PWA
    auth.getRedirectResult().then(result => {
      if (result && result.user) {
        // Redirect sign-in succeeded - onAuthStateChanged will handle the rest
        console.log('Redirect sign-in success');
      }
    }).catch(err => {
      console.log('Redirect result:', err.code || err.message);
    });
    // Set LOCAL persistence for PWA / Safari contexts
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(() => {});

    // ============================================================
    // STATE
    // ============================================================
    // Restore persisted state
    var _persisted = {};
    try { _persisted = JSON.parse(localStorage.getItem('gb_state') || '{}'); } catch(e) {}
    const state = {
      user: null,
      view: _persisted.view === 'company' || _persisted.view === 'analytics' || _persisted.view === 'globalAnalytics' ? 'loading' : 'loading',
      accessDaysLeft: 0,
      accessExpiry: null,
      accessUnlimited: false,
      gbUsername: '',
      companies: {},
      masterGames: [],
      bills: [],
      selectedCompanyId: _persisted.selectedCompanyId || null,
      companyTab: _persisted.companyTab || 'billing',
      gamesSubTab: 'rates',
      billItems: [],
      convMode: 'pts2dollar',
      paymentStatus: 'received',
      partialAmount: '',
      recentUsernames: [],
      billDateOverride: null,
      masterGamesModalOpen: false,
      companyLastUsed: _persisted.companyLastUsed || {},
      analyticsAgg: _persisted.analyticsAgg || 'D',
      globalDateFrom: null,
      globalDateTo: null,
      _restoreView: _persisted.view || null,
    };
    function persistState() {
      try { localStorage.setItem('gb_state', JSON.stringify({
        view: state.view, selectedCompanyId: state.selectedCompanyId,
        companyTab: state.companyTab, companyLastUsed: state.companyLastUsed,
        analyticsAgg: state.analyticsAgg
      })); } catch(e) {}
    }
    function touchCompany(id) {
      state.companyLastUsed[id] = Date.now();
      persistState();
    }

    // ============================================================
    // FIREBASE DATA HELPERS
    // ============================================================
    function userPath() {
      // Cashiers share the owner's data path so all data is in sync
      if (state.empRole === 'employee' && state.empOrgId) {
        return 'users/' + state.empOrgId;
      }
      if (state.user) return 'users/' + state.user.uid;
      return 'users/undefined';
    }

    // The data owner UID — used for localStorage cache keying
    function dataOwnerUid() {
      return (state.empRole === 'employee' && state.empOrgId) ? state.empOrgId : (state.user ? state.user.uid : '');
    }

    // Pending writes counter for sync indicator
    let _pendingWrites = 0;
    let _lastSyncedTime = null;
    function startWrite() {
      _pendingWrites++;
      updateSyncIndicator();
    }
    function endWrite() {
      _pendingWrites = Math.max(0, _pendingWrites - 1);
      if (_pendingWrites === 0) {
        _lastSyncedTime = new Date();
      }
      updateSyncIndicator();
    }
    function updateSyncIndicator() {
      const el = document.getElementById('lastSyncedText');
      const wrap = document.getElementById('lastSyncedIndicator');
      if (!el) return;
      if (_pendingWrites > 0) {
        el.textContent = 'Syncing...';
        el.style.color = 'var(--textSecondary)';
        if (wrap) wrap.classList.add('syncing');
      } else {
        if (wrap) wrap.classList.remove('syncing');
        if (_lastSyncedTime) {
          el.textContent = 'Last Synced: ' + _lastSyncedTime.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', second:'2-digit', hour12:true });
          el.style.color = 'var(--textMuted)';
        } else {
          el.textContent = 'Last Synced: --:--';
          el.style.color = 'var(--textMuted)';
        }
      }
    }

    // Background write helper - doesn't block UI
    function bgWrite(promise) {
      startWrite();
      promise.then(() => endWrite()).catch(e => { endWrite(); console.error('Write error:', e); });
    }

    // Tracked write helper for await-style writes (blocks but updates sync indicator)
    async function trackedWrite(promiseFn) {
      startWrite();
      try { const r = await promiseFn(); endWrite(); return r; }
      catch(e) { endWrite(); throw e; }
    }

    let _unsubs = []; // Firestore listener unsubscribers
    function stopListeners() { _unsubs.forEach(fn => fn()); _unsubs = []; }

    // One-time initial load (fast from cache)
    // === PERFORMANCE: Cache helpers ===
    var _gbCache = {
      get: function(k) { try { var raw = localStorage.getItem('gb_'+dataOwnerUid()+'_'+k); if(!raw) return null; var d=JSON.parse(raw); return d; } catch(e){ return null; } },
      set: function(k,v) { try { localStorage.setItem('gb_'+dataOwnerUid()+'_'+k, JSON.stringify(v)); } catch(e){} },
      clear: function() { try { var keys=[]; for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.startsWith('gb_'))keys.push(k)} keys.forEach(function(k){localStorage.removeItem(k)}) } catch(e){} }
    };
    var _saveQueue = [], _saving = false, _saveIndicator = null;
    function showSaving() {
      if(_saveIndicator) return;
      _saveIndicator = document.createElement('div');
      _saveIndicator.style.cssText = 'position:fixed;bottom:16px;right:16px;background:rgba(124,58,237,0.92);color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;z-index:99999;font-family:Rajdhani,sans-serif;animation:pulse 1.5s infinite;backdrop-filter:blur(8px)';
      _saveIndicator.textContent = 'Saving…';
      document.body.appendChild(_saveIndicator);
    }
    function hideSaving() { if(_saveIndicator){_saveIndicator.remove();_saveIndicator=null} }
    async function flushSaves() {
      if(_saving||!_saveQueue.length) return;
      _saving=true; showSaving();
      while(_saveQueue.length){
        var t=_saveQueue.shift();
        try { await t.fn(); } catch(e){ console.error('Save failed:',e); if(t.retry<2){t.retry++;_saveQueue.unshift(t)}else if(t.onFail)t.onFail(e) }
      }
      _saving=false; hideSaving();
    }
    function queueSave(fn,onFail){ _saveQueue.push({fn:fn,onFail:onFail||null,retry:0}); flushSaves(); }

    async function loadAllData(force) {
      if (!state.user) return;
      // Cache-first: load cached data instantly, then fetch fresh in background
      if(!force) {
        var cached = _gbCache.get('data');
        if(cached) {
          state.masterGames = cached.mg || [];
          state.bills = cached.bills || [];
          state.companies = cached.companies || {};
          return; // Use cache, fresh data comes via listeners
        }
      }
      try {
        // Fetch companies first for fastest render
        const compSnap = await db.collection(userPath()+'/companies').get();
        const compBasic = {};
        compSnap.docs.forEach(doc => { compBasic[doc.id] = { _id: doc.id, ...doc.data(), assignedGames:[], usernames:[] }; });
        state.companies = compBasic;
        // Fetch bills + games + subcollections in parallel (non-blocking)
        const [mgSnap, billSnap] = await Promise.all([
          db.collection(userPath()+'/masterGames').get(),
          db.collection(userPath()+'/bills').orderBy('date','desc').limit(100).get(),
        ]);
        state.masterGames = mgSnap.docs.map(d => ({ _id: d.id, ...d.data() }));
        state.bills = billSnap.docs.map(d => ({ _id: d.id, ...d.data() }));
        // Load subcollections after main data is ready
        const compPromises = compSnap.docs.map(async doc => {
          const [agSnap, unSnap] = await Promise.all([
            db.collection(userPath()+'/companies/'+doc.id+'/assignedGames').get(),
            db.collection(userPath()+'/companies/'+doc.id+'/usernames').get(),
          ]);
          state.companies[doc.id].assignedGames = agSnap.docs.map(d => ({ _id: d.id, ...d.data() }));
          state.companies[doc.id].usernames = unSnap.docs.map(d => ({ _id: d.id, ...d.data() }));
        });
        await Promise.all(compPromises);
        // Cache for next load
        _gbCache.set('data', {mg:state.masterGames, bills:state.bills, companies:state.companies});
      } catch (e) {
        console.error('Load error:', e);
      }
    }

    // Setup realtime listeners after initial load
    function setupListeners() {
      stopListeners();
      if (!state.user) return;
      const bp = userPath();
      // Listen to master games
      _unsubs.push(db.collection(bp+'/masterGames').onSnapshot(snap => {
        state.masterGames = snap.docs.map(d => ({ _id: d.id, ...d.data() }));
      }));
      // Listen to bills (latest 100)
      _unsubs.push(db.collection(bp+'/bills').onSnapshot(snap => {
        state.bills = snap.docs.map(d => ({ _id: d.id, ...d.data() }));
        
        // Migrate old bills without reference numbers
        state.bills.forEach(async (bill) => {
          if (!bill.referenceNumber && bill.companyId) {
            const company = state.companies[bill.companyId];
            if (company && company.companyCode) {
              try {
                const refNum = await generateReferenceNumber(company.companyCode, bill.date);
                await db.doc(bp+'/bills/'+bill._id).update({ 
                  referenceNumber: refNum,
                  companyCode: company.companyCode 
                });
              } catch(e) {
                console.error('Error migrating reference number for bill', bill._id, e);
              }
            }
          }
        });
        
        _gbCache.set('data', {mg:state.masterGames, bills:state.bills, companies:state.companies});
        invalidateAnalyticsCache();
        // Soft-refresh bill history without rebuilding entire page
        if(state.view === 'company' && state.companyTab === 'billing') {
          refreshBillHistory();
        }
      }));
      // Listen to companies
      let _companiesMigrationDone = false;
      _unsubs.push(db.collection(bp+'/companies').onSnapshot(async snap => {
        // First pass: update state with all current data
        snap.docChanges().forEach(change => {
          const id = change.doc.id;
          const data = { _id: id, ...change.doc.data() };
          if (change.type === 'removed') {
            delete state.companies[id];
          } else {
            const existing = state.companies[id];
            data.assignedGames = existing?.assignedGames || [];
            data.usernames = existing?.usernames || [];
            state.companies[id] = data;
            setupCompanySubListeners(id);
          }
        });
        // Re-render company list immediately when data arrives from Firestore
        if (state.view === 'companies') render();
        
        // Second pass: migrate company codes sequentially (only once on first snapshot)
        if (!_companiesMigrationDone) {
          _companiesMigrationDone = true;
          const companiesNeedingCodes = Object.entries(state.companies)
            .filter(([id, c]) => !c.companyCode)
            .map(([id, c]) => id);
          
          if (companiesNeedingCodes.length > 0) {
            // Fetch ALL companies from Firestore to get a complete set of existing codes
            // This prevents duplicate codes when state is partially loaded
            try {
              const allCompSnap = await db.collection(bp+'/companies').get();
              const firestoreCodes = new Set(
                allCompSnap.docs.map(d => d.data().companyCode).filter(Boolean)
              );
              // Also include codes already assigned in state
              Object.values(state.companies).forEach(c => { if (c.companyCode) firestoreCodes.add(c.companyCode); });

              for (const id of companiesNeedingCodes) {
                try {
                  const newCode = await generateCompanyCodeFromSet(firestoreCodes);
                  firestoreCodes.add(newCode); // reserve immediately for next iteration
                  state.companies[id].companyCode = newCode;
                  await db.doc(bp+'/companies/'+id).update({ companyCode: newCode });
                } catch(e) {
                  console.error('Error generating company code for', id, e);
                }
              }
            } catch(e) {
              console.error('Error fetching companies for code migration', e);
            }
          }
        }
      }));
    }

    function setupCompanySubListeners(compId) {
      if (_compSubs[compId]) return; // Already listening
      const bp = userPath();
      const unsub1 = db.collection(bp+'/companies/'+compId+'/assignedGames').onSnapshot(snap => {

    let _companyCodeGenerationLock = false;
    let _companyCodeQueue = [];
    
    // Generate unique alphanumeric company code (A001, AA0012, AB123, etc.)
    // Accepts an optional Set of already-used codes for accurate uniqueness checking
    async function generateCompanyCodeFromSet(existingSet) {
      let prefix = 'A';
      let number = 1;
      let code = '';
      while (true) {
        code = prefix + String(number).padStart(3, '0');
        if (!existingSet.has(code)) break;
        number++;
        if (number > 999) { number = 1; prefix = incrementPrefix(prefix); }
      }
      return code;
    }

    async function generateCompanyCode() {
      while (_companyCodeGenerationLock) {
        await new Promise(resolve => setTimeout(resolve, 50));
      }
      _companyCodeGenerationLock = true;
      try {
        const allCompanies = Object.values(state.companies);
        const existingSet = new Set(allCompanies.map(c => c.companyCode).filter(Boolean));
        return await generateCompanyCodeFromSet(existingSet);
      } finally {
        _companyCodeGenerationLock = false;
      }
    }

    function incrementPrefix(prefix) {
      const chars = prefix.split('');
      let carry = true;
      
      for (let i = chars.length - 1; i >= 0 && carry; i--) {
        if (chars[i] === 'Z') {
          chars[i] = 'A';
        } else {
          chars[i] = String.fromCharCode(chars[i].charCodeAt(0) + 1);
          carry = false;
        }
      }
      
      if (carry) {
        chars.unshift('A'); // Add new letter at start
      }
      
      return chars.join('');
    }

    // Generate invoice reference number: COMPANYCODE-YYYYMMDD-XXX
    async function generateReferenceNumber(companyCode, billDate) {
      const dateObj = billDate ? new Date(billDate) : new Date();
      const yyyymmdd = dateObj.toISOString().slice(0, 10).replace(/-/g, '');
      
      // Find all bills with same company code and date to get next sequence
      const allBills = state.bills || [];
      const samePrefix = companyCode + '-' + yyyymmdd;
      const matchingRefs = allBills
        .filter(b => b.referenceNumber && b.referenceNumber.startsWith(samePrefix))
        .map(b => b.referenceNumber);
      
      let sequence = 1;
      while (true) {
        const ref = samePrefix + '-' + String(sequence).padStart(3, '0');
        if (!matchingRefs.includes(ref)) return ref;
        sequence++;
      }
    }

    // Search function that handles both company code and reference number
    function searchByCodeOrReference(query) {
      if (!query) return { companies: [], bills: [] };
      
      const q = query.trim().toUpperCase();
      const results = { companies: [], bills: [] };
      
      // Check if it's a company code (short alphanumeric)
      const allCompanies = Object.values(state.companies);
      const matchingCompanies = allCompanies.filter(c => 
        c.companyCode && c.companyCode.toUpperCase() === q
      );
      
      if (matchingCompanies.length > 0) {
        results.companies = matchingCompanies;
      }
      
      // Check if it's a reference number (format: CODE-DATE-SEQ)
      const allBills = state.bills || [];
      
      // Exact match for individual reference
      const exactMatch = allBills.filter(b => 
        b.referenceNumber && b.referenceNumber.toUpperCase() === q
      );
      
      if (exactMatch.length > 0) {
        results.bills = exactMatch;
      }
      
      return results;
    }

    // Bind event handlers for bill history items (status selects + menu buttons)
    function bindBillHistoryEvents() {
      var c = state.companies[state.selectedCompanyId];
      if(!c) return;

        sel.onchange = async function(e) {
          e.stopPropagation();

          var newStatus = sel.value;
          sel.disabled=true;sel.style.opacity='0.5';
          try {
            var ref = db.doc(userPath()+'/bills/'+bid);
            var updates = {paymentStatus: newStatus};
            {
              var snap = await ref.get(); var bd = snap.data();
              var _bGT = (bd.totalDollars||0) + (bd.extraFeeAmount||0);
              var _bCr = bd.creditApplied || 0;
              if (newStatus === 'received') {
                // partialAmount = total usable = grandTotal (credit already applied)
                updates.partialAmount = _bGT;
                updates.balanceDue = 0;
              } else if (newStatus === 'not_received') {
                // Retain credit that was already applied; balance = after-credit amount
                updates.partialAmount = _bCr; // only credit portion, no cash
                updates.balanceDue = Math.max(0, _bGT - _bCr);
              }
            }
            await trackedWrite(function(){return ref.update(updates)});
            // Update local bill + refresh just the select styling
            var lb = state.bills.find(function(b){return b._id===bid});
            if(lb){lb.paymentStatus=newStatus;if(updates.partialAmount!==undefined)lb.partialAmount=updates.partialAmount;if(updates.balanceDue!==undefined)lb.balanceDue=updates.balanceDue;}

    function bindAccessDenied() {
      const btn = document.getElementById('adSignOut');
      if (btn) btn.onclick = () => auth.signOut();

      const retryBtn = document.getElementById('btnEmpRetry');
      if (retryBtn) {
        retryBtn.onclick = async () => {
          retryBtn.textContent = 'Checking…';
          retryBtn.disabled = true;
          // Reset role state and re-run resolution
          state.empRole        = null;
          state.empOrgId       = null;
          state.empEmployeeDoc = null;
          if (auth.currentUser) {
            try {
              await resolveEmployeeRole(auth.currentUser);
              console.log('[Retry] empRole:', state.empRole, '| empOrgId:', state.empOrgId);
              if (state.empRole === 'employee') {
                const ownerAccess = await checkUserAccessByUid(state.empOrgId);
                if (ownerAccess.hasAccess) {
                  state.view = 'employment';
                  render();
                  return;
                }
              }
            } catch(e) { console.error('[Retry]', e); }
          }
          retryBtn.textContent = 'Retry Login Check';
          retryBtn.disabled = false;
          render(); // re-render to show updated diagnostic info
        };
      }
    }

    function bindLogin() {
      $('#googleSignIn').onclick = async () => {
        const btn = $('#googleSignIn');
        btn.innerHTML = '<span style="animation:pulse 1s infinite">Signing in...</span>';
        btn.disabled = true;
        try {
          const provider = new firebase.auth.GoogleAuthProvider();
          try {
            // Try popup first (works on most browsers)
            await auth.signInWithPopup(provider);
          } catch (popupErr) {
            // If popup fails (iOS Safari, PWA), try redirect
            if (popupErr.code === 'auth/operation-not-supported-in-this-environment' || 
                popupErr.code === 'auth/popup-blocked' ||
                popupErr.code === 'auth/cancelled-popup-request') {
              // Set persistence to LOCAL before redirect so session survives
              await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
              await auth.signInWithRedirect(provider);
            } else {
              throw popupErr;
            }
          }
        } catch (e) {
          const err = $('#loginError');
          err.classList.remove('hidden');
          err.textContent = e.message || 'Sign in failed';
          btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Sign in with Google`;
          btn.disabled = false;
        }
      };
    }

    // Update utility bar clock
    function updateUtilClock() {
      const el = document.getElementById('utilDateTime');
      if (!el) return;
      const now = new Date();
      const y = now.getUTCFullYear();
      const m = String(now.getUTCMonth()+1).padStart(2,'0');
      const d = String(now.getUTCDate()).padStart(2,'0');
      const h = String(now.getUTCHours()).padStart(2,'0');
      const min = String(now.getUTCMinutes()).padStart(2,'0');
      el.textContent = y+'/'+m+'/'+d+' | '+h+':'+min+' UTC';
    }
    setInterval(updateUtilClock, 10000);

      if (saveBtn) saveBtn.onclick = async () => {
        const input = document.getElementById('usernameInput');
        const hint = document.getElementById('usernameHint');
        const raw = (input.value || '').toLowerCase().replace(/[^a-z0-9_]/g, '').trim();
        input.value = raw;
        // Validation rules
        if (!raw || raw.length < 3) {
          if (hint) { hint.textContent = '✗ Too short — minimum 3 characters'; hint.style.color = '#f87171'; }
          return;
        }
        if (raw.length > 20) {
          if (hint) { hint.textContent = '✗ Too long — maximum 20 characters'; hint.style.color = '#f87171'; }
          return;
        }
        if (/^[0-9_]+$/.test(raw)) {
          if (hint) { hint.textContent = '✗ Must contain at least one letter'; hint.style.color = '#f87171'; }
          return;
        }
        if (raw.startsWith('_') || raw.endsWith('_')) {
          if (hint) { hint.textContent = '✗ Cannot start or end with underscore'; hint.style.color = '#f87171'; }
          return;
        }
        if ((raw.match(/_/g) || []).length > 1) {
          if (hint) { hint.textContent = '✗ Only one underscore allowed'; hint.style.color = '#f87171'; }
          return;
        }
        if (!/[a-z]/.test(raw)) {
          if (hint) { hint.textContent = '✗ Must contain at least one letter (a-z)'; hint.style.color = '#f87171'; }
          return;
        }
        if (raw === state.gbUsername) { cancelBtn.click(); return; }
        saveBtn.disabled = true; saveBtn.textContent = '...';
        if (hint) { hint.textContent = 'Checking availability...'; hint.style.color = '#22d3ee'; }
        try {
          // Check uniqueness via gbUsernames collection (publicly readable)
          const existing = await db.collection('gbUsernames').doc(raw).get();
          if (existing.exists && existing.data().uid !== state.user.uid) {
            if (hint) { hint.textContent = '✗ "' + raw + '" is already taken'; hint.style.color = '#f87171'; }
            saveBtn.disabled = false; saveBtn.textContent = 'Save';
            return;
          }
          // Remove old username reservation if exists
          if (state.gbUsername) {
            await db.collection('gbUsernames').doc(state.gbUsername).delete().catch(() => {});
          }
          // Reserve new username + update userAccess
          await db.collection('gbUsernames').doc(raw).set({ uid: state.user.uid, email: state.user.email });
          await db.collection('userAccess').doc(state.user.uid).update({ gbUsername: raw });
          state.gbUsername = raw;
          editRow.classList.add('hidden');
          displayRow.style.display = '';
          displayRow.innerHTML = '<span style="font-size:13px;color:#22d3ee;font-weight:600;font-family:\'Rajdhani\',sans-serif">@' + esc(raw) + '</span>' +

          document.getElementById('editUsernameBtn').onclick = editBtn.onclick;
          if (hint) { hint.textContent = '✓ Username saved!'; hint.style.color = '#34d399'; }
        } catch(e) {
          if (hint) { hint.textContent = '✗ Error: ' + e.message; hint.style.color = '#f87171'; }
        } finally {
          saveBtn.disabled = false; saveBtn.textContent = 'Save';
        }
      };

        document.body.appendChild(ov);

        document.getElementById('confirmClearRange').onclick = async function() {

          if(!toDelete.length){alert('No bills in this range');return}
          if(!confirm('Delete '+toDelete.length+' bills across all companies?'))return;
          for(var i=0;i<toDelete.length;i++){if(toDelete[i]._id)await db.doc(userPath()+'/bills/'+toDelete[i]._id).delete()}

        if (!confirm('FINAL WARNING: All data will be permanently erased. Click OK to proceed with deletion.')) return;
        try {

          loadEl.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:9999';

          if (cardEl) { cardEl.style.borderColor = 'rgba(124,58,237,0.25)'; cardEl.style.background = 'linear-gradient(135deg,rgba(124,58,237,0.08),rgba(34,211,238,0.05))'; }
        } else if (state.accessUnlimited) {
          statusEl.textContent = 'Active'; statusEl.style.color = '#34d399';
          daysNumEl.textContent = '∞'; daysNumEl.style.color = '#22d3ee';
          daysTextEl.textContent = 'Unlimited access'; daysTextEl.style.color = '#34d399';
          if (barEl) { barEl.style.width = '100%'; barEl.style.background = 'linear-gradient(90deg,#7c3aed,#22d3ee)'; }
          if (startLabel) startLabel.textContent = '';
          if (expiryLabel) expiryLabel.textContent = 'No expiry';
          if (cardEl) { cardEl.style.borderColor = 'rgba(34,211,238,0.25)'; cardEl.style.background = 'linear-gradient(135deg,rgba(34,211,238,0.08),rgba(52,211,153,0.05))'; }
        } else if (state.accessExpiry) {
          const exp = new Date(state.accessExpiry.seconds * 1000);
          const days = Math.ceil((exp - new Date()) / (1000*60*60*24));

          // Treat very large day counts (≥3650 days / 10 years) as unlimited access
          // This handles the case where unlimited access was granted via a far-future expiry date
          if (days >= 3650) {
            statusEl.textContent = 'Active'; statusEl.style.color = '#34d399';
            daysNumEl.textContent = '∞'; daysNumEl.style.color = '#22d3ee';
            daysTextEl.textContent = 'Unlimited access'; daysTextEl.style.color = '#34d399';
            if (barEl) { barEl.style.width = '100%'; barEl.style.background = 'linear-gradient(90deg,#7c3aed,#22d3ee)'; }
            if (startLabel) startLabel.textContent = '';
            if (expiryLabel) expiryLabel.textContent = 'No expiry';
            if (cardEl) { cardEl.style.borderColor = 'rgba(34,211,238,0.25)'; cardEl.style.background = 'linear-gradient(135deg,rgba(34,211,238,0.08),rgba(52,211,153,0.05))'; }
          } else {

          const totalDays = 30; // approximate subscription period for bar
          const pct = Math.max(0, Math.min(100, (days / totalDays) * 100));

          // Color scheme based on urgency
          let statusColor, daysColor, barGradient, borderColor, bgColor;
          if (days <= 0) {
            // Expired — red
            statusColor = '#ef4444'; daysColor = '#ef4444';
            barGradient = '#ef4444'; borderColor = 'rgba(239,68,68,0.25)'; bgColor = 'linear-gradient(135deg,rgba(239,68,68,0.08),rgba(124,58,237,0.04))';
          } else if (days <= 3) {
            // Critical — red/orange pulse
            statusColor = '#ef4444'; daysColor = '#f87171';
            barGradient = 'linear-gradient(90deg,#ef4444,#f97316)'; borderColor = 'rgba(239,68,68,0.3)'; bgColor = 'linear-gradient(135deg,rgba(239,68,68,0.1),rgba(249,115,22,0.05))';
          } else if (days <= 7) {
            // Warning — orange
            statusColor = '#f97316'; daysColor = '#fbbf24';
            barGradient = 'linear-gradient(90deg,#f97316,#fbbf24)'; borderColor = 'rgba(251,191,36,0.25)'; bgColor = 'linear-gradient(135deg,rgba(249,115,22,0.07),rgba(251,191,36,0.04))';
          } else if (days <= 14) {
            // Caution — yellow/amber
            statusColor = '#fbbf24'; daysColor = '#fde68a';
            barGradient = 'linear-gradient(90deg,#fbbf24,#34d399)'; borderColor = 'rgba(251,191,36,0.2)'; bgColor = 'linear-gradient(135deg,rgba(251,191,36,0.05),rgba(52,211,153,0.04))';
          } else {
            // Healthy — green/purple
            statusColor = '#34d399'; daysColor = '#34d399';
            barGradient = 'linear-gradient(90deg,#7c3aed,#34d399)'; borderColor = 'rgba(52,211,153,0.2)'; bgColor = 'linear-gradient(135deg,rgba(52,211,153,0.06),rgba(124,58,237,0.06))';
          }

          if (days > 0) {
            statusEl.textContent = 'Active'; statusEl.style.color = statusColor;
            daysNumEl.textContent = days; daysNumEl.style.color = daysColor;
            daysTextEl.textContent = 'day' + (days !== 1 ? 's' : '') + ' remaining';
            daysTextEl.style.color = days <= 7 ? statusColor : '#d8d0f2';
          } else {
            statusEl.textContent = 'Expired'; statusEl.style.color = statusColor;
            daysNumEl.textContent = '0'; daysNumEl.style.color = daysColor;
            daysTextEl.textContent = 'days remaining'; daysTextEl.style.color = statusColor;
          }

          if (barEl) { barEl.style.width = Math.max(2, pct) + '%'; barEl.style.background = barGradient; }
          if (cardEl) { cardEl.style.borderColor = borderColor; cardEl.style.background = bgColor; }

          const opts = { month:'short', day:'numeric', year:'numeric' };
          if (expiryLabel) expiryLabel.textContent = (days > 0 ? 'Expires: ' : 'Expired: ') + exp.toLocaleDateString('en-US', opts);
          if (startLabel) startLabel.textContent = 'Today';
          } // end else (non-unlimited days branch)
        } else {
          statusEl.textContent = 'No Subscription'; statusEl.style.color = 'var(--textMuted)';
          daysNumEl.textContent = '—'; daysNumEl.style.color = 'var(--textMuted)';
          daysTextEl.textContent = 'Contact admin to activate'; daysTextEl.style.color = '#fbbf24';
          if (barEl) { barEl.style.width = '0%'; }
          if (startLabel) startLabel.textContent = '';
          if (expiryLabel) expiryLabel.textContent = '';
        }
      }

      // Quick Summary — strictly mirrors Global Analytics RECEIVED and PROFIT cards
      if (revEl && plEl) {
        // Use same date range logic as global analytics page
        const _today = (function(){ var n=new Date(); return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0'); })();
        if (!state.globalDateFrom) state.globalDateFrom = _today.slice(0,8)+'01';
        if (!state.globalDateTo) state.globalDateTo = _today;
        const gFrom = new Date(state.globalDateFrom + 'T00:00:00');
        const gTo   = new Date(state.globalDateTo   + 'T23:59:59');

        // Date range label
        const labelEl = document.getElementById('panelDateRangeLabel');
        if (labelEl) {
          const fmt = d => d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
          labelEl.textContent = fmt(gFrom) + ' – ' + fmt(gTo);
        }

        // computeGlobalData: gRv = RECEIVED card, gPr = PROFIT card
        const d = computeGlobalData(gFrom, gTo);
        const totalRev = d.gRv;
        const totalPL  = d.gPr;

        const revText = '$' + totalRev.toFixed(2);
        const plText  = (totalPL >= 0 ? '+' : '') + '$' + totalPL.toFixed(2);
        revEl.textContent = revText;
        revEl.style.fontSize = revText.length > 10 ? '12px' : '15px';
        plEl.textContent = plText;
        plEl.style.fontSize = plText.length > 10 ? '12px' : '15px';
        plEl.style.color = totalPL >= 0 ? '#34d399' : '#ef4444';
      }
    }

    function doImport() {
      const input = document.createElement('input');
      input.type = 'file'; input.accept = '.json';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        let loadingOverlay;
        try {
          loadingOverlay = document.createElement('div');
          loadingOverlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:9999';
          loadingOverlay.innerHTML = '<div style="text-align:center"><div class="spinner"></div><div style="color:var(--textPrimary);font-family:Orbitron,monospace;font-size:13px;margin-top:10px">Importing data...</div><div style="color:var(--textMuted);font-size:11px;margin-top:6px;font-family:Rajdhani,sans-serif">This may take a while</div></div>';
          document.body.appendChild(loadingOverlay);
          startWrite();
          const text = await file.text();
          const data = JSON.parse(text);

          // Import master games - match by name to avoid duplicates
          if (data.masterGames) {
            for (const g of data.masterGames) {
              const { _id, ...rest } = g;
              const existing = state.masterGames.find(m => m.name === g.name);
              if (existing) {
                await db.doc(`${userPath()}/masterGames/${existing._id}`).set({ ...rest }, { merge: true });
              } else if (_id) {
                await db.doc(`${userPath()}/masterGames/${_id}`).set(rest);
              } else {
                await db.collection(`${userPath()}/masterGames`).add(rest);
              }
            }
          }

          // Import companies - match by name to avoid duplicates
          if (data.companies) {
            for (const [importCid, cdata] of Object.entries(data.companies)) {
              const { _id, assignedGames, usernames, ...compInfo } = cdata;
              const existingComp = Object.values(state.companies).find(ec => ec.name === cdata.name);
              const targetCid = existingComp ? existingComp._id : importCid;

              if (existingComp) {
                await db.doc(`${userPath()}/companies/${targetCid}`).set({ ...compInfo }, { merge: true });
              } else {
                await db.doc(`${userPath()}/companies/${targetCid}`).set(compInfo);
              }

              // Import assigned games - match by gameName within company
              if (assignedGames) {
                const existingAG = existingComp ? (existingComp.assignedGames || []) : [];
                for (const ag of assignedGames) {
                  const { _id: aid, ...agRest } = ag;
                  const matchAG = existingAG.find(e => e.gameName === ag.gameName);
                  if (matchAG) {
                    await db.doc(`${userPath()}/companies/${targetCid}/assignedGames/${matchAG._id}`).set({ ...agRest }, { merge: true });
                  } else if (aid) {
                    await db.doc(`${userPath()}/companies/${targetCid}/assignedGames/${aid}`).set(agRest);
                  } else {
                    await db.collection(`${userPath()}/companies/${targetCid}/assignedGames`).add(agRest);
                  }
                }
              }

              // Import usernames - match by username+gameName within company
              if (usernames) {
                const existingUN = existingComp ? (existingComp.usernames || []) : [];
                for (const un of usernames) {
                  const { _id: uid2, ...unRest } = un;
                  const matchUN = existingUN.find(e => e.username === un.username && e.gameName === un.gameName);
                  if (matchUN) {
                    await db.doc(`${userPath()}/companies/${targetCid}/usernames/${matchUN._id}`).set({ ...unRest }, { merge: true });
                  } else if (uid2) {
                    await db.doc(`${userPath()}/companies/${targetCid}/usernames/${uid2}`).set(unRest);
                  } else {
                    await db.collection(`${userPath()}/companies/${targetCid}/usernames`).add(unRest);
                  }
                }
              }
            }
          }

          // Import bills - replace duplicates matched by date+companyId
          if (data.bills) {
            for (const bill of data.bills) {
              const { _id: bid, ...billRest } = bill;
              const existingBill = state.bills.find(b => b.date === bill.date && b.companyId === bill.companyId);
              if (existingBill) {
                // Replace existing duplicate with imported data
                await db.doc(`${userPath()}/bills/${existingBill._id}`).set({ ...billRest }, { merge: true });
              } else if (bid) {
                await db.doc(`${userPath()}/bills/${bid}`).set(billRest);
              } else {
                await db.collection(`${userPath()}/bills`).add(billRest);
              }
            }
          }

          // Restore invoice settings
          if (data.invoiceSettings && Object.keys(data.invoiceSettings).length > 0) {
            await saveInvoiceSettings(data.invoiceSettings);
          }

          // Restore companyLastUsed preference
          if (data.companyLastUsed && Object.keys(data.companyLastUsed).length > 0) {
            state.companyLastUsed = { ...state.companyLastUsed, ...data.companyLastUsed };
            persistState();
          }

          // Restore analyticsAgg preference
          if (data.analyticsAgg) {
            state.analyticsAgg = data.analyticsAgg;
            persistState();
          }

          // Restore gbUsername if not already set
          if (data.gbUsername && !state.gbUsername) {
            try {
              const taken = await db.collection('gbUsernames').doc(data.gbUsername).get();
              if (!taken.exists) {
                await db.collection('gbUsernames').doc(data.gbUsername).set({ uid: state.user.uid, email: state.user.email });
                await db.collection('userAccess').doc(state.user.uid).update({ gbUsername: data.gbUsername });
                state.gbUsername = data.gbUsername;
              }
            } catch(e) { console.warn('Username restore skipped:', e); }
          }

          endWrite();
          loadingOverlay.remove();
          await loadAllData(true);
          render();
          const importStatus = document.createElement('div');
          importStatus.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--bgCard);border:1px solid var(--border);border-radius:12px;padding:24px;z-index:9999;text-align:center;min-width:200px';
          importStatus.innerHTML = '<div style="color:var(--green);font-weight:600;font-size:14px">✓ Import Complete</div>';
          document.body.appendChild(importStatus);
          setTimeout(() => importStatus.remove(), 2000);
        } catch (er) { endWrite(); if(loadingOverlay)loadingOverlay.remove(); alert('Import failed: ' + er.message); }
      };
      input.click();
    }

    function doFullReport(fromDate, toDate) {
      let csv = 'Company,Status,Game,Rate(%),Username,Level,Date,Points,Amount($),Type,Payment Status,Amount Received,Balance Due,Extra Payments,Total Received\n';
      const companies = Object.values(state.companies);
      const bills = state.bills.filter(b => { const d = billToDate(b.date); return d >= fromDate && d <= toDate; });

      for (const comp of companies) {
        const compBills = bills.filter(b => b.companyId === comp._id);
        if (compBills.length > 0) {
          for (const bill of compBills) {
            // Fix §6: compute bill-level values ONCE per bill, not per item
            var _exPay = (bill.extraPayments||[]).reduce(function(s,p){return s+(p.amount||0)},0);
            var _bCredit = bill.creditApplied || 0;
            var _bCash = Math.max(0, (bill.partialAmount||0) - _bCredit);
            var _totRec = _bCash + _exPay;
            var _itemCount = (bill.items||[]).length;
            for (const [_ii, item] of (bill.items || []).entries()) {
              const type = (item.points || 0) < 0 ? 'Redeem' : 'Load';
              // Only emit bill-level payment columns on the FIRST item row; blank on subsequent rows
              var _showBillFields = (_ii === 0);
              var _partialAmt = _showBillFields ? (bill.partialAmount||0) : 0;
              var _balDue    = _showBillFields ? (bill.balanceDue||0) : 0;
              var _exPayCol  = _showBillFields ? _exPay : 0;
              var _totRecCol = _showBillFields ? _totRec : 0;
              csv += `"${comp.name}","${comp.active!==false?'Active':'Inactive'}","${item.gameName||''}","${getGameRate(comp, item.gameName)}","${item.username||''}","${getUserLevel(comp, item.username, item.gameName)}","${billToDate(bill.date).toLocaleString()}",${(item.points||0).toFixed(2)},${(item.dollars||0).toFixed(2)},"${type}","${bill.paymentStatus}",${_partialAmt},${_balDue},${_exPayCol.toFixed(2)},${_totRecCol.toFixed(2)}\n`;
            }
          }
        }
      }
      csv += '\n\nSUMMARY BY COMPANY\n';
      csv += 'Company,Total Points Loaded,Total Points Redeemed,Total Amount($),Cash Received($),Extra Payments($),Total Received($),Balance Due($),Credit Balance($)\n';
      for (const comp of companies) {
        const compBills = bills.filter(b => b.companyId === comp._id);
        let loaded=0,redeemed=0,totalAmt=0,cashReceived=0,extraPay=0,totalDue=0;
        for (const bill of compBills) {
          for (const item of (bill.items||[])) { if((item.points||0)>=0) loaded+=(item.points||0); else redeemed+=Math.abs(item.points||0); }
          totalAmt += (bill.totalDollars||0) + (bill.extraFeeAmount||0);
          // Cash = partialAmount minus creditApplied (saved partialAmount = credit+cash)
          var _bCash = Math.max(0, (bill.partialAmount||0) - (bill.creditApplied||0));
          cashReceived += _bCash;
          var _ep = (bill.extraPayments||[]).reduce(function(s,p){return s+(p.amount||0)},0);
          extraPay += _ep;
          totalDue += Math.max(0, bill.balanceDue||0);
        }
        // Use getCompanyCreditBalance as single source of truth for credit balance
        var credit = getCompanyCreditBalance(comp);
        var outstanding = Math.max(0, totalDue);
        if (compBills.length>0) csv += `"${comp.name}",${loaded.toFixed(2)},${redeemed.toFixed(2)},${totalAmt.toFixed(2)},${cashReceived.toFixed(2)},${extraPay.toFixed(2)},${(cashReceived+extraPay).toFixed(2)},${outstanding.toFixed(2)},${credit.toFixed(2)}\n`;
      }
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
