    // Compute operating expenses from salary data for the given date range
    async function computeOperatingExpenses(fromDate, toDate) {
      try {
        const employees = await fetchEmployees();
        if (!cashiers.length) return { total: 0, empData: [], paid: 0, unpaid: 0 };
        const allShifts  = await fetchShifts(fromDate, toDate, null);
        const empData = await Promise.all(cashiers.filter(e => e.active !== false).map(async emp => {
          const empShifts = allShifts.filter(s => s.employeeId === emp._id);
          const totalMs   = empShifts.reduce((s, sh) => s + (sh.durationMs || 0), 0);
          const earned    = calcEarnings(emp, totalMs);
          // Fetch payments in this period
          let paid = 0, payments = [];
          try {
            const paySnap = await db.collection(payPath()).where('employeeId', '==', emp._id).get();
            payments = paySnap.docs.map(d => ({ _id: d.id, ...d.data() })).filter(p => {
              if (!p.paidAt) return false;
              const pt = p.paidAt.toDate ? p.paidAt.toDate() : new Date(p.paidAt);
              return pt >= fromDate && pt <= toDate;
            });
            paid = payments.reduce((s, p) => s + (p.amount || 0), 0);
          } catch(e) {}
          const unpaid = Math.max(0, earned - paid);
          return {
            _id: emp._id, name: emp.name || '', email: emp.email || '',
            role: emp.role || 'Cashier', salaryType: emp.salaryType,
            salaryRate: emp.salaryRate || 0, totalMs, earned,
            paid, unpaid, shifts: empShifts.length, payments,
          };
        }));
        const total  = empData.reduce((s, e) => s + e.earned,  0);
        const paid   = empData.reduce((s, e) => s + e.paid,    0);
        const unpaid = empData.reduce((s, e) => s + e.unpaid,  0);
        return { total, paid, unpaid, empData, loaded: true };
      } catch(e) {
        console.warn('[computeOpEx]', e);
        return { total: 0, empData: [], paid: 0, unpaid: 0, loaded: true };
      }
    }

    function renderGlobalAnalyticsPage() {

      // Determine which is larger and build card display

      ov.innerHTML='<div class="modal fade-in" style="max-width:520px"><div class="modal-header"><h3 class="modal-title">EDIT BILL</h3><button class="btn btn-ghost btn-sm" id="beClose"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>'

        +'<div id="beItems">'+items+'</div>'
        +'<button class="btn btn-green btn-full btn-sm" id="beSave" style="margin-top:10px;justify-content:center"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20,6 9,17 4,12"/></svg> Save Changes</button>'
        +'<button class="btn btn-full btn-sm company-settings-gear gear-active" id="beInvoice" style="margin-top:8px;justify-content:center;gap:6px;border-radius:10px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6,9 6,2 18,2 18,9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg> <span style="color:#fff;font-weight:700">Print Invoice</span></button>'
        +'<button class="btn btn-full btn-sm" id="beCopy" style="margin-top:8px;justify-content:center;background:rgba(6,182,212,0.15);border:1px solid rgba(6,182,212,0.3);color:#22d3ee"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy Bill</button>'
        +'<button class="btn btn-red btn-full btn-sm" id="beDelete" style="margin-top:8px;justify-content:center"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/></svg> Delete Bill</button></div>';
      document.body.appendChild(ov);

      document.getElementById('beClose').onclick=function(){ov.remove()};
      document.getElementById('beCopy').onclick=function(){
        // Fix §2: Use SAVED bill data only — never re-derive from UI state
        var comp = c;
        var billDate = billToDate(bill.date);
        // Copied bill always shows UTC time (spec §9)
        var dateStr = billDate.getUTCFullYear()+'/'+String(billDate.getUTCMonth()+1).padStart(2,'0')+'/'+String(billDate.getUTCDate()).padStart(2,'0')+' '+String(billDate.getUTCHours()).padStart(2,'0')+':'+String(billDate.getUTCMinutes()).padStart(2,'0')+' UTC';
        var lines = [];
        lines.push(comp.name+' - Bill');
        lines.push(dateStr);
        lines.push('');
        (bill.items||[]).forEach(function(it){
          var pts = it.points||0;
          var dol = Math.abs(it.dollars||0);
          var pStr = pts<0 ? '-'+fmtPts(Math.abs(pts)) : fmtPts(pts);
          var dStr = pts<0 ? '-$'+fmtDol(dol) : '$'+fmtDol(dol);
          lines.push((it.gameName||'-')+' | '+(it.username||'-')+' | '+pStr+' pts : '+dStr);
        });
        lines.push('');
        // All values come from the saved bill — no recalculation from UI state
        var bTotal    = bill.totalDollars || 0;
        var bExtraFee = bill.extraFeeAmount || 0;
        var bCredit   = bill.creditApplied || 0;
        var bGrand    = bTotal + bExtraFee;
        var bDue      = Math.max(0, bill.balanceDue || 0);
        var bExtraPay = (bill.extraPayments||[]).reduce(function(s,p){return s+(p.amount||0)},0);
        // Cash received = partialAmount (already includes credit component) minus creditApplied
        var bCash     = Math.max(0, (bill.partialAmount||0) - bCredit);
        lines.push('Subtotal ($): '+fmtDol(bTotal));
        if(bExtraFee>0) lines.push('Extra Fee: $'+fmtDol(bExtraFee));
        lines.push('Total ($): '+fmtDol(bGrand));
        if(bCredit>0) lines.push('Credit Applied: -$'+fmtDol(bCredit));
        if(bCash>0) lines.push('Payment Received: $'+fmtDol(bCash));
        if(bExtraPay>0) lines.push('Extra Payment (added to credit): $'+fmtDol(bExtraPay));
        var remainCr = getCompanyCreditBalance(comp);
        if(remainCr>0) lines.push('Remaining Credit: $'+fmtDol(remainCr));
        lines.push('');
        lines.push('Amount Due: $'+fmtDol(bDue));
        var _histCopyPending = getCompanyOutstandingBalance(comp);
        if (_histCopyPending > 0.001) {
          lines.push('Prior Outstanding: $'+fmtDol(_histCopyPending));
          lines.push('Total Balance Due: $'+fmtDol(bDue + _histCopyPending));
        }
        var text = lines.join('\n');
        navigator.clipboard.writeText(text).then(function(){
          var btn=document.getElementById('beCopy');

        });
      };
      document.getElementById('beInvoice').onclick=function(){ ov.remove(); generateInvoice(c, [bill], null, null, bill); };
      document.getElementById('beSave').onclick=async function(){
        var svBtn=this;var svOrig=svBtn.innerHTML;svBtn.disabled=true;svBtn.innerHTML='<span class="spinner" style="width:12px;height:12px;border-width:2px;margin:0"></span> Saving...';
        var newDateRaw=document.getElementById('beDate').value;
        // Validate date — use user-entered date if valid, otherwise fallback to original
        var newDateISO;
        if(newDateRaw){
          var parsedDate = new Date(newDateRaw);
          if(!isNaN(parsedDate.getTime())){
            newDateISO = parsedDate.toISOString();
          } else {
            console.warn('Invalid date entered, using original bill date');
            newDateISO = bill.date;
          }
        } else {
          newDateISO = bill.date;
        }
        
        var newItems=[];
        document.querySelectorAll('.be-game').forEach(function(el,i){
          newItems.push({
            gameName:el.value,
            username:document.querySelectorAll('.be-user')[i].value,
            points:parseFloat(document.querySelectorAll('.be-pts')[i].value)||0,
            dollars:parseFloat(document.querySelectorAll('.be-dol')[i].value)||0,
            gameId:bill.items[i]?bill.items[i].gameId:'',
            costRate:bill.items[i]?bill.items[i].costRate||0:0
          });
        });
        
        if(newItems.length === 0){
          alert('Cannot save bill with no items');
          svBtn.disabled=false;
          svBtn.innerHTML=svOrig;
          return;
        }
        
        var totalD=newItems.reduce(function(s,it){return s+Math.abs(it.dollars)},0);
        var totalP=newItems.reduce(function(s,it){return s+it.points},0);
        var updates={items:newItems,totalDollars:totalD,totalPoints:totalP,date:newDateISO};
        
        console.log('Saving bill edit:', {billId: bill._id, updates: updates});
        
        try{
          // Update local state FIRST so Firestore listener doesn't cause flicker
          var lb=state.bills.find(function(b){return b._id===bill._id});
          if(lb){Object.assign(lb,updates);}
          
          await trackedWrite(function(){return db.doc(userPath()+'/bills/'+bill._id).update(updates)});
          
          console.log('Bill edit saved successfully');
          invalidateAnalyticsCache();
          _gbCache.set('data', {mg:state.masterGames, bills:state.bills, companies:state.companies});
          ov.remove();
          refreshBillHistory();
        }catch(e){
          // Revert local state on error
          console.error('Failed to save bill edit:', e);
          if(lb){Object.assign(lb,{items:bill.items,totalDollars:bill.totalDollars,totalPoints:bill.totalPoints,date:bill.date});}
          alert('Error saving bill: '+e.message);
          svBtn.disabled=false;
          svBtn.innerHTML=svOrig;
        }
      };
      document.getElementById('beDelete').onclick=async function(){
        if(!confirm('Delete this bill permanently?'))return;
        var delBtn=this;delBtn.disabled=true;delBtn.textContent='Deleting...';
        try{
          await db.doc(userPath()+'/bills/'+bill._id).delete();
          state.bills=state.bills.filter(function(b){return b._id!==bill._id});
          invalidateAnalyticsCache();
          _gbCache.set('data', {mg:state.masterGames, bills:state.bills, companies:state.companies});
          ov.remove();refreshBillHistory();
        }catch(e2){alert('Error: '+e2.message);delBtn.disabled=false;delBtn.textContent='Delete'}
      };
    }

        try {
          await trackedWrite(function() { return db.doc(userPath()+'/companies/'+c._id).update({ companyCode: newCode }); });
          c.companyCode = newCode;
          state.companies[c._id].companyCode = newCode;
          // Update referenceNumbers on all bills for this company that used the old code

            var compBillsToUpdate = state.bills.filter(function(b) {

        c.extraFeePercent = val; c.extraFeeCostRate = costVal;
        overlay.remove(); showCompanySettingsModal();
      };

      document.getElementById('csDeleteCompany').onclick = async function() {
        if (!confirm('Delete company "' + c.name + '" and all its data? This cannot be undone.')) return;
        try {
          var agSnap = await db.collection(userPath()+'/companies/'+c._id+'/assignedGames').get();
          for (var d of agSnap.docs) await d.ref.delete();
          var unSnap = await db.collection(userPath()+'/companies/'+c._id+'/usernames').get();

          overlay.remove();

    function bindCompanySettings() {
      const c = state.companies[state.selectedCompanyId];
      if (!c) return;

      // Calculate and display P/L summary
      const compBills = state.bills.filter(b => b.companyId === c._id);
      let totalRev = 0, totalPL = 0;
      for (const bill of compBills) {
        totalRev += (bill.totalDollars || 0);
        for (const item of (bill.items||[])) {
          const sellR = getGameRate(c, item.gameName) || 0;
          const costR = getCostRate(item.gameName);
          const sp = (item.points||0) * (sellR/100);
          const cp = (item.points||0) * (costR/100);
          totalPL += sp - cp;
        }
      }
      if ($('#settingsRevenue')) $('#settingsRevenue').textContent = '$' + totalRev.toFixed(2);
      if ($('#settingsPL')) {
        const plEl = $('#settingsPL');
        plEl.textContent = (totalPL>=0?'+':'') + '$' + totalPL.toFixed(2);
        plEl.style.color = totalPL >= 0 ? '#34d399' : '#ef4444';

      $('#editCompanyNameBtn').onclick = () => {

    // AUTH STATE LISTENER (with access control)

    const ADMIN_EMAIL = 'service@sweepadmin.com';

    async function checkUserAccess(user) {
      // Admin always has access
      if (user.email === ADMIN_EMAIL) return { hasAccess: true, daysLeft: 999, expiry: null, gbUsername: 'admin' };

      // Safety net: if this user is actually an cashier (resolved by role check),
      // do NOT create a blank userAccess doc for them.
      // This path should only be reached for owners — cashiers return early in onAuthStateChanged.
      if (state.empRole === 'employee') {
        console.warn('[checkUserAccess] Called for an cashier — should not happen. Returning no access.');
        return { hasAccess: false, daysLeft: 0, expiry: null, gbUsername: '' };
      }

      try {
        const doc = await db.collection('userAccess').doc(user.uid).get();
        if (!doc.exists) {
          // Before creating a new record, double-check they are not an cashier
          // (employeeLinks lookup as final safety net)
          const linkKey = emailToKey(user.email);
          try {
            const linkDoc = await db.collection('employeeLinks').doc(linkKey).get();
            if (linkDoc.exists && linkDoc.data().active !== false) {
              console.warn('[checkUserAccess] User has employeeLinks doc but was not resolved as cashier — should not create userAccess doc');
              return { hasAccess: false, daysLeft: 0, expiry: null, gbUsername: '' };
            }
          } catch(e) { /* ignore */ }

          // First-time owner: create record with no access
          await db.collection('userAccess').doc(user.uid).set({
            email: user.email,
            displayName: user.displayName || '',
            photoURL: user.photoURL || '',
            gbUsername: '',
            expiryDate: null,
            isDisabled: false,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
          });
          return { hasAccess: false, daysLeft: 0, expiry: null, gbUsername: '' };
        }

        const data = doc.data();
        // Update last login (preserve existing gbUsername)
        db.collection('userAccess').doc(user.uid).update({
          lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
          email: user.email,
          displayName: user.displayName || '',
          photoURL: user.photoURL || '',
        });

        if (data.isDisabled) return { hasAccess: false, daysLeft: 0, expiry: data.expiryDate, gbUsername: data.gbUsername || '', isUnlimited: false };

        if (data.isUnlimited) return { hasAccess: true, daysLeft: 0, expiry: null, gbUsername: data.gbUsername || '', isUnlimited: true };

        if (!data.expiryDate) return { hasAccess: false, daysLeft: 0, expiry: null, gbUsername: data.gbUsername || '', isUnlimited: false };

        const now = new Date();
        const expiry = data.expiryDate.toDate();
        const diffMs = expiry - now;
        const daysLeft = Math.ceil(diffMs / (1000 * 60 * 60 * 24));

        return { hasAccess: daysLeft > 0, daysLeft: Math.max(0, daysLeft), expiry: data.expiryDate, gbUsername: data.gbUsername || '', isUnlimited: false };
      } catch (e) {
        console.error('Access check error:', e);
        return { hasAccess: false, daysLeft: 0, expiry: null, gbUsername: '' };
      }
    }

    // Check owner access for an cashier login.
    // Reads the ownerAccess fields embedded in the cashier's own employeeLinks doc
    // (written by owner at sync time) — avoids cross-user userAccess reads which
    // are blocked by Firestore security rules.
    // ─── Panel shift status for cashier accounts ────────────────────────────────
    let _menuShiftInterval = null;

    async function updateMenuShiftStatus() {
      const statusEl   = document.getElementById('menuShiftStatus');
      const timerEl    = document.getElementById('menuShiftTimer');
      const earningsEl = document.getElementById('menuShiftEarnings');
      const inBtn      = document.getElementById('menuShiftInBtn');
      const outBtn     = document.getElementById('menuShiftOutBtn');
      if (!statusEl) return;

      const emp = state.empEmployeeDoc;
      if (!emp) { statusEl.textContent = 'Loading…'; return; }

      let activeShifts = [];
      try { activeShifts = await getActiveShifts(); } catch(e) {}
      const myShift = activeShifts.find(s => s.employeeId === emp._id);

      clearInterval(_menuShiftInterval);

      if (myShift) {
        // Store startMs once — all subsequent ticks use local Date.now() only (no Firestore reads)
        const startMs = myShift.startTime?.toDate ? myShift.startTime.toDate().getTime() : Date.now();

        statusEl.textContent = 'On shift';
        statusEl.style.color = 'rgba(255,255,255,0.9)';
        if (timerEl)    { timerEl.style.display    = 'block'; timerEl.textContent    = formatHHMMSS(Date.now() - startMs); }
        if (earningsEl) { earningsEl.style.display = 'block'; earningsEl.textContent = '$' + calcEarnings(emp, Date.now()-startMs).toFixed(2) + ' earned'; }
        if (inBtn)  inBtn.style.display  = 'none';
        if (outBtn) {
          outBtn.style.display = 'flex';
          outBtn.disabled = false;
          outBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg> SHIFT OUT';
          outBtn.onclick = async () => {
            outBtn.disabled = true;
            outBtn.textContent = 'Ending shift…';
            try { await shiftOut(myShift._id, myShift.startTime); } catch(e) { alert('Error: ' + e.message); }
            outBtn.disabled = false;
            outBtn.style.display = 'none';
            if (inBtn)      { inBtn.style.display = 'flex'; }
            if (timerEl)    timerEl.style.display    = 'none';
            if (earningsEl) earningsEl.style.display = 'none';
            statusEl.textContent = 'Not on shift';
            clearInterval(_menuShiftInterval);
            // Refresh after brief delay to get updated state
            setTimeout(() => updateMenuShiftStatus(), 400);
            if (state.view === 'employment') setTimeout(() => refreshEmploymentSelf(), 400);
          };
        }

        // Tick every second — pure local calculation, zero Firestore reads
        _menuShiftInterval = setInterval(() => {
          const tEl = document.getElementById('menuShiftTimer');
          const eEl = document.getElementById('menuShiftEarnings');
          if (!tEl) { clearInterval(_menuShiftInterval); return; }
          const elapsed = Date.now() - startMs;
          tEl.textContent = formatHHMMSS(elapsed);
          if (eEl) eEl.textContent = '$' + calcEarnings(emp, elapsed).toFixed(2) + ' earned';
        }, 1000);

      } else {
        statusEl.textContent = 'Not on shift';
        statusEl.style.color = 'rgba(255,255,255,0.65)';
        if (timerEl)    timerEl.style.display    = 'none';
        if (earningsEl) earningsEl.style.display = 'none';
        if (outBtn) outBtn.style.display = 'none';
        if (inBtn) {
          inBtn.style.display = 'flex';
          inBtn.disabled = false;
          inBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12,8 12,12 14,14"/></svg> SHIFT IN';
          inBtn.onclick = async () => {
            inBtn.disabled = true;
            inBtn.textContent = 'Starting shift…';
            try {
              await shiftIn(emp._id, emp.name || state.user.displayName || '');
              // After shift in, immediately update UI locally then refresh
              inBtn.style.display = 'none';
              statusEl.textContent = 'On shift';
              setTimeout(() => updateMenuShiftStatus(), 400);
              if (state.view === 'employment') setTimeout(() => refreshEmploymentSelf(), 400);
            } catch(e) {
              alert('Error: ' + e.message);
              inBtn.disabled = false;
              inBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12,8 12,12 14,14"/></svg> SHIFT IN';
            }
          };
        }
      }
    }

    async function checkUserAccessByUid(ownerUid) {
      // Primary: read embedded access from employeeLinks doc (cashier can read their own)
      try {
        const linkKey = emailToKey((state.user?.email || '').toLowerCase().trim());
        const linkDoc = await db.collection('employeeLinks').doc(linkKey).get();
        console.log('[checkAccess] employeeLinks read — exists:', linkDoc.exists, '| key:', linkKey);
        if (linkDoc.exists) {
          const link = linkDoc.data();
          console.log('[checkAccess] link data:', JSON.stringify({
            ownerHasAccess: link.ownerHasAccess,
            ownerAccessExpiry: link.ownerAccessExpiry,
            accessGrantedAt: link.accessGrantedAt,
          }));
          // ownerHasAccess is written by owner at sync time
          if (link.ownerHasAccess === true) {
            console.log('[checkAccess] ✓ Access granted via embedded ownerHasAccess flag');
            return { hasAccess: true };
          }
          // Fallback: check expiry date embedded at sync time
          if (link.ownerAccessExpiry) {
            const exp = link.ownerAccessExpiry.toDate ? link.ownerAccessExpiry.toDate() : new Date(link.ownerAccessExpiry);
            const daysLeft = Math.ceil((exp - new Date()) / (1000 * 60 * 60 * 24));
            console.log('[checkAccess] ownerAccessExpiry daysLeft:', daysLeft);
            if (daysLeft > 0) return { hasAccess: true };
          }
        }
      } catch(e) {
        console.error('[checkAccess] employeeLinks read failed:', e.code, e.message);
      }

      // Fallback: try reading userAccess directly (works if security rules allow it)
      try {
        const doc = await db.collection('userAccess').doc(ownerUid).get();
        console.log('[checkAccess] userAccess fallback — exists:', doc.exists);
        if (doc.exists) {
          const data = doc.data();
          console.log('[checkAccess] userAccess data:', JSON.stringify({
            isDisabled: data.isDisabled,
            isUnlimited: data.isUnlimited,
            expiryDate: data.expiryDate ? (data.expiryDate.toDate ? data.expiryDate.toDate().toISOString() : String(data.expiryDate)) : null,
          }));
          if (data.isDisabled) return { hasAccess: false };
          if (data.isUnlimited) return { hasAccess: true };
          if (data.expiryDate) {
            const exp = data.expiryDate.toDate ? data.expiryDate.toDate() : new Date(data.expiryDate);
            const days = Math.ceil((exp - new Date()) / (1000 * 60 * 60 * 24));
            console.log('[checkAccess] userAccess daysLeft:', days);
            if (days > 0) return { hasAccess: true };
          }
        }
      } catch(e) {
        console.warn('[checkAccess] userAccess read blocked (expected if security rules deny cross-user reads):', e.code);
      }

      console.log('[checkAccess] No access found via any method');
      return { hasAccess: false };
    }

    auth.onAuthStateChanged(async (user) => {

    async function checkPopupMessages(uid) {

        const [snap1, snap2] = await Promise.all([
          db.collection('popupMessages')
            .where('targetUid', '==', uid)
            .where('dismissed', '==', false)
            .get(),
          db.collection('popupMessages')
            .where('targetAll', '==', true)
            .where('dismissed', '==', false)
            .get(),
        ]);

        const seen = new Set();
        const msgs = [];
        for (const doc of [...snap1.docs, ...snap2.docs]) {
          if (seen.has(doc.id)) continue;
          seen.add(doc.id);
          const d = doc.data();
          // Check if snoozed (remind later)
          const snoozeUntil = parseInt(localStorage.getItem(REMIND_LATER_KEY_PREFIX + doc.id) || '0', 10);
          if (snoozeUntil && now < snoozeUntil) continue; // still snoozed
          msgs.push({ id: doc.id, ...d });

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }

    // Renders message text safely, converting URLs into tappable anchor tags
    function linkifyMessage(str) {
      // First escape all HTML to prevent injection

      return safe.replace(
        /(https?:\/\/[^\s<>"']+)/g,
        (url) => `<a href="${url}" target="_blank" rel="noopener noreferrer" style="color:#93c5fd;text-decoration:underline;text-underline-offset:3px;word-break:break-all;">${url}</a>`

    // --- Salary calculation helpers ---
    function hoursFromMs(ms) { return ms / 3600000; }

    // Get the salary period label for a date given the cashier's salary type
    function getSalaryPeriodKey(date, salaryType) {
      const d = date instanceof Date ? date : new Date(date);
      const y = d.getFullYear(), m = d.getMonth(), day = d.getDate();
      switch (salaryType) {
        case 'hourly':   return `${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:00`;
        case 'daily':    return `${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        case 'weekly':   { const wStart = new Date(d); wStart.setDate(day - d.getDay()); return `W${String(wStart.getMonth()+1).padStart(2,'0')}-${String(wStart.getDate()).padStart(2,'0')}-${wStart.getFullYear()}`; }
        case 'biweekly': { const baseDate = new Date(y, 0, 1); const weekNum = Math.floor((d - baseDate) / (7*24*3600*1000)); const bwNum = Math.floor(weekNum / 2); return `BW${bwNum}-${y}`; }
        case 'monthly':  return `${y}-${String(m+1).padStart(2,'0')}`;
        default:         return `${y}-${String(m+1).padStart(2,'0')}`;
      }
    }

    function getSalaryPeriodLabel(key, salaryType) {
      try {
        switch (salaryType) {
          case 'hourly':   return key; // already readable
          case 'daily':    { const [y,mo,d] = key.split('-'); return new Date(y,mo-1,d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
          case 'weekly':   return 'Week of ' + key.replace('W','').replace(/-(\d{4})$/,' $1');
          case 'biweekly': return 'Bi-Week ' + key;
          case 'monthly':  { const [y,mo] = key.split('-'); return new Date(y,mo-1,1).toLocaleDateString('en-US',{month:'long',year:'numeric'}); }
          default:         { const [y,mo] = key.split('-'); return new Date(y,mo-1,1).toLocaleDateString('en-US',{month:'long',year:'numeric'}); }
        }
      } catch(e) { return key; }
    }

    // Group shifts into salary periods and return array of { key, label, durationMs, earnings }
    function groupShiftsByPeriod(shifts, emp) {
      const periods = {};
      shifts.forEach(sh => {
        const t = sh.startTime?.toDate ? sh.startTime.toDate() : new Date(sh.startTime || 0);
        const key = getSalaryPeriodKey(t, emp.salaryType);
        if (!periods[key]) periods[key] = { key, durationMs: 0 };
        periods[key].durationMs += sh.durationMs || 0;
      });
      return Object.values(periods)
        .sort((a,b) => b.key.localeCompare(a.key))
        .map(p => ({
          ...p,
          label:    getSalaryPeriodLabel(p.key, emp.salaryType),
          earnings: calcEarnings(emp, p.durationMs),
        }));
    }

    // Group shifts into salary periods based on cashier salary type.
    // Returns array of { label, shifts, durationMs, earned, periodStart, periodEnd }
    function getSalaryPeriods(emp, shifts) {
      if (!shifts.length) return [];
      const type = emp.salaryType || 'hourly';
      const rate = emp.salaryRate || 0;
      const sorted = [...shifts].sort((a,b) => {
        const ta = a.startTime?.toDate ? a.startTime.toDate().getTime() : 0;
        const tb = b.startTime?.toDate ? b.startTime.toDate().getTime() : 0;
        return ta - tb;
      });

      // getPeriodKey: returns a string key for what period a shift belongs to
      function getPeriodKey(shift) {
        const d = shift.startTime?.toDate ? shift.startTime.toDate() : new Date(shift.startTime);
        // Use local date components — toISOString() gives UTC which mis-buckets late-night shifts
        const localDate = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
        if (type === 'hourly') return localDate; // group by local day for hourly
        if (type === 'daily')  return localDate;
        if (type === 'weekly') {
          // ISO week: Monday-based, use local date
          const day = d.getDay() === 0 ? 6 : d.getDay() - 1;
          const mon = new Date(d); mon.setDate(d.getDate() - day); mon.setHours(0,0,0,0);
          return mon.getFullYear() + '-' + String(mon.getMonth()+1).padStart(2,'0') + '-' + String(mon.getDate()).padStart(2,'0');
        }
        if (type === 'biweekly') {
          // Bi-week: epoch / 14 days
          const epochDays = Math.floor(d.getTime() / 86400000);
          const biWeekNum = Math.floor(epochDays / 14);
          return 'bw_' + biWeekNum;
        }
        if (type === 'monthly') return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
        return localDate;
      }

      function getPeriodLabel(key, shift) {
        const d = shift.startTime?.toDate ? shift.startTime.toDate() : new Date(shift.startTime);
        if (type === 'hourly') return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
        if (type === 'daily')  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
        if (type === 'weekly') {
          const mon = new Date(key);
          const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
          return mon.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' – ' + sun.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
        }
        if (type === 'biweekly') {
          const bwNum = parseInt(key.replace('bw_',''));
          const start = new Date(bwNum * 14 * 86400000);
          const end   = new Date((bwNum * 14 + 13) * 86400000);
          return start.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' – ' + end.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
        }
        if (type === 'monthly') {
          return d.toLocaleDateString('en-US',{month:'long',year:'numeric'});
        }
        return key;
      }

      const periodMap = {};
      sorted.forEach(sh => {
        const k = getPeriodKey(sh);
        if (!periodMap[k]) periodMap[k] = { key:k, label:'', shifts:[], durationMs:0, firstShift:sh };
        periodMap[k].shifts.push(sh);
        periodMap[k].durationMs += sh.durationMs || 0;
      });

      return Object.values(periodMap).map(p => {
        p.label    = getPeriodLabel(p.key, p.firstShift);
        p.earned   = calcEarnings(emp, p.durationMs);
        const d    = p.firstShift.startTime?.toDate ? p.firstShift.startTime.toDate() : new Date();
        p.periodStart = p.key;
        p.periodEnd   = p.key;
        return p;
      }).sort((a,b) => b.key.localeCompare(a.key)); // newest first
    }

    function calcEarnings(empDoc, totalMs) {
      const hours = hoursFromMs(totalMs);
      const rate  = empDoc.salaryRate || 0;
      switch (empDoc.salaryType) {
        case 'hourly':   return hours * rate;
        case 'daily':    return Math.ceil(hours / 8) * rate;
        case 'weekly':   return (hours / 40) * rate;
        case 'biweekly': return (hours / 80) * rate;
        case 'monthly':  return (hours / 160) * rate;
        default:         return 0;
      }
    }

    function salaryPeriodLabel(t) {
      return { hourly:'per hour', daily:'per day', weekly:'per week', biweekly:'per 2 weeks', monthly:'per month' }[t] || t;
    }

    // Returns the pay period label and expected periods in date range
    function getSalaryPeriodLabel(salaryType) {
      return { hourly:'Hour', daily:'Day', weekly:'Week', biweekly:'Bi-Week', monthly:'Month' }[salaryType] || salaryType;
    }

    // Group shifts into salary periods and compute earnings per period
    function buildSalaryPeriods(empDoc, shifts, fromDate, toDate) {
      if (!shifts.length) return [];
      const type = empDoc.salaryType || 'monthly';
      const rate = empDoc.salaryRate || 0;

      // Determine period boundaries
      function getPeriodKey(date) {
        const d = date instanceof Date ? date : new Date(date);
        if (type === 'hourly')   return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+'T'+String(d.getHours()).padStart(2,'0');
        if (type === 'daily')    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
        if (type === 'weekly') {
          // Week starting Monday
          const day = d.getDay(); const diff = (day === 0 ? -6 : 1 - day);
          const mon = new Date(d); mon.setDate(d.getDate() + diff);
          return mon.getFullYear()+'-W'+String(mon.getMonth()+1).padStart(2,'0')+'-'+String(mon.getDate()).padStart(2,'0');
        }
        if (type === 'biweekly') {
          // Bi-week: week 1-2, 3-4 of month
          const weekOfMonth = Math.floor((d.getDate()-1)/14);
          return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-BW'+weekOfMonth;
        }
        // monthly
        return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
      }

      function getPeriodLabel(key) {
        if (type === 'hourly') {
          const parts = key.split('T');
          return parts[0] + ' ' + parts[1] + ':00';
        }
        if (type === 'daily') return new Date(key+'T00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'});
        if (type === 'weekly') {
          const parts = key.replace('W','').split('-');
          return 'Week of ' + parts[1]+'/'+parts[2]+'/'+parts[0];
        }
        if (type === 'biweekly') {
          const parts = key.split('-');
          const bw = parts[2].replace('BW','');
          const start = parseInt(bw)*14+1;
          return parts[1]+'/'+String(start).padStart(2,'0')+'/'+parts[0] + ' – '+parts[1]+'/'+String(Math.min(start+13, 31)).padStart(2,'0');
        }
        // monthly
        const [yr, mo] = key.split('-');
        return new Date(yr, parseInt(mo)-1, 1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
      }

      // Group shifts
      const periods = {};
      shifts.forEach(sh => {
        if (!sh.startTime) return;
        const d = sh.startTime.toDate ? sh.startTime.toDate() : new Date(sh.startTime);
        const key = getPeriodKey(d);
        if (!periods[key]) periods[key] = { key, label: getPeriodLabel(key), totalMs: 0, shifts: [] };
        periods[key].totalMs += sh.durationMs || 0;
        periods[key].shifts.push(sh);
      });

      return Object.values(periods)
        .sort((a,b) => b.key.localeCompare(a.key))
        .map(p => ({
          ...p,
          earnings: calcEarnings(empDoc, p.totalMs),
          hours: hoursFromMs(p.totalMs),
        }));
    }

    // Get a human-readable period label for a salary type
    function salaryPeriodLabel(type) {
      return { hourly:'Hourly Pay', daily:'Daily Pay', weekly:'Weekly Pay',
               biweekly:'Bi-Weekly Pay', monthly:'Monthly Pay' }[type] || 'Pay';
    }

    // Get period key for a date (groups shifts into salary periods)
    function shiftPeriodKey(date, salaryType) {
      const d = date instanceof Date ? date : (date.toDate ? date.toDate() : new Date(date));
      const y = d.getFullYear(), m = d.getMonth() + 1, day = d.getDate();
      switch(salaryType) {
        case 'hourly': {
          // Each hour is its own period key: YYYY-MM-DD-HH
          return `${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}-${String(d.getHours()).padStart(2,'0')}`;
        }
        case 'daily':
          return `${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        case 'weekly': {
          // ISO week: Monday-based
          const tmp = new Date(d); tmp.setHours(0,0,0,0);
          const dayOfWeek = (tmp.getDay() + 6) % 7; // Mon=0
          tmp.setDate(tmp.getDate() - dayOfWeek);
          return `${tmp.getFullYear()}-W${String(tmp.getMonth()+1).padStart(2,'0')}-${String(tmp.getDate()).padStart(2,'0')}`;
        }
        case 'biweekly': {
          const tmp = new Date(d); tmp.setHours(0,0,0,0);
          const dayOfWeek = (tmp.getDay() + 6) % 7;
          tmp.setDate(tmp.getDate() - dayOfWeek);
          // Even/odd week pair
          const weekNum = Math.floor(tmp.getDate() / 14);
          return `${tmp.getFullYear()}-${String(tmp.getMonth()+1).padStart(2,'0')}-BW${weekNum}`;
        }
        case 'monthly':
          return `${y}-${String(m).padStart(2,'0')}`;
        default:
          return `${y}-${String(m).padStart(2,'0')}`;
      }
    }

    // Group shifts by period and return array of {periodKey, periodLabel, shifts, totalMs, earnings}
    function groupShiftsByPeriod(shifts, empDoc) {
      const groups = {};
      shifts.forEach(sh => {
        const t = sh.startTime?.toDate ? sh.startTime.toDate() : new Date(sh.startTime);
        const key = shiftPeriodKey(t, empDoc.salaryType);
        if (!groups[key]) {
          groups[key] = { periodKey: key, shifts: [], totalMs: 0 };
          // Build human label
          const d = t;
          switch(empDoc.salaryType) {
            case 'hourly':
              groups[key].periodLabel = d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString('en-US',{hour:'2-digit',hour12:true});
              break;
            case 'daily':
              groups[key].periodLabel = d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
              break;
            case 'weekly':
            case 'biweekly': {
              const tmp = new Date(d); tmp.setHours(0,0,0,0);
              const dow = (tmp.getDay()+6)%7; tmp.setDate(tmp.getDate()-dow);
              const end = new Date(tmp); end.setDate(end.getDate() + (empDoc.salaryType==='biweekly'?13:6));
              groups[key].periodLabel = tmp.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' – ' + end.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
              break;
            }
            case 'monthly':
              groups[key].periodLabel = d.toLocaleDateString('en-US',{month:'long',year:'numeric'});
              break;
            default:
              groups[key].periodLabel = key;
          }
        }
        groups[key].shifts.push(sh);
        groups[key].totalMs += (sh.durationMs || 0);
      });
      return Object.values(groups).sort((a,b) => b.periodKey.localeCompare(a.periodKey)).map(g => ({
        ...g, earnings: calcEarnings(empDoc, g.totalMs)
      }));
    }

    // How many salary periods fit in a date range
    function salaryPeriodLabel(empDoc) {
      const labels = { hourly:'Hourly', daily:'Daily', weekly:'Weekly', biweekly:'Bi-Weekly', monthly:'Monthly' };
      return labels[empDoc.salaryType] || empDoc.salaryType;
    }

    // For a date range, how many salary periods are there?
    function countPeriods(empDoc, fromDate, toDate) {
      const ms = toDate - fromDate;
      const days = ms / 86400000;
      switch (empDoc.salaryType) {
        case 'hourly':    return hoursFromMs(ms);   // each hour is a "period"
        case 'daily':     return days;
        case 'weekly':    return days / 7;
        case 'biweekly':  return days / 14;
        case 'monthly':   return days / 30.44;
        default:          return 1;
      }
    }

    // Expected gross salary for a period regardless of hours (for fixed types)
    function calcExpectedSalary(empDoc, fromDate, toDate, actualMs) {
      const rate = empDoc.salaryRate || 0;
      switch (empDoc.salaryType) {
        case 'hourly':   return hoursFromMs(actualMs) * rate;              // purely time-based
        case 'daily':    return Math.ceil((toDate - fromDate) / 86400000) * rate;
        case 'weekly':   return Math.ceil((toDate - fromDate) / (86400000*7)) * rate;
        case 'biweekly': return Math.ceil((toDate - fromDate) / (86400000*14)) * rate;
        case 'monthly':  return Math.ceil((toDate - fromDate) / (86400000*30.44)) * rate;
        default:         return 0;
      }
    }

    // Check if a payment record matches a period key
    function periodMatchesKey(pay, key, empDoc) {
      if (!pay.periodStart) return false;
      const ps = pay.periodStart?.toDate ? pay.periodStart.toDate() : new Date(pay.periodStart);
      const type = empDoc.salaryType;
      function periodKey(date) {
        const d = new Date(date);
        if (type === 'hourly') return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+'T'+String(d.getHours()).padStart(2,'0');
        if (type === 'daily') return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
        if (type === 'weekly' || type === 'biweekly') {
          const day = d.getDay(); const diff = d.getDate() - day;
          const weekStart = new Date(d); weekStart.setDate(diff); weekStart.setHours(0,0,0,0);
          if (type === 'biweekly') {
            const monthStart = new Date(d.getFullYear(), d.getMonth(), 1);
            const weekNum = Math.floor((weekStart - monthStart) / (7*24*3600000));
            return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-fn'+Math.floor(weekNum/2);
          }
          return weekStart.getFullYear()+'-'+String(weekStart.getMonth()+1).padStart(2,'0')+'-'+String(weekStart.getDate()).padStart(2,'0');
        }
        return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
      }
      return periodKey(ps) === key;
    }

    // Return the pay period label and how many periods fit in the date range
    function salaryPeriodLabel(empDoc) {
      const labels = { hourly:'Hour', daily:'Day', weekly:'Week', biweekly:'2 Weeks', monthly:'Month' };
      return labels[empDoc.salaryType] || empDoc.salaryType;
    }

    // Group shifts into pay periods and return array of {label, shifts, totalMs, earned, paid, periodStart, periodEnd}
    function buildSalaryPeriods(empDoc, shifts, payments, fromDate, toDate) {
      if (!shifts.length) return [];
      const rate = empDoc.salaryRate || 0;
      const type = empDoc.salaryType;

      // Determine period boundaries
      function periodKey(date) {
        const d = new Date(date);
        if (type === 'hourly') {
          return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+'T'+String(d.getHours()).padStart(2,'0');
        } else if (type === 'daily') {
          return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
        } else if (type === 'weekly' || type === 'biweekly') {
          const day = d.getDay(); // 0=Sun
          const diff = d.getDate() - day;
          const weekStart = new Date(d); weekStart.setDate(diff); weekStart.setHours(0,0,0,0);
          if (type === 'biweekly') {
            // Group into fortnights from month start
            const monthStart = new Date(d.getFullYear(), d.getMonth(), 1);
            const weekNum = Math.floor((weekStart - monthStart) / (7*24*3600000));
            const fortnightNum = Math.floor(weekNum / 2);
            return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-fn'+fortnightNum;
          }
          return weekStart.getFullYear()+'-'+String(weekStart.getMonth()+1).padStart(2,'0')+'-'+String(weekStart.getDate()).padStart(2,'0');
        } else { // monthly
          return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
        }
      }

      function periodLabel(key, type) {
        if (type === 'hourly') {
          const [date, hour] = key.split('T');
          return date + ' ' + hour + ':00';
        } else if (type === 'daily') {
          return new Date(key+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'});
        } else if (type === 'weekly') {
          const start = new Date(key+'T00:00:00');
          const end   = new Date(start); end.setDate(end.getDate()+6);
          return start.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' – ' + end.toLocaleDateString('en-US',{month:'short',day:'numeric'});
        } else if (type === 'biweekly') {
          return 'Fortnight ' + key.split('-fn')[1] + ' · ' + key.slice(0,7);
        } else {
          const [y,m] = key.split('-');
          return new Date(y, parseInt(m)-1, 1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
        }
      }

      const grouped = {};
      shifts.forEach(sh => {
        const t = sh.startTime?.toDate ? sh.startTime.toDate() : new Date(sh.startTime);
        const k = periodKey(t);
        if (!grouped[k]) grouped[k] = { key: k, shifts: [], totalMs: 0 };
        grouped[k].shifts.push(sh);
        grouped[k].totalMs += sh.durationMs || 0;
      });

      return Object.values(grouped).sort((a,b) => b.key.localeCompare(a.key)).map(g => {
        const earned = calcEarnings(empDoc, g.totalMs);
        // Find matching payment for this period
        const periodPaid = payments.filter(p => {
          if (!p.paidByOwner) return false;
          const ps = p.periodStart?.toDate ? p.periodStart.toDate() : new Date(p.periodStart||0);
          const k2 = periodKey(ps);
          return k2 === g.key;
        }).reduce((s,p) => s + (p.amount||0), 0);
        return {
          label:    periodLabel(g.key, type),
          key:      g.key,
          shifts:   g.shifts,
          totalMs:  g.totalMs,
          earned,
          paid:     periodPaid,
          unpaid:   Math.max(0, earned - periodPaid),
        };
      });
    }

    function formatDuration(ms) {
      const totalSec = Math.floor(ms / 1000);
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      return (h > 0 ? h + 'h ' : '') + m + 'm ' + s + 's';
    }

    function formatHHMM(ms) {
      const totalMin = Math.floor(ms / 60000);
      const h = Math.floor(totalMin / 60);
      const m = totalMin % 60;
      return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
    }

    // With seconds — used for live shift timers
    function formatHHMMSS(ms) {
      const totalSec = Math.floor(ms / 1000);
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    }

    // --- Active shift helpers ---
    // Returns all active shifts (multiple cashiers can be on shift simultaneously)
    async function getActiveShifts() {
      try {
        const snap = await db.collection(shiftPath()).where('status', '==', 'active').get();
        if (snap.empty) return [];
        return snap.docs.map(d => ({ _id: d.id, ...d.data() }));
      } catch(e) { return []; }
    }

    // Legacy helper — returns first active shift or null
    async function getActiveShift() {
      const shifts = await getActiveShifts();
      return shifts.length ? shifts[0] : null;
    }

    async function shiftIn(empId, empName) {
      // Only prevent THIS cashier from double-shifting in
      const shifts = await getActiveShifts();
      const mine = shifts.find(s => s.employeeId === empId);
      if (mine) throw new Error('You are already on shift. Shift out first.');
      const now = firebase.firestore.FieldValue.serverTimestamp();
      await db.collection(shiftPath()).add({
        employeeId:   empId,
        employeeName: empName,
        startTime:    now,
        endTime:      null,
        durationMs:   0,
        status:       'active',
      });
    }

    async function shiftOut(shiftId, startTimestamp) {
      const startMs = startTimestamp.toDate ? startTimestamp.toDate().getTime() : startTimestamp;
      const endMs   = Date.now();
      const durMs   = endMs - startMs;
      await db.collection(shiftPath()).doc(shiftId).update({
        endTime:    firebase.firestore.FieldValue.serverTimestamp(),
        durationMs: durMs,
        status:     'completed',
      });
    }

    // --- Fetch all cashiers for owner ---
    async function fetchEmployees() {
      const snap = await db.collection(empPath()).get();
      return snap.docs.map(d => ({ _id: d.id, ...d.data() }));
    }

    // --- Fetch shifts for date range ---
    async function fetchShifts(fromDate, toDate, empId) {
      let q = db.collection(shiftPath())
        .where('status', '==', 'completed');
      if (empId) q = q.where('employeeId', '==', empId);
      const snap = await q.get();
      return snap.docs.map(d => ({ _id: d.id, ...d.data() })).filter(s => {
        if (!s.startTime) return false;
        if (!fromDate && !toDate) return true;
        const t = s.startTime.toDate ? s.startTime.toDate() : new Date(s.startTime);
        if (fromDate && t < fromDate) return false;
        if (toDate && t > toDate) return false;
        return true;
      });
    }

    // --- Fetch salary payments ---
    async function fetchSalaryPayments(empId) {
      const snap = await db.collection(payPath()).where('employeeId', '==', empId).get();
      return snap.docs.map(d => ({ _id: d.id, ...d.data() }));
    }

                          : activeCount  >  1 ? activeCount + ' cashiers' : null;

      // so last month's carry-over is always included.

      const empSummaries = await Promise.all(cashiers.map(async emp => {
        const empShifts = allShifts.filter(s => s.employeeId === emp._id);
        const ms = empShifts.reduce((s, sh) => s + (sh.durationMs||0), 0);
        const earned = calcEarnings(emp, ms);
        totalHours += hoursFromMs(ms);

        // Fetch ALL payments ever (no date filter) so carry-over from last month is included
        let payments = [];
        try { payments = await fetchSalaryPayments(emp._id); } catch(e) { console.warn('pay fetch:', e.code); }

        // Total ever paid (all time, not just this range)
        const allTimePaid = payments
          .filter(p => p.paidByOwner)
          .reduce((s, p) => s + (p.amount||0), 0);

        // Payments within current filter window (for "Paid" column display)
        const paidThisRange = payments
          .filter(p => p.paidByOwner && p.paidAt?.toDate && p.paidAt.toDate() >= fromDate && p.paidAt.toDate() <= toDate)
          .reduce((s, p) => s + (p.amount||0), 0);

        // But we need all-time shifts to compute total ever earned for accurate balance
        let allTimeShifts = [];
        try { allTimeShifts = await fetchShifts(null, null, emp._id); } catch(e) { allTimeShifts = empShifts; }
        const allTimeEarned = calcEarnings(emp, allTimeShifts.reduce((s, sh) => s + (sh.durationMs||0), 0));
        const unpaid = Math.max(0, allTimeEarned - allTimePaid);

        totalUnpaid += unpaid;
        totalPaid += paidThisRange;
        return { emp, ms, earned, unpaid, paidThisRange, allTimeEarned, allTimePaid };

    // Write a single employeeLinks doc for a given cashier record.
    // Embeds the owner's current access status so cashiers can verify
    // access without needing to read the owner's userAccess doc directly
    // (which is blocked by Firestore security rules for cross-user reads).
    async function writeEmployeeLink(emp, empId) {
      const email = (emp.email || '').toLowerCase().trim();
      const linkKey = emailToKey(email);

      // Read owner's current access to embed in the link doc
      let ownerHasAccess = false;
      let ownerAccessExpiry = null;
      try {
        const ownerDoc = await db.collection('userAccess').doc(state.user.uid).get();
        if (ownerDoc.exists) {
          const od = ownerDoc.data();
          if (od.isDisabled) {
            ownerHasAccess = false;
          } else if (od.isUnlimited) {
            ownerHasAccess = true;
          } else if (od.expiryDate) {
            const exp = od.expiryDate.toDate ? od.expiryDate.toDate() : new Date(od.expiryDate);
            const days = Math.ceil((exp - new Date()) / (1000 * 60 * 60 * 24));
            ownerHasAccess = days > 0;
            ownerAccessExpiry = od.expiryDate;
          }
          // Backend stores "unlimited" as far-future date (100 years), not isUnlimited flag
          // Check for that pattern too
          if (!ownerHasAccess && od.expiryDate) {
            const exp = od.expiryDate.toDate ? od.expiryDate.toDate() : new Date(od.expiryDate);
            const daysLeft = Math.ceil((exp - new Date()) / (1000 * 60 * 60 * 24));
            if (daysLeft > 36500) { // >100 years = unlimited
              ownerHasAccess = true;
            } else if (daysLeft > 0) {
              ownerHasAccess = true;
            }
            ownerAccessExpiry = od.expiryDate;
          }
        }
        console.log('[writeEmployeeLink] Owner access snapshot: hasAccess=', ownerHasAccess,
          '| expiry=', ownerAccessExpiry ? (ownerAccessExpiry.toDate ? ownerAccessExpiry.toDate().toISOString() : ownerAccessExpiry) : null);
      } catch(e) {
        console.warn('[writeEmployeeLink] Could not read owner userAccess:', e.message);
        // If we can't read it, assume owner has access (they are logged in and using the app)
        ownerHasAccess = true;
      }

      await db.collection('employeeLinks').doc(linkKey).set({
        email:             email,
        ownerUid:          state.user.uid,  // always use current logged-in user's UID
        employeeId:        empId,
        active:            emp.active !== false,
        ownerHasAccess:    ownerHasAccess,
        ownerAccessExpiry: ownerAccessExpiry,
        accessGrantedAt:   firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt:         firebase.firestore.FieldValue.serverTimestamp(),
      });
      console.log('[writeEmployeeLink] ✓ Wrote link for', email,
        '→ key:', linkKey, '| ownerUid:', state.user.uid, '| empId:', empId,
        '| ownerHasAccess:', ownerHasAccess);
    }

    async function refreshEmploymentSelf() {
      const wrap = document.getElementById('empSelfContent');
      if (!wrap) return;

      // Re-resolve role if missing
      if (!state.empEmployeeDoc || !state.empOrgId) {
        wrap.innerHTML = '<div class="card" style="padding:18px;text-align:center;color:var(--textMuted);font-size:13px">Loading…</div>';
        if (state.user) { try { await resolveEmployeeRole(state.user); } catch(e) {} }
        if (!state.empEmployeeDoc || !state.empOrgId) {
          wrap.innerHTML = '<div class="card" style="padding:28px;text-align:center;color:var(--red);font-size:13px">Cashier record not found.<br><span style="font-size:11px;color:var(--textMuted)">Please sign out and sign in again.</span></div>';
          return;
        }
      }

      const emp = state.empEmployeeDoc;

      // Fetch shift/salary data — each wrapped so one failure doesn't break the whole page
      let activeShifts = [], shifts = [], payments = [];
      try { activeShifts = await getActiveShifts(); } catch(e) { console.warn('[empSelf] getActiveShifts failed:', e.code, e.message); }
      const myShift  = activeShifts.find(s => s.employeeId === emp._id) || null;
      const othersOnShift = activeShifts.filter(s => s.employeeId !== emp._id);
      // no longer blocked — multiple shifts allowed; just can't double-shift-in
      const blocked  = false;
      const activeShift = myShift; // alias for downstream code

      const today = state.empDateTo ? new Date(state.empDateTo + 'T23:59:59') : new Date(); today.setHours(23,59,59,999);
      const monthStart = state.empDateFrom ? new Date(state.empDateFrom + 'T00:00:00') : new Date(today.getFullYear(), today.getMonth(), 1);
      try { shifts = await fetchShifts(monthStart, today, emp._id); } catch(e) { console.warn('[empSelf] fetchShifts failed:', e.code, e.message); }
      try { payments = await fetchSalaryPayments(emp._id); } catch(e) { console.warn('[empSelf] fetchSalaryPayments failed:', e.code, e.message); }

      const totalMs  = shifts.reduce((s, sh) => s + (sh.durationMs || 0), 0);
      const earnings = calcEarnings(emp, totalMs);
      const startMs  = myShift?.startTime?.toDate ? myShift.startTime.toDate().getTime() : 0;
      const liveDurMs = myShift ? Date.now() - startMs : 0;
      const salaryLabel = { hourly:'Hourly', daily:'Daily', weekly:'Weekly', biweekly:'Bi-Weekly', monthly:'Monthly' }[emp.salaryType] || emp.salaryType;

      wrap.innerHTML = `
        <div class="card" style="margin-bottom:14px;text-align:center;padding:22px 18px">
          ${myShift
            ? `<div style="font-size:11px;color:#34d399;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px"><span class="live-dot" style="margin-right:6px"></span>On Shift</div>
               <div class="shift-timer" id="selfShiftTimer">${formatHHMMSS(liveDurMs)}</div>
               <div style="font-size:11px;color:var(--textMuted);margin-top:6px">Live earnings: <span style="color:#fbbf24;font-weight:700" id="selfLiveEarnings">$${calcEarnings(emp, liveDurMs).toFixed(2)}</span></div>
               ${othersOnShift.length > 0 ? '<div style="margin-top:10px;padding:8px 12px;background:rgba(6,182,212,0.08);border:1px solid rgba(6,182,212,0.22);border-radius:8px"><div style="font-size:10px;font-weight:700;color:#22d3ee;margin-bottom:3px">' + othersOnShift.length + ' also on shift</div><div style="font-size:12px;font-weight:600;color:rgba(255,255,255,0.85);">' + othersOnShift.map(s=>esc(s.employeeName||'Cashier')).join(' | ') + '</div></div>' : ''}
               <button class="shift-btn-out" style="margin-top:16px" id="btnShiftOut">SHIFT OUT</button>`
            : `<div style="font-size:13px;color:var(--textMuted);margin-bottom:12px">You are currently off shift.</div>
               ${othersOnShift.length > 0 ? '<div style="margin-bottom:12px;padding:10px 14px;background:rgba(6,182,212,0.08);border:1px solid rgba(6,182,212,0.22);border-radius:10px"><div style="font-size:11px;font-weight:700;color:#22d3ee;margin-bottom:5px;display:flex;align-items:center;gap:5px"><svg width=\"8\" height=\"8\"><circle cx=\"4\" cy=\"4\" r=\"4\" fill=\"#34d399\"/></svg>' + othersOnShift.length + ' other' + (othersOnShift.length>1?'s':'') + ' on shift</div><div style=\"font-size:12px;font-weight:600;color:rgba(255,255,255,0.85);text-align:left;line-height:1.6\">' + othersOnShift.map(s=>esc(s.employeeName||'Cashier')).join(' &nbsp;|&nbsp; ') + '</div></div>' : ''}
               <button class="shift-btn-in" id="btnShiftIn">SHIFT IN</button>`
          }
        </div>

        <div class="emp-stat-grid">
          <div class="emp-stat">
            <div class="es-label">Hours This Month</div>
            <div class="es-value">${hoursFromMs(totalMs).toFixed(1)}h</div>
          </div>
          <div class="emp-stat">
            <div class="es-label">Earnings</div>
            <div class="es-value" style="color:#fbbf24">$${earnings.toFixed(2)}</div>
          </div>
          <div class="emp-stat">
            <div class="es-label">Rate (${salaryLabel})</div>
            <div class="es-value">$${(emp.salaryRate||0).toFixed(2)}</div>
          </div>
        </div>

        <div class="emp-section-title">SALARY — BY ${salaryLabel.toUpperCase()} PERIOD</div>
        <div class="card" style="padding:0;overflow:hidden">
          ${(() => {
            const periods = buildSalaryPeriods(emp, shifts, payments, monthStart, today);
            if (!periods.length) return '<div style="padding:18px;text-align:center;color:var(--textMuted);font-size:13px">No shifts in this period</div>';
            return periods.map(p => {
              const matchPay = payments.find(pay => pay.paidByOwner && periodMatchesKey(pay, p.key, emp));
              const statusClass = matchPay?.receivedByEmployee ? 'received' : (matchPay ? 'paid' : 'unpaid');
              const statusLabel2 = matchPay?.receivedByEmployee ? 'Received' : (matchPay ? 'Paid' : 'To Receive');
              return '<div class="salary-row">' +
                '<div>' +
                  '<div style="font-weight:600;font-size:13px">' + esc(p.label) + '</div>' +
                  '<div style="font-size:11px;color:var(--textMuted)">' + formatHHMM(p.totalMs) + ' · ' + p.shifts.length + ' shifts</div>' +
                '</div>' +
                '<div style="display:flex;align-items:center;gap:8px;flex-shrink:0">' +
                  '<div style="font-weight:800;color:#fbbf24;font-family:Orbitron,monospace;font-size:13px;white-space:nowrap">$' + p.earned.toFixed(2) + '</div>' +
                  (matchPay && !matchPay.receivedByEmployee
                    ? '<button class="pay-pill paid" data-payid="' + matchPay._id + '" style="cursor:pointer;white-space:nowrap" id="markRcv_' + matchPay._id + '">Mark Received</button>'
                    : '<span class="pay-pill ' + statusClass + '" style="white-space:nowrap">' + statusLabel2 + '</span>') +

        <div class="emp-section-title">SHIFT HISTORY</div>
        <div class="card" style="padding:0;overflow:hidden">
          ${shifts.length
            ? shifts.sort((a,b)=>(b.startTime?.seconds||0)-(a.startTime?.seconds||0)).slice(0,30).map(sh => {
                const d   = sh.startTime?.toDate ? sh.startTime.toDate() : new Date();
                const end = sh.endTime?.toDate   ? sh.endTime.toDate()   : null;
                const delSvgStr = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14a2,2,0,0,1-2,2H8a2,2,0,0,1-2-2L5,6"/><path d="M10,11v6M14,11v6"/></svg>';
                return `<div class="salary-row">
                  <div style="flex:1;min-width:0">
                    <div style="font-weight:600;font-size:12px">${d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
                    <div style="font-size:10px;color:var(--textMuted)">${d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true})}${end?' → '+end.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true}):''}</div>
                  </div>
                  <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
                    <span style="font-weight:700;color:#22d3ee;font-family:'Orbitron',monospace;font-size:11px">${formatDuration(sh.durationMs||0)}</span>
                    <span style="font-size:11px;color:#fbbf24;font-weight:700">$${calcEarnings(emp, sh.durationMs||0).toFixed(2)}</span>
                    <button class="emp-del-shift-btn" data-shiftid="${sh._id}" style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);border-radius:7px;padding:5px 7px;cursor:pointer;color:#f87171;line-height:0;flex-shrink:0">${delSvgStr}</button>

          }
        </div>
      `;

      // Live shift timer
      if (myShift) {
        clearInterval(_shiftTimerInterval);
        _shiftTimerInterval = setInterval(() => {
          const timerEl   = document.getElementById('selfShiftTimer');
          const earningEl = document.getElementById('selfLiveEarnings');
          if (!timerEl) { clearInterval(_shiftTimerInterval); return; }
          const dur = Date.now() - startMs;
          timerEl.textContent   = formatHHMMSS(dur);
          if (earningEl) earningEl.textContent = '$' + calcEarnings(emp, dur).toFixed(2);
        }, 1000);

        document.getElementById('btnShiftOut').onclick = async () => {
          if (!confirm('End your shift now?')) return;
          clearInterval(_shiftTimerInterval);
          try {
            await shiftOut(myShift._id, myShift.startTime);
            await refreshEmploymentSelf();
          } catch(e) { alert('Error: ' + e.message); }
        };
      } else if (!blocked) {
        document.getElementById('btnShiftIn').onclick = async () => {
          try {
            await shiftIn(emp._id, emp.name || state.user.displayName);
            await refreshEmploymentSelf();
          } catch(e) { alert('Error: ' + e.message); }
        };
      }

      // Delete individual shifts
      wrap.querySelectorAll('.emp-del-shift-btn').forEach(btn => {
        btn.onclick = async (e) => {
          e.stopPropagation();
          if (!confirm('Delete this shift record?')) return;
          try {
            // Verify the shift belongs to this employee before deleting
            const shiftDoc = await db.collection(shiftPath()).doc(btn.dataset.shiftid).get();
            if (shiftDoc.exists && shiftDoc.data().employeeId !== state.empEmployeeDoc?._id) {
              alert('You can only delete your own shifts.'); return;
            }
            await db.collection(shiftPath()).doc(btn.dataset.shiftid).delete();
            await refreshEmploymentSelf();
          } catch(err) { alert('Delete failed: ' + err.message); }
        };
      });

      // Mark salary received
      wrap.querySelectorAll('[id^="markRcv_"]').forEach(btn => {
        btn.onclick = async () => {
          if (!confirm('Mark this salary as received?')) return;
          await db.collection(payPath()).doc(btn.dataset.payid).update({
            receivedByEmployee: true,
            receivedAt: firebase.firestore.FieldValue.serverTimestamp(),
          });
          await refreshEmploymentSelf();
        };
      });
    }

    // ============================================================
    // EMPLOYEE DETAIL MODAL (owner) — shift history + salary actions
    // ============================================================
    async function showEmployeeDetailModal(empId, allEmployees) {
      const emp = allEmployees.find(e => e._id === empId);
      if (!emp) return;

      // Default date range: start of month → today
      const _now = new Date();
      const todayStr = _now.getFullYear() + '-' + String(_now.getMonth()+1).padStart(2,'0') + '-' + String(_now.getDate()).padStart(2,'0');
      const monthStartStr = _now.getFullYear() + '-' + String(_now.getMonth()+1).padStart(2,'0') + '-01';

      let modal = document.getElementById('empDetailModal');
      if (modal) modal.remove();
      modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.id = 'empDetailModal';
      modal.innerHTML = `<div class="modal" style="max-width:520px;width:94vw">
        <div class="modal-title" style="display:flex;align-items:center;justify-content:space-between">
          <span>${esc(emp.name||'Cashier')} — Details</span>
          <button class="btn btn-ghost btn-sm" id="closeEmpDetail"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:flex-end">
          <div style="flex:1;min-width:120px">
